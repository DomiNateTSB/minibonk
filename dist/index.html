<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Halls of Aurora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06000f; touch-action: none; }
    #aurora-bg { position: fixed; inset: 0; z-index: 0; }
    #aurora-bg canvas { width: 100%; height: 100%; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { touch-action: none; }
    /* Touch controls */
    #tc-wrap { display:none; position:fixed; inset:0; z-index:60; pointer-events:none; }
    #tc-joy-zone { position:absolute; left:0; top:0; width:55%; height:100%; pointer-events:all; }
    #tc-base { position:absolute; display:none; width:112px; height:112px; border-radius:50%;
      border:2px solid rgba(167,139,250,0.38); background:rgba(10,4,26,0.38); pointer-events:none; }
    #tc-stick { position:absolute; display:none; width:50px; height:50px; border-radius:50%;
      background:rgba(167,139,250,0.58); pointer-events:none; }
    #tc-dash { position:absolute; right:28px; bottom:110px; width:74px; height:74px; border-radius:50%;
      border:2px solid rgba(96,165,250,0.65); background:rgba(10,4,26,0.48);
      pointer-events:all; display:flex; align-items:center; justify-content:center;
      font-family:system-ui; font-size:11px; font-weight:bold; color:#93c5fd; letter-spacing:1px;
      user-select:none; -webkit-user-select:none; }
    #tc-dash.active { background:rgba(96,165,250,0.35); border-color:rgba(96,165,250,1); }
    #tc-pause { position:absolute; right:28px; top:24px; width:44px; height:44px; border-radius:10px;
      border:2px solid rgba(167,139,250,0.45); background:rgba(10,4,26,0.48);
      pointer-events:all; display:flex; align-items:center; justify-content:center;
      font-size:18px; user-select:none; -webkit-user-select:none; }
  </style>
</head>
<body>
  <!-- Name entry overlay -->
  <div id="name-overlay" style="display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;flex-direction:column;font-family:system-ui;">
    <p style="color:#a78bfa;font-size:13px;letter-spacing:3px;margin-bottom:12px;font-weight:bold;">HALLS OF AURORA</p>
    <h2 style="color:#fff;font-size:26px;font-weight:bold;margin-bottom:6px;">Enter your name</h2>
    <p style="color:rgba(255,255,255,0.35);font-size:13px;margin-bottom:22px;">It will appear on the leaderboard</p>
    <input id="name-input" type="text" maxlength="16" autocomplete="off" placeholder="Your name…"
      style="background:#1a1a2e;border:1.5px solid #7c3aed;border-radius:8px;color:#fff;font-size:18px;padding:10px 18px;width:260px;outline:none;text-align:center;font-family:system-ui;" />
    <button id="name-submit"
      style="margin-top:14px;background:#7c3aed;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:bold;padding:10px 36px;cursor:pointer;font-family:system-ui;letter-spacing:1px;">
      PLAY
    </button>
  </div>

  <div id="aurora-bg"></div>
  <div id="game-container"></div>

  <!-- Touch controls (shown only during gameplay on touch devices) -->
  <div id="tc-wrap">
    <div id="tc-joy-zone"></div>
    <div id="tc-base"></div>
    <div id="tc-stick"></div>
    <div id="tc-dash">DASH</div>
    <div id="tc-pause">⏸</div>
  </div>

  <script>
  /* ── TOUCH CONTROLS ── */
  window._isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  window._touch = { vx: 0, vy: 0, dashPressed: false, _dashWas: false };

  window._showTouchControls = function(show) {
    if (!window._isMobile) return;
    document.getElementById('tc-wrap').style.display = show ? 'block' : 'none';
  };

  (function() {
    const wrap    = document.getElementById('tc-wrap');
    const jZone   = document.getElementById('tc-joy-zone');
    const jBase   = document.getElementById('tc-base');
    const jStick  = document.getElementById('tc-stick');
    const dashBtn = document.getElementById('tc-dash');
    const JR = 52; // max joystick radius
    let jOrigin = null, jTouchId = null;

    function updateStick(cx, cy) {
      const dx = cx - jOrigin.x, dy = cy - jOrigin.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const capped = Math.min(dist, JR);
      const nx = dist > 0 ? dx/dist : 0;
      const ny = dist > 0 ? dy/dist : 0;
      jStick.style.left = (jOrigin.x + nx*capped - 25) + 'px';
      jStick.style.top  = (jOrigin.y + ny*capped - 25) + 'px';
      window._touch.vx = nx * Math.min(1, dist / JR);
      window._touch.vy = ny * Math.min(1, dist / JR);
    }

    jZone.addEventListener('touchstart', e => {
      e.preventDefault();
      if (jTouchId !== null) return;
      const t = e.changedTouches[0];
      jTouchId = t.identifier;
      jOrigin = { x: t.clientX, y: t.clientY };
      jBase.style.cssText += ';display:block;left:'+(t.clientX-56)+'px;top:'+(t.clientY-56)+'px;';
      jStick.style.cssText += ';display:block;left:'+(t.clientX-25)+'px;top:'+(t.clientY-25)+'px;';
    }, { passive: false });

    jZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) { updateStick(t.clientX, t.clientY); break; }
      }
    }, { passive: false });

    jZone.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) {
          jTouchId = null; jOrigin = null;
          jBase.style.display = 'none'; jStick.style.display = 'none';
          window._touch.vx = 0; window._touch.vy = 0;
          break;
        }
      }
    }, { passive: false });
    jZone.addEventListener('touchcancel', () => { jTouchId = null; jOrigin = null; jBase.style.display = 'none'; jStick.style.display = 'none'; window._touch.vx = 0; window._touch.vy = 0; }, { passive: false });

    dashBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      window._touch.dashPressed = true;
      dashBtn.classList.add('active');
    }, { passive: false });
    dashBtn.addEventListener('touchend', e => {
      e.preventDefault();
      window._touch.dashPressed = false;
      dashBtn.classList.remove('active');
    }, { passive: false });

    // Pause button
    document.getElementById('tc-pause').addEventListener('touchstart', e => {
      e.preventDefault();
      if (window._triggerPause) window._triggerPause();
    }, { passive: false });

    // Prevent default touch on canvas to avoid scroll/zoom
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  })();
  </script>

  <!-- ── MUTE BUTTON ── -->
  <div id="mute-btn" title="Toggle sound" onclick="(function(){
    const m = window._SFX.toggleMute();
    document.getElementById('mute-btn').textContent = m ? '🔇' : '🔊';
  })()" style="
    position:fixed; top:14px; right:14px; z-index:200;
    background:rgba(15,7,30,0.88); border:1px solid rgba(124,58,237,0.5);
    border-radius:8px; padding:7px 11px; cursor:pointer;
    font-size:15px; user-select:none; backdrop-filter:blur(6px);
    transition:border-color .15s;
  " onmouseenter="this.style.borderColor='rgba(167,139,250,0.9)'"
     onmouseleave="this.style.borderColor='rgba(124,58,237,0.5)'">🔊</div>

  <!-- ── GLOBAL LEADERBOARD OVERLAY ── -->
  <div id="lb-btn" title="Leaderboard" style="
    position:fixed; top:14px; left:14px; z-index:200;
    background:rgba(15,7,30,0.88); border:1px solid rgba(124,58,237,0.6);
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-family:system-ui; font-size:12px; font-weight:bold;
    color:#a78bfa; letter-spacing:1.5px; user-select:none;
    backdrop-filter:blur(6px); transition:border-color .15s,color .15s;
    display:flex; align-items:center; gap:7px;
  " onmouseenter="this.style.borderColor='rgba(167,139,250,0.9)';this.style.color='#fff'"
     onmouseleave="this.style.borderColor='rgba(124,58,237,0.6)';this.style.color='#a78bfa'"
     onclick="window._lbToggle()">
    🏆 <span>LEADERBOARD</span> <span id="lb-caret" style="font-size:10px">▼</span>
  </div>

  <!-- ── ACHIEVEMENTS SIDE PANEL ── -->
  <div id="ach-panel" style="
    display:none; position:fixed; top:52px; left:368px; z-index:199;
    width:300px; background:rgba(8,4,20,0.97); border:1px solid rgba(124,58,237,0.5);
    border-radius:10px; font-family:system-ui; overflow:hidden;
    backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.7);
  ">
    <div style="padding:10px 14px 8px; border-bottom:1px solid rgba(124,58,237,0.3); display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:11px;font-weight:bold;letter-spacing:1.5px;color:#fbbf24;">🏆 YOUR ACHIEVEMENTS</span>
      <span id="ach-count" style="font-size:10px;color:rgba(255,255,255,0.3);"></span>
    </div>
    <div id="ach-rows" style="
      max-height:360px; overflow-y:auto; padding:6px 0;
      scrollbar-width:thin; scrollbar-color:rgba(124,58,237,0.4) transparent;
    "></div>
    <div style="text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,0.18);border-top:1px solid rgba(124,58,237,0.15);">
      Complete runs to unlock more
    </div>
  </div>

  <div id="lb-panel" style="
    display:none; position:fixed; top:52px; left:14px; z-index:199;
    width:340px; background:rgba(8,4,20,0.97); border:1px solid rgba(124,58,237,0.5);
    border-radius:10px; font-family:system-ui; overflow:hidden;
    backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.7);
  ">
    <!-- Tabs -->
    <div style="display:flex; border-bottom:1px solid rgba(124,58,237,0.3);">
      <div id="lb-tab-normal" onclick="window._lbTab('normal')" style="
        flex:1; padding:10px; text-align:center; font-size:11px; font-weight:bold;
        letter-spacing:1.5px; cursor:pointer; color:#a78bfa;
        border-bottom:2px solid #7c3aed; transition:color .15s;
      ">⚔ NORMAL</div>
      <div id="lb-tab-1hp" onclick="window._lbTab('1hp')" style="
        flex:1; padding:10px; text-align:center; font-size:11px; font-weight:bold;
        letter-spacing:1.5px; cursor:pointer; color:rgba(167,139,250,0.4);
        border-bottom:2px solid transparent; transition:color .15s;
      ">☠ 1HP MODE</div>
    </div>
    <!-- Rows container — top 10 visible, scroll for more -->
    <div id="lb-rows" style="
      max-height:320px; overflow-y:auto; padding:8px 0;
      scrollbar-width:thin; scrollbar-color:rgba(124,58,237,0.4) transparent;
    ">
      <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">Loading…</div>
    </div>
    <!-- Hint -->
    <div style="text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,0.18);border-top:1px solid rgba(124,58,237,0.15);">
      Best score per player • scroll for full list
    </div>
  </div>

  <script>
  (function(){
    const CLASS_EMOJI_DOM = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀', rogue:'🗡️', paladin:'🛡️', berserker:'🪓' };
    let _open = false, _activeTab = 'normal', _cache = { normal: null, '1hp': null };

    const ACH_DEFS = [
      { id:'firstBlood',  icon:'🩸', name:'First Blood',     hint:'Kill 1 enemy',              cat:'easy' },
      { id:'survivor5',   icon:'⏱️', name:'Survivor',         hint:'Last 5 minutes',            cat:'easy' },
      { id:'wave10',      icon:'🌊', name:'Wave Rider',       hint:'Reach wave 10',             cat:'easy' },
      { id:'level10',     icon:'⭐', name:'Rising Star',      hint:'Get to level 10',           cat:'easy' },
      { id:'century',     icon:'💯', name:'Century',          hint:'100 kills in one run',      cat:'medium' },
      { id:'allClasses',  icon:'🎭', name:'Class Act',        hint:'Try every starter class',   cat:'medium' },
      { id:'elite25',     icon:'👑', name:'Elite Slayer',     hint:'25 elites in one run',      cat:'medium' },
      { id:'souls5k',     icon:'✦',  name:'Soul Hoarder',     hint:'Earn 5000 total souls',     cat:'medium' },
      { id:'speedRunner', icon:'🏃', name:'Speed Runner',     hint:'Last 10 minutes in one run',cat:'hard', unlocks:'Rogue' },
      { id:'wave25',      icon:'🏆', name:'Wave Champion',    hint:'Reach wave 25',             cat:'hard', unlocks:'Berserker' },
      { id:'millennium',  icon:'💀', name:'Millennium',       hint:'1000 total kills ever',     cat:'hard', unlocks:'Paladin' },
      { id:'triLegend',   icon:'🌟', name:'Legendary Run',    hint:'3 legendaries in one run',  cat:'hard' },
      { id:'bossHunter',  icon:'🐉', name:'Boss Hunter',      hint:'Defeat 20 bosses total',    cat:'hard' },
      { id:'untouchable', icon:'🛡️', name:'Untouchable',      hint:'No damage for one wave',    cat:'legendary' },
      { id:'wave35',      icon:'👹', name:'Apex Predator',    hint:'Reach wave 35',             cat:'legendary' },
      { id:'decimator',   icon:'💥', name:'Decimator',        hint:'1M damage in one run',      cat:'legendary' },
      { id:'onehpLegend', icon:'☠️', name:'1HP Legend',       hint:'10 min in 1HP mode',        cat:'legendary' },
      { id:'speedDemon',  icon:'⚡', name:'Speed Demon',      hint:'Last 20 minutes',           cat:'legendary' },
    ];

    const CAT_COL = { easy:'#4ade80', medium:'#60a5fa', hard:'#f87171', legendary:'#fbbf24' };

    function renderAchievements() {
      let granted = [];
      try { granted = JSON.parse(localStorage.getItem('hoa_ach')) || []; } catch {}
      const rows = document.getElementById('ach-rows');
      const count = document.getElementById('ach-count');
      count.textContent = `${granted.length} / ${ACH_DEFS.length}`;
      const cats = ['easy','medium','hard','legendary'];
      const catLabel = { easy:'Easy', medium:'Medium', hard:'Hard', legendary:'Legendary' };
      rows.innerHTML = cats.map(cat => {
        const group = ACH_DEFS.filter(a => a.cat === cat);
        const items = group.map(a => {
          const earned = granted.includes(a.id);
          return `<div style="
            display:flex; align-items:center; gap:8px; padding:5px 12px;
            opacity:${earned ? 1 : 0.38};
          ">
            <span style="font-size:14px;width:18px;text-align:center">${a.icon}</span>
            <div style="flex:1; min-width:0;">
              <div style="font-size:11px;font-weight:bold;color:${earned ? CAT_COL[cat] : '#6b7280'};
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${a.name}${a.unlocks ? ` <span style="font-size:9px;color:#fbbf24">🔓 ${a.unlocks}</span>` : ''}
              </div>
              <div style="font-size:9px;color:rgba(255,255,255,${earned?0.45:0.25});margin-top:1px;">
                ${earned ? '✓ Completed' : a.hint}
              </div>
            </div>
            ${earned ? '<span style="color:#fbbf24;font-size:12px">✓</span>' : ''}
          </div>`;
        }).join('');
        return `<div style="padding:4px 12px 2px;font-size:9px;font-weight:bold;letter-spacing:2px;color:${CAT_COL[cat]};opacity:0.7;margin-top:4px;">${catLabel[cat].toUpperCase()}</div>${items}`;
      }).join('');
    }

    function renderRows(scores) {
      const rows = document.getElementById('lb-rows');
      const you = localStorage.getItem('hoa_name') || '';
      const is1hp = _activeTab === '1hp';
      if (!Array.isArray(scores) || scores.length === 0) {
        rows.innerHTML = `<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">${is1hp ? 'No 1HP runs yet — dare to try?' : 'No scores yet.'}</div>`;
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      rows.innerHTML = scores.map((s, i) => {
        const medal  = medals[i] || `<span style="color:rgba(255,255,255,0.35);font-size:11px">${i+1}.</span>`;
        const emoji  = CLASS_EMOJI_DOM[s.class_name] || '❓';
        const isYou  = s.name === you;
        const divider = i === 9 ? 'border-top:1px dashed rgba(124,58,237,0.3);margin-top:4px;padding-top:4px;' : '';
        return `<div style="
          display:flex; align-items:center; gap:8px; padding:7px 14px;
          background:${isYou ? 'rgba(124,58,237,0.18)' : 'transparent'};
          border-left:${isYou ? '2px solid #7c3aed' : '2px solid transparent'};
          ${divider}
        ">
          <span style="width:22px;text-align:center;font-size:13px">${medal}</span>
          <span style="font-size:13px">${emoji}</span>
          <span style="flex:1;font-size:12px;color:${isYou ? '#c4b5fd' : 'rgba(255,255,255,0.8)'};
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${isYou?'bold':'normal'}">
            ${s.name}${isYou?' ◀':''}
          </span>
          <span style="font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap">
            Wave <b style="color:#e2e8f0">${s.wave}</b>
          </span>
          <span style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap">
            ${s.kills}k
          </span>
        </div>`;
      }).join('');
    }

    async function loadTab(tab) {
      if (_cache[tab]) { renderRows(_cache[tab]); return; }
      document.getElementById('lb-rows').innerHTML =
        '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">Loading…</div>';
      try {
        const SB_URL = 'https://biclaeemulhkdejyeysv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xhZWVtdWxoa2RlanlleXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTkzODIsImV4cCI6MjA5Nzc3NTM4Mn0.VkFCPzroqgPgUkxXfLjrWbWBXoOONV6OFHBuyrRm7l0';
        const table = tab === '1hp' ? 'aurora_leaderboard_1hp' : 'aurora_leaderboard';
        const r = await fetch(`${SB_URL}/rest/v1/${table}?select=name,wave,kills,level,class_name&order=wave.desc,kills.desc&limit=100`,
          { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
        const data = await r.json();
        _cache[tab] = Array.isArray(data) ? data : [];
        renderRows(_cache[tab]);
      } catch { renderRows([]); }
    }

    window._lbToggle = function() {
      _open = !_open;
      document.getElementById('lb-panel').style.display = _open ? 'block' : 'none';
      document.getElementById('ach-panel').style.display = _open ? 'block' : 'none';
      document.getElementById('lb-caret').textContent = _open ? '▲' : '▼';
      if (_open) { _cache = { normal: null, '1hp': null }; loadTab(_activeTab); renderAchievements(); }
    };

    window._lbTab = function(tab) {
      _activeTab = tab;
      ['normal','1hp'].forEach(t => {
        const el = document.getElementById(`lb-tab-${t}`);
        const active = t === tab;
        el.style.color = active ? '#a78bfa' : 'rgba(167,139,250,0.4)';
        el.style.borderBottom = active ? '2px solid #7c3aed' : '2px solid transparent';
      });
      loadTab(tab);
    };

    /* Close when clicking outside */
    document.addEventListener('click', e => {
      if (_open && !e.target.closest('#lb-btn') && !e.target.closest('#lb-panel') && !e.target.closest('#ach-panel')) {
        _open = false;
        document.getElementById('lb-panel').style.display = 'none';
        document.getElementById('lb-caret').textContent = '▼';
      }
    });
  })();

  <script type="module">
    import { Renderer, Program, Mesh, Color, Triangle } from 'https://esm.sh/ogl@1.0.11';

    const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform float uAmplitude; uniform vec3 uColorStops[3];
uniform vec2 uResolution; uniform float uBlend;
out vec4 fragColor;
vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)); vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1; i=mod(i,289.0);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;

  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;

struct ColorStop{vec3 color;float position;};
void main(){

  colors[0]=ColorStop(uColorStops[0],0.0);
