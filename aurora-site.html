        this.add.text(cx - 160, y, label, {
          fontSize: '15px', fontFamily: 'system-ui', color: '#94a3b8',

        fontSize: '12px', fontFamily: 'system-ui', fontStyle: 'bold',

        fontSize: '12px', fontFamily: 'system-ui', color: '#a78bfa',
        wordWrap: { width: W - 80 }, align: 'center',

      /* New Achievements unlocked this run */
      if (this.newAch && this.newAch.length) {
        const achY0 = traitsY + 50;
        this.add.text(cx, achY0, '🏆  ACHIEVEMENTS UNLOCKED', {
          fontSize:'12px', fontFamily:'system-ui', fontStyle:'bold', color:'#fbbf24', letterSpacing:3,
        }).setOrigin(0.5);
        this.newAch.forEach((ach, ai) => {
          const ay = achY0 + 22 + ai * 28;
          const abg = this.add.rectangle(cx, ay, 380, 24, 0x1a1000, 0.95).setStrokeStyle(1,0xf59e0b,0.8);
          this.add.text(cx, ay, `${ach.icon}  ${ach.name}  —  ${ach.desc}`, {
            fontSize:'12px', fontFamily:'system-ui', fontStyle:'bold', color:'#fcd34d',
          }).setOrigin(0.5);
          this.tweens.add({ targets:[abg], alpha:{from:0,to:0.95}, duration:400, delay:ai*150 });

        .setStrokeStyle(2, 0xa78bfa).setInteractive({ useHandCursor: true });
      const btnTxt = this.add.text(cx, btnY, 'CLAIM SOULS & UPGRADE', {
        fontSize: '14px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#e2e8f0',
      }).setOrigin(0.5);

      btn.on('pointerover', () => btn.setFillStyle(0x6d28d9));
      btn.on('pointerout',  () => btn.setFillStyle(0x4c1d95));
      btn.on('pointerdown', () => {
        const totalSouls = this.souls + this.curseSouls;
        this.scene.start('Meta', {
          souls: totalSouls, shown: totalSouls,

      this.tweens.add({ targets: btnTxt, alpha: { from: 0.4, to: 1 }, duration: 900, yoyo: true, repeat: -1, ease: 'sine.inOut' });
    }
  }

      /* Re-spec button */
      const respecCost = 500;
      const hasUpgrades = Object.values(meta.upgrades || {}).some(v => v > 0);
      const canRespec = hasUpgrades && meta.souls >= respecCost;
      const rsBg = this.add.rectangle(W / 2, 222, 230, 28, canRespec ? 0x3a1a00 : 0x1a1a1a, 0.95)
        .setStrokeStyle(1, canRespec ? 0xf97316 : 0x333333);
      const rsTxt = this.add.text(W / 2, 222,
        hasUpgrades ? `⟳  Re-spec upgrades  (${respecCost} souls)` : '⟳  No upgrades to re-spec', {
        fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold',
        color: canRespec ? '#fb923c' : '#444',
      }).setOrigin(0.5);
      if (canRespec) {
        rsBg.setInteractive({ useHandCursor: true });
        rsBg.on('pointerover', () => { rsBg.setFillColor(0x4a2a00); rsTxt.setColor('#fed7aa'); });
        rsBg.on('pointerout',  () => { rsBg.setFillColor(0x3a1a00); rsTxt.setColor('#fb923c'); });
        rsBg.on('pointerdown', () => {
          /* Refund all spent souls, charge 500 fee */
          let refund = 0;
          META_UPGRADES.forEach(u => {
            const r = meta.upgrades[u.id] || 0;
            for (let i = 0; i < r; i++) refund += META_COSTS[i];
          });
          meta.upgrades = {};
          meta.souls = meta.souls - respecCost + refund;
          saveMeta(meta);
          this.scene.restart({ souls: 0, shown: this.shown, wave: this.wave, kills: this.kills, level: this.level });

      this.add.text(W / 2, 246, 'PERMANENT UPGRADES', {

      META_UPGRADES.forEach((u, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        const ux = sx + col * (uw + ugap), uy = 262 + row * (uh + 10);
        const rank = meta.upgrades[u.id] || 0;

        const cost = maxed ? 0 : META_COSTS[rank];
        const canAfford = !maxed && meta.souls >= cost;

        const card = this.add.rectangle(ux, uy, uw, uh, maxed ? 0x0d2b1a : 0x111122, 0.96).setOrigin(0);
        card.setStrokeStyle(1, maxed ? 0x22c55e : (canAfford ? 0xfbbf24 : 0x333355));
        if (!maxed && canAfford) card.setInteractive({ useHandCursor: true });

        this.add.text(ux + uw / 2, uy + 13, u.name, {
          fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: maxed ? '#4ade80' : (canAfford ? '#fbbf24' : '#6b7280'),
        }).setOrigin(0.5, 0);

        this.add.text(ux + uw / 2, uy + 32, u.desc, {
          fontSize: '10px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.45)',
          wordWrap: { width: uw - 14 }, align: 'center',
        }).setOrigin(0.5, 0);

        for (let r = 0; r < META_MAX; r++)

        this.add.text(ux + uw - 8, uy + uh - 22, maxed ? 'MAX' : `${cost} souls`, {

          card.on('pointerout',  () => card.setFillColor(0x111122));

            meta.upgrades[u.id] = (meta.upgrades[u.id] || 0) + 1;
            meta.souls -= cost;
            saveMeta(meta);
            this.scene.restart({ souls: 0, shown: this.shown, wave: this.wave, kills: this.kills, level: this.level });
          });
        }
      });

      /* Leaderboard moved to global overlay (🏆 button, top-left) */

      /* ── Daily Challenge Score ── */
      {

        const gridBottom2 = 262 + rows * (uh + 10);
        if (_dc2Entry) {
          this.add.text(W / 2, gridBottom2 + 10, 'DAILY CHALLENGE', {
            fontSize:'10px', fontFamily:'system-ui', fontStyle:'bold', color:'#92400e', letterSpacing:2,
          }).setOrigin(0.5);
          const clsName2 = (_dc2Entry.cls||'?').charAt(0).toUpperCase()+(_dc2Entry.cls||'?').slice(1);
          this.add.text(W / 2, gridBottom2 + 25, clsName2 + '  ·  Wave ' + _dc2Entry.wave + '  ·  ' + _dc2Entry.kills + ' kills  ·  Score ' + _dc2Entry.score, {
            fontSize:'11px', fontFamily:'system-ui', fontStyle:'bold', color:'#fbbf24',
          }).setOrigin(0.5);
        }
      }

      /* ── Run History ── */
      {
        const hist = loadHistory();
        if (hist.length) {
          const gridBottom = 262 + rows * (uh + 10);
          const histStartY = gridBottom + 14;
          this.add.text(W / 2, histStartY, 'RECENT RUNS', {
            fontSize:'10px', fontFamily:'system-ui', fontStyle:'bold', color:'#4c1d95', letterSpacing:2,

            const label = emoji + ' ' + clsName + '  ·  Wave ' + run.wave + '  ·  ' + run.kills + ' kills  ·  Lv' + run.level;
            this.add.text(W / 2, histStartY + 16 + hi * 15, label, {
              fontSize:'10px', fontFamily:'system-ui', color:'#6b7280',

      const btnY = Math.max(205 + rows * (uh + 10) + 20, H - 65);
      const btn = this.add.text(W / 2 - 80, btnY, '[ Play Again ]', {
        fontSize: '22px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#a78bfa',

      btn.on('pointerdown', () => this.scene.start('Menu'));

      /* Change name button */
      const nameBtn = this.add.text(W / 2 + 100, btnY, `[ ${localStorage.getItem('hoa_name') || '?'} · change ]`, {

      nameBtn.on('pointerover', () => nameBtn.setColor('rgba(255,255,255,0.7)'));
      nameBtn.on('pointerout',  () => nameBtn.setColor('rgba(255,255,255,0.3)'));
      nameBtn.on('pointerdown', async () => {
        if (confirm('Sign out of Thornrift?')) {

  /* ── BATTLE PASS SCENE v2 ── */
  class BattlePassScene extends Phaser.Scene {
    constructor() { super('BattlePass'); }

    create() {
      const W = this.scale.width, H = this.scale.height, cx = W / 2;
      const HEADER_H = 196;
      this.cameras.main.setBackgroundColor('#04000d');
      this.cameras.main.fadeIn(350, 0, 0, 0);
      const _lbEl = document.getElementById('lb-btn');
      if (_lbEl) _lbEl.style.display = 'none';
      this.events.once('shutdown', () => { if (_lbEl) _lbEl.style.display = 'flex'; });

      const bp = loadBP();
      this._scrollY = 0;
      this._tipObjs = null;
      this._tipSkinKey = null;

      /* ── grid layout ── */
      const COLS = 10, gapX = 7, gapY = 7, PAD = 24;
      const cardW = Math.floor((W - PAD * 2 - gapX * (COLS - 1)) / COLS);
      const cardH = 108;
      const BANNER_H = 36; /* chapter divider height between rows */
      const startX = (W - (COLS * cardW + (COLS - 1) * gapX)) / 2;
      const totalRows = Math.ceil(BATTLE_PASS_REWARDS.length / COLS);
      /* each row after row 0 gets a preceding chapter banner */
      const totalGridH = totalRows * (cardH + gapY) + (totalRows - 1) * BANNER_H + 30;
      this._maxSc = Math.max(0, HEADER_H + totalGridH - H);

      /* ── scrollable container with mask ── */
      this._cont = this.add.container(0, HEADER_H);
      const _mG = this.add.graphics();
      _mG.fillStyle(0xffffff, 1);
      _mG.fillRect(0, HEADER_H, W, H - HEADER_H);
      _mG.setVisible(false);
      this._cont.setMask(_mG.createGeometryMask());

      /* Restore scroll after claim-restart */
      if (window._bpRestoreScroll) {
        this._scrollY = Math.min(window._bpRestoreScroll, this._maxSc);
        this._cont.y = HEADER_H - this._scrollY;
        window._bpRestoreScroll = 0;
      }

      /* subtle grid bg glows inside container */
      const bgG = this.add.graphics();
      bgG.fillStyle(0x3b0764, 0.07); bgG.fillEllipse(cx * 0.5, 200, W * 0.7, 320);
      bgG.fillStyle(0x7c1d12, 0.05); bgG.fillEllipse(cx * 1.65, 500, W * 0.55, 280);
      this._cont.add(bgG);

      /* ── chapter banners between rows ── */
      const CHAPTER_NAMES = [
        '', /* row 0 has no preceding banner */
        'CHAPTER II · THE HUNT',
        'CHAPTER III · RECKONING',
        'CHAPTER IV · DOMINION',
        'CHAPTER V · ASCENSION',
        'CHAPTER VI · TRIAL BY FIRE',
        'CHAPTER VII · THE ABYSS',
        'CHAPTER VIII · APEX',
        'CHAPTER IX · ETERNITY',
        'CHAPTER X · LEGENDARY',
      ];
      for (let r = 1; r < totalRows; r++) {
        /* banner sits just above row r — at Y = r*(cardH+gapY) + (r-1)*BANNER_H */
        const bY = r * (cardH + gapY) + (r - 1) * BANNER_H;
        const bannerG = this.add.graphics();
        /* dim horizontal line */
        bannerG.lineStyle(1, 0x6d28d9, 0.18);
        bannerG.lineBetween(PAD, bY + BANNER_H / 2, W - PAD, bY + BANNER_H / 2);
        /* two accent lines flanking the text */
        const accentW = (W - PAD * 2) * 0.28;
        bannerG.lineStyle(1, 0x7c3aed, 0.45);
        bannerG.lineBetween(PAD, bY + BANNER_H / 2, PAD + accentW, bY + BANNER_H / 2);
        bannerG.lineBetween(W - PAD - accentW, bY + BANNER_H / 2, W - PAD, bY + BANNER_H / 2);
        this._cont.add(bannerG);
        const bTxt = this.add.text(cx, bY + BANNER_H / 2, CHAPTER_NAMES[r] || `CHAPTER ${r + 1}`, {
          fontSize: '9px', fontFamily: '"Cinzel", serif', fontStyle: 'bold',
          color: '#7c3aed', letterSpacing: 3,
        }).setOrigin(0.5);
        this._cont.add(bTxt);
      }

      /* track the first claimable level for the "next reward" glow */
      const _bpLevel = bp.level || 0;
      const _nextClaimable = BATTLE_PASS_REWARDS.find(rw => (_bpLevel >= rw.level) && !((bp.claimed || []).includes(rw.level)));

      /* ── build all cards ── */
      BATTLE_PASS_REWARDS.forEach((rw, i) => {
        const col = i % COLS, row = Math.floor(i / COLS);
        /* Y accounts for chapter banner gaps: row 1+ each get a preceding BANNER_H */
        const cardY = row * (cardH + gapY) + (row > 0 ? row * BANNER_H : 0);
        this._mkCard(startX, col, cardY, cardW, cardH, gapX, gapY, rw, bp, HEADER_H, _nextClaimable);
      });

      /* ── scrollbar ── */
      const sbTrackH = H - HEADER_H - 10;
      const sbThumbH = Math.max(36, Math.round(sbTrackH * (H - HEADER_H) / (HEADER_H + totalGridH)));
      this._sbTrackY = HEADER_H + 5; this._sbTrackH = sbTrackH; this._sbThumbH = sbThumbH;
      const sbG = this.add.graphics().setDepth(12);
      sbG.fillStyle(0x18052e, 1); sbG.fillRoundedRect(W - 13, HEADER_H + 5, 6, sbTrackH, 3);
      this._sbThumb = this.add.graphics().setDepth(13);
      this._drawThumb(0);

      /* ── scroll input ── */
      this.input.on('wheel', (p, o, dx, dy) => this._scrollTo(this._scrollY + dy * 0.6));
      let _py = 0, _ps = 0;
      this.input.on('pointerdown', p => { if (p.x < W - 18) { _py = p.y; _ps = this._scrollY; } });
      this.input.on('pointermove', p => {
        if (p.isDown && p.x < W - 18) this._scrollTo(_ps + (_py - p.y));
      });

      /* ── fixed header (drawn after container so it's on top) ── */
      this._buildHeader(cx, W, H, bp, HEADER_H);

      /* ── back button (solid pill, depth 20 to stay above everything) ── */
      const _bkBg = this.add.rectangle(62, 18, 104, 28, 0x0f071e, 0.95)
        .setStrokeStyle(1.5, 0xa78bfa, 0.75).setDepth(20).setInteractive({ useHandCursor: true });
      const _bkT = this.add.text(62, 18, '← Back', {
        fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#a78bfa',
      }).setOrigin(0.5).setDepth(21);
      _bkBg.on('pointerover', () => { _bkBg.setFillColor(0x1e0f3a); _bkT.setColor('#c4b5fd'); });
      _bkBg.on('pointerout',  () => { _bkBg.setFillColor(0x0f071e); _bkT.setColor('#a78bfa'); });
      _bkBg.on('pointerdown', () => { this._hideTip(); this.cameras.main.fadeOut(220,0,0,0); this.time.delayedCall(240, () => this.scene.start('Menu')); });
      this.input.keyboard.on('keydown-ESC', () => { this._hideTip(); this.cameras.main.fadeOut(220,0,0,0); this.time.delayedCall(240, () => this.scene.start('Menu')); });

    }

    _scrollTo(y) {
      this._scrollY = Phaser.Math.Clamp(y, 0, this._maxSc);
      this._cont.y = 196 - this._scrollY;
      this._drawThumb(this._scrollY);
    }

    _drawThumb(scrollY) {
      if (!this._sbThumb) return;
      const pct = this._maxSc > 0 ? scrollY / this._maxSc : 0;
      const W = this.scale.width;
      const ty = this._sbTrackY + pct * (this._sbTrackH - this._sbThumbH);
      this._sbThumb.clear();

              return;

            t1.setText('…'); t2.setText('Redirecting to checkout');
            try {
              /* user_id is resolved server-side from the JWT — do not send it in body */
              const { data: { session: _sess } } = await _sb.auth.getSession();

                body: { tier },
                headers: { Authorization: `Bearer ${_sess?.access_token}` },

              t1.setText('⚠ Error'); t2.setText('Please try again').setColor('#fca5a5');
            }
          });
          return { bg, t1, t2 };
        };

        const tbg = this.add.rectangle(tx, TAB_Y, TAB_W, TAB_H, isActive ? 0x064e3b : 0x0a0818)
          .setStrokeStyle(1, isActive ? 0x34d399 : 0x1a3a2a, 0.9).setInteractive({ useHandCursor: true }).setDepth(11);
        const ttx = this.add.text(tx, TAB_Y, label, {
          fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: isActive ? '#34d399' : 'rgba(255,255,255,0.4)',
        }).setOrigin(0.5).setDepth(12);
        if (!isActive) {
          tbg.on('pointerover', () => tbg.setFillColor(0x0d1a14));
          tbg.on('pointerout', () => tbg.setFillColor(0x0a0818));
          tbg.on('pointerdown', () => { window._invTab = key; this.scene.restart(); });
        }
        return { tbg, ttx };
      };
      _mkTab('⚗  ITEMS', 'items', cx - TAB_W / 2 - 4);
      _mkTab('✨  COSMETICS', 'cosmetics', cx + TAB_W / 2 + 4);
      if (window._invTab) { this._activeTab = window._invTab; window._invTab = null; }

      /* ── Subheader text (items tab only) ── */
      this._activeBar = null;
      if (this._activeTab === 'items') {
        const _inv = loadInventory();
        const _invTotal = Object.values(_inv).reduce((a,b)=>a+b,0);
        this.add.text(cx, 90, _invTotal > 0 ? _invTotal + ' consumable item' + (_invTotal!==1?'s':'') + ' ready — activate at run start' : 'No items yet — claim rewards from the Battle Pass', {
          fontSize: '9px', fontFamily: 'system-ui', color: 'rgba(52,211,153,0.55)',
        }).setOrigin(0.5).setDepth(11);
        this._activeBar = this.add.text(cx, 102, '', {
          fontSize: '9px', fontFamily: 'system-ui', color: '#34d399',
          wordWrap: { width: W - 48 }, align: 'center',
        }).setOrigin(0.5, 0).setDepth(11);
        this._refreshActive();
      }

      /* ── Scrollable container ── */
      const COLS = Math.max(2, Math.floor((W - 32) / 148));
      const cardW = Math.floor((W - 32 - (COLS - 1) * 10) / COLS);
      const cardH = 138;
      const gapX = 10, gapY = 10;
      const sx = (W - (COLS * cardW + (COLS - 1) * gapX)) / 2;

      this._cont = this.add.container(0, GRID_TOP);
      const _mG = this.add.graphics();
      _mG.fillStyle(0xffffff, 1);
      _mG.fillRect(0, GRID_TOP, W, H - GRID_TOP);
      _mG.setVisible(false);
      this._cont.setMask(_mG.createGeometryMask());

      this._scrollY = 0;
      if (this._activeTab === 'cosmetics') this._buildCosmetics();
      else this._buildGrid(sx, cardW, cardH, gapX, gapY, COLS);

      /* ── Scroll ── */
      this.input.on('wheel', (p, o, dx, dy) => this._scr(dy * 0.55));
      let _py = 0, _ps = 0;
      this.input.on('pointerdown', p => { _py = p.y; _ps = this._scrollY; });
      this.input.on('pointermove', p => { if (p.isDown) this._scr(_ps + (_py - p.y) - this._scrollY, true); });

      /* ── Back button ── */
      const bkBg = this.add.rectangle(72, 28, 110, 34, 0x0f071e, 0.92)
        .setStrokeStyle(1.5, 0x34d399, 0.6).setInteractive({ useHandCursor: true }).setDepth(12);
      this.add.text(72, 28, '← Back', { fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#34d399' }).setOrigin(0.5).setDepth(13);
      bkBg.on('pointerover', () => bkBg.setFillColor(0x0a1a12));
      bkBg.on('pointerout',  () => bkBg.setFillColor(0x0f071e));
      bkBg.on('pointerdown', () => { this.cameras.main.fadeOut(220, 0, 0, 0); this.time.delayedCall(240, () => this.scene.start('Menu')); });
      this.input.keyboard.on('keydown-ESC', () => { this.cameras.main.fadeOut(220, 0, 0, 0); this.time.delayedCall(240, () => this.scene.start('Menu')); });
    }

    _buildGrid(sx, cardW, cardH, gapX, gapY, COLS) {
      const W = this.scale.width, H = this.scale.height, cx = W / 2;
      const inv = loadInventory();
      /* Build item info lookup from BATTLE_PASS_REWARDS */
      const catalog = {};
      BATTLE_PASS_REWARDS.forEach(rw => {
        let iid = null;
        if (rw.type === 'echo')    iid = 'echo_' + rw.value;
        else if (rw.type === 'rune')    iid = 'rune_' + rw.value;
        else if (rw.type === 'xpboost') iid = 'xpboost_' + (rw.value * 100).toFixed(0);
        if (iid) catalog[iid] = { name: rw.name, desc: rw.desc || '', icon: rw.icon, type: rw.type };
      });
      const entries = Object.entries(inv).filter(([, q]) => q > 0);

      if (entries.length === 0) {
        const emG = this.add.graphics();
        emG.fillStyle(0x0d0920, 0.8); emG.fillRoundedRect(cx - 160, 20, 320, 80, 10);
        this.add.text(W / 2, 60, 'Your inventory is empty', {
          fontSize: '14px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.35)',
        }).setOrigin(0.5);
        this.add.text(W / 2, 82, 'Earn items by leveling up your Battle Pass', {
          fontSize: '11px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.22)',
        }).setOrigin(0.5);
        this._cont.add(emG);
        this._maxSc = 0;
        return;
      }

      const TYPE_COL = { echo: 0x60a5fa, rune: 0x10b981, xpboost: 0x3b82f6 };

      entries.forEach(([itemId, qty], i) => {
        const info = catalog[itemId] || { name: itemId, desc: '', icon: '?', type: 'echo' };
        const col = i % COLS, row = Math.floor(i / COLS);
        const x = sx + col * (cardW + gapX);
        const y = row * (cardH + gapY);
        const ccx = x + cardW / 2;
        const tc = TYPE_COL[info.type] || 0x60a5fa;
        const tcHex = '#' + tc.toString(16).padStart(6, '0');

        /* Card bg */
        const cg = this.add.graphics();
        cg.fillStyle(0x08031a, 1); cg.fillRoundedRect(x, y, cardW, cardH, 8);
        cg.lineStyle(1.5, tc, 0.55); cg.strokeRoundedRect(x, y, cardW, cardH, 8);
        cg.fillStyle(tc, 0.06); cg.fillRoundedRect(x + 1, y + 1, cardW - 2, 28, { tl: 7, tr: 7, bl: 0, br: 0 });
        this._cont.add(cg);

        /* Type label */
        const TLBL = { echo: 'POWER ECHO', rune: 'RUN ITEM', xpboost: 'XP BOOST' };
        this._cont.add(this.add.text(ccx, y + 14, TLBL[info.type] || 'ITEM', {
          fontSize: '7px', fontFamily: 'system-ui', fontStyle: 'bold', color: tcHex, letterSpacing: 1,
        }).setOrigin(0.5));

        /* Icon */
        this._cont.add(this.add.text(ccx, y + 44, info.icon, {
          fontSize: '26px', fontFamily: 'system-ui',
        }).setOrigin(0.5));

        /* Name */
        this._cont.add(this.add.text(ccx, y + 70, info.name, {
          fontSize: '10px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: '#ffffff', wordWrap: { width: cardW - 12 }, align: 'center',
        }).setOrigin(0.5, 0));

        /* Desc */
        this._cont.add(this.add.text(ccx, y + 86, info.desc, {
          fontSize: '9px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.45)',
          wordWrap: { width: cardW - 14 }, align: 'center', lineSpacing: 1,
        }).setOrigin(0.5, 0));

        /* Qty badge */
        const qBg = this.add.graphics();
        qBg.fillStyle(0x1a0a30, 1); qBg.fillCircle(x + cardW - 12, y + 12, 10);
        qBg.lineStyle(1.5, tc, 0.8); qBg.strokeCircle(x + cardW - 12, y + 12, 10);
        this._cont.add(qBg);
        const qT = this.add.text(x + cardW - 12, y + 12, 'x' + qty, {
          fontSize: '9px', fontFamily: 'system-ui', fontStyle: 'bold', color: tcHex,
        }).setOrigin(0.5);
        this._cont.add(qT);

        /* Use button */
        const active = getRunItems();
        const alreadyQueued = active.includes(itemId);
        const useBg = this.add.rectangle(ccx, y + cardH - 16, cardW - 16, 22, alreadyQueued ? 0x064e3b : 0x1a0a30)
          .setStrokeStyle(1, alreadyQueued ? 0x34d399 : tc, 0.9)
          .setInteractive({ useHandCursor: true });
        const useT = this.add.text(ccx, y + cardH - 16, alreadyQueued ? '✓ Queued' : '▶  Use', {
          fontSize: '10px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: alreadyQueued ? '#34d399' : tcHex,
        }).setOrigin(0.5);
        this._cont.add(useBg);
        this._cont.add(useT);

        useBg.on('pointerover', () => useBg.setFillColor(alreadyQueued ? 0x065f46 : 0x250d3a));
        useBg.on('pointerout',  () => useBg.setFillColor(alreadyQueued ? 0x064e3b : 0x1a0a30));
        useBg.on('pointerdown', (pointer) => {
          if (pointer.y < 124) return; /* behind header */
          if (alreadyQueued) return;
          const used = useFromInventory(itemId);
          if (used) {
            useT.setText('✓ Queued'); useT.setColor('#34d399');
            useBg.setFillColor(0x064e3b); useBg.setStrokeStyle(1, 0x34d399, 0.9);
            /* Update qty display */
            const newQty = (loadInventory()[itemId] || 0);
            qT.setText('x' + newQty);
            if (newQty <= 0) { cg.setAlpha(0.3); useT.setText('Empty'); }
            this._refreshActive();
          }
        });
      });

      const totalRows = Math.ceil(entries.length / COLS);
      this._maxSc = Math.max(0, totalRows * (cardH + gapY) + 20 - (this.scale.height - 124));
    }

    _scr(delta, abs = false) {
      this._scrollY = Phaser.Math.Clamp(abs ? delta : this._scrollY + delta, 0, this._maxSc || 0);
      this._cont.y = 124 - this._scrollY;
    }

    _refreshActive() {
      if (!this._activeBar) return;
      const items = getRunItems();
      if (items.length === 0) {
        this._activeBar.setText('No items queued — use items below to activate them next run');
        this._activeBar.setColor('rgba(255,255,255,0.22)');
      } else {
        const names = items.map(id => {
          const rw = BATTLE_PASS_REWARDS.find(r =>
            (r.type === 'echo' && 'echo_' + r.value === id) ||
            (r.type === 'rune' && 'rune_' + r.value === id) ||
            (r.type === 'xpboost' && 'xpboost_' + (r.value * 100).toFixed(0) === id)
          );
          return rw ? rw.name : id;
        });
        this._activeBar.setText('⚡ Active next run: ' + names.join('  ·  '));
        this._activeBar.setColor('#34d399');
      }
    }

    _buildCosmetics() {
      const W = this.scale.width, H = this.scale.height, cx = W / 2;
      const bp = loadBP();
      const claimed = bp.claimed || [];

      /* Helper: equip state */
      const getEqTrail  = () => localStorage.getItem('hoa_eq_trail')  || null;
      const getEqAura   = () => localStorage.getItem('hoa_eq_aura')   || null;
      const getEqTitle  = () => localStorage.getItem('hoa_eq_title')  || null;
      const getEqBorder = () => localStorage.getItem('hoa_eq_border') || null;
      const getEqSkin   = (cls) => localStorage.getItem('hoa_eq_skin_' + cls) === '1';
      const setEqTrail  = (v) => { if (v) localStorage.setItem('hoa_eq_trail',  v); else localStorage.removeItem('hoa_eq_trail'); };
      const setEqAura   = (v) => { if (v) localStorage.setItem('hoa_eq_aura',   v); else localStorage.removeItem('hoa_eq_aura'); };
      const setEqTitle  = (v) => { if (v) localStorage.setItem('hoa_eq_title',  v); else localStorage.removeItem('hoa_eq_title'); };
      const setEqBorder = (v) => { if (v) localStorage.setItem('hoa_eq_border', v); else localStorage.removeItem('hoa_eq_border'); };
      const setEqSkin   = (cls, on) => { if (on) localStorage.setItem('hoa_eq_skin_' + cls, '1'); else localStorage.removeItem('hoa_eq_skin_' + cls); };

      /* Gather unlocked cosmetics from claimed levels */
      const skins   = BATTLE_PASS_REWARDS.filter(r => r.type === 'elite_skin' && claimed.includes(r.level));
      const trails  = BATTLE_PASS_REWARDS.filter(r => r.type === 'trail'      && claimed.includes(r.level));
      const auras   = BATTLE_PASS_REWARDS.filter(r => r.type === 'ascended'   && claimed.includes(r.level));
      const titles  = BATTLE_PASS_REWARDS.filter(r => r.type === 'title'      && claimed.includes(r.level));
      const borders = BATTLE_PASS_REWARDS.filter(r => r.type === 'border'     && claimed.includes(r.level));

      const CARD_W = 148, CARD_H = 110, GAP = 10;
      let yOff = 10; /* offset inside container */

      const _section = (label, color) => {
        const sg = this.add.graphics();
        sg.fillStyle(0x0a0818, 0.7); sg.fillRoundedRect(cx - W * 0.44, yOff, W * 0.88, 22, 4);
        sg.lineStyle(1, color, 0.5); sg.strokeRoundedRect(cx - W * 0.44, yOff, W * 0.88, 22, 4);
        this._cont.add(sg);
        this._cont.add(this.add.text(cx, yOff + 11, label, {
          fontSize: '10px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: Phaser.Display.Color.IntegerToColor(color).rgba,
        }).setOrigin(0.5));
        yOff += 30;
      };

      const _cosCard = (rw, isEquipped, onEquip) => {
        const COLS = Math.max(2, Math.floor((W - 32) / (CARD_W + GAP)));
        /* cards laid out in rows — track col/row via closure counter handled outside */
        return { rw, isEquipped, onEquip };
      };

      /* Render a row of cosmetic cards */
      const _renderCards = (items, isEq, onEquip, onUnequip) => {
        if (items.length === 0) {
          this._cont.add(this.add.text(cx, yOff + 16, 'None unlocked yet — claim Battle Pass rewards to unlock', {
            fontSize: '10px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.25)',
          }).setOrigin(0.5));
          yOff += 40;
          return;
        }
        const COLS = Math.max(2, Math.floor((W - 32) / (CARD_W + GAP)));
        const cW = Math.floor((W - 32 - (COLS - 1) * GAP) / COLS);
        const startX = (W - (COLS * cW + (COLS - 1) * GAP)) / 2;
        items.forEach((rw, i) => {
          const col = i % COLS, row = Math.floor(i / COLS);
          const x = startX + col * (cW + GAP), y = yOff + row * (CARD_H + GAP);
          const equipped = isEq(rw);
          const tc = equipped ? 0x34d399 : 0x4a2080;

          /* Card bg */
          const cg = this.add.graphics();
          cg.fillStyle(equipped ? 0x041a10 : 0x0a0818, 1);
          cg.fillRoundedRect(x, y, cW, CARD_H, 6);
          cg.lineStyle(1.5, tc, equipped ? 0.9 : 0.5);
          cg.strokeRoundedRect(x, y, cW, CARD_H, 6);
          this._cont.add(cg);

          /* Icon / name */
          this._cont.add(this.add.text(x + cW / 2, y + 20, rw.icon || '✨', {
            fontSize: '22px', fontFamily: 'system-ui',
          }).setOrigin(0.5));
          this._cont.add(this.add.text(x + cW / 2, y + 46, rw.name, {
            fontSize: '9px', fontFamily: 'system-ui', fontStyle: 'bold',
            color: equipped ? '#34d399' : '#c4b5fd', align: 'center',
            wordWrap: { width: cW - 10 },
          }).setOrigin(0.5));
          this._cont.add(this.add.text(x + cW / 2, y + 62, rw.desc ? rw.desc.slice(0, 50) + (rw.desc.length > 50 ? '…' : '') : '', {
            fontSize: '7px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.35)',
            wordWrap: { width: cW - 10 }, align: 'center',
          }).setOrigin(0.5));

          /* Equip / Unequip button */
          const btnBg = this.add.rectangle(x + cW / 2, y + CARD_H - 16, cW - 16, 22,
            equipped ? 0x1a0808 : 0x1a0a30)
            .setStrokeStyle(1, equipped ? 0xf87171 : 0x6d28d9, 0.9)
            .setInteractive({ useHandCursor: true });
          const btnT = this.add.text(x + cW / 2, y + CARD_H - 16,
            equipped ? '✕  Unequip' : '▶  Equip', {
            fontSize: '10px', fontFamily: 'system-ui', fontStyle: 'bold',
            color: equipped ? '#f87171' : '#a78bfa',
          }).setOrigin(0.5);
          this._cont.add(btnBg);
          this._cont.add(btnT);

          if (equipped) {
            btnBg.on('pointerover', () => btnBg.setFillColor(0x2a0c0c));
            btnBg.on('pointerout',  () => btnBg.setFillColor(0x1a0808));
            btnBg.on('pointerdown', () => { onUnequip(rw); window._invTab = 'cosmetics'; this.scene.restart(); });
          } else {
            btnBg.on('pointerover', () => btnBg.setFillColor(0x250d3a));
            btnBg.on('pointerout',  () => btnBg.setFillColor(0x1a0a30));
            btnBg.on('pointerdown', () => { onEquip(rw); window._invTab = 'cosmetics'; this.scene.restart(); });
          }
        });
        const rows = Math.ceil(items.length / Math.max(2, Math.floor((W - 32) / (CARD_W + GAP))));
        yOff += rows * (CARD_H + GAP) + 8;
      };

      /* ── Elite Skins ── */
      _section('👑  ELITE SKINS  —  one per class', 0xffd700);
      _renderCards(skins,
        (rw) => getEqSkin(rw.value),
        (rw) => setEqSkin(rw.value, true),
        (rw) => setEqSkin(rw.value, false)
      );

      /* ── Trails ── */
      _section('✨  TRAILS  —  one active at a time', 0xa855f7);
      _renderCards(trails,
        (rw) => getEqTrail() === rw.value,
        (rw) => setEqTrail(rw.value),
        ()   => setEqTrail(null)
      );

      /* ── Auras ── */
      _section('🌟  AURAS  —  one active at a time', 0xfbbf24);
      _renderCards(auras,
        (rw) => getEqAura() === rw.value,
        (rw) => setEqAura(rw.value),
        ()   => setEqAura(null)
      );

      /* ── Titles ── */
      _section('🏷️  TITLES  —  one active at a time', 0x38bdf8);
      _renderCards(titles,
        (rw) => getEqTitle() === rw.value,
        (rw) => setEqTitle(rw.value),
        ()   => setEqTitle(null)
      );

      /* ── Card Frames ── */
      _section('🖼️  CARD FRAMES  —  one active at a time', 0xf97316);
      _renderCards(borders,
        (rw) => getEqBorder() === rw.value,
        (rw) => setEqBorder(rw.value),
        ()   => setEqBorder(null)
      );

      this._maxSc = Math.max(0, yOff + 20 - (H - 116));
    }
  }

  /* ── GooeyNav: standalone overlay, no Phaser DOM integration ── */
  (function initGooeyNav() {
    const nav = document.getElementById('gooey-menu-nav');
    if (!nav) return;

    const noise = n => n / 2 - Math.random() * n;
    const getXY = (dist, idx, total) => {
      const a = ((360 + noise(8)) / total) * idx * (Math.PI / 180);
      return [dist * Math.cos(a), dist * Math.sin(a)];
    };
    const COLORS = [1, 2, 3, 1, 2, 3, 1, 4];
    const PC = 15, PD = [90, 10], PR = 100, AT = 600, TV = 300;

    const items = [
      { label: '🏆  Achievements', scene: 'Achievements' },
      { label: '🎒  Inventory',     scene: 'Inventory' },
    ];

    nav.innerHTML = '';
    nav.className = 'gooey-nav-container';

    const navEl = document.createElement('nav');
    const ul = document.createElement('ul');
    const filterEl = document.createElement('span');
    filterEl.className = 'effect filter';
    const textEl = document.createElement('span');
    textEl.className = 'effect text';
    navEl.appendChild(ul);
    nav.appendChild(navEl);
    nav.appendChild(filterEl);
    nav.appendChild(textEl);

    let activeIndex = -1;

    const updatePos = li => {
      const cr = nav.getBoundingClientRect();
      const pr = li.getBoundingClientRect();
      Object.assign(filterEl.style, { left: (pr.x - cr.x) + 'px', top: (pr.y - cr.y) + 'px', width: pr.width + 'px', height: pr.height + 'px' });
      Object.assign(textEl.style,   { left: (pr.x - cr.x) + 'px', top: (pr.y - cr.y) + 'px', width: pr.width + 'px', height: pr.height + 'px' });
      textEl.innerText = li.innerText;
    };

    const makeParticles = () => {
      filterEl.querySelectorAll('.gooey-particle').forEach(p => p.remove());
      filterEl.style.setProperty('--time', (AT * 2 + TV) + 'ms');
      filterEl.classList.remove('active');
      for (let i = 0; i < PC; i++) {
        const t = AT * 2 + noise(TV * 2);
        const rot = noise(PR / 10);
        const rotate = rot > 0 ? (rot + PR / 20) * 10 : (rot - PR / 20) * 10;
        const p = { start: getXY(PD[0], PC - i, PC), end: getXY(PD[1] + noise(7), PC - i, PC),
                    scale: 1 + noise(0.2), color: COLORS[Math.floor(Math.random() * COLORS.length)], rotate, time: t };
        setTimeout(() => {
          const particle = document.createElement('span'); particle.className = 'gooey-particle';
          particle.style.setProperty('--start-x', p.start[0] + 'px'); particle.style.setProperty('--start-y', p.start[1] + 'px');
          particle.style.setProperty('--end-x',   p.end[0]   + 'px'); particle.style.setProperty('--end-y',   p.end[1]   + 'px');
          particle.style.setProperty('--time', p.time + 'ms'); particle.style.setProperty('--scale', p.scale);
          particle.style.setProperty('--color', 'var(--color-' + p.color + ')'); particle.style.setProperty('--rotate', p.rotate + 'deg');
          const point = document.createElement('span'); point.className = 'gooey-point';
          particle.appendChild(point); filterEl.appendChild(particle);
          requestAnimationFrame(() => filterEl.classList.add('active'));
          setTimeout(() => { try { filterEl.removeChild(particle); } catch {} }, p.time);
        }, 30);
      }
    };

    items.forEach((item, idx) => {
      const li = document.createElement('li');
      const a = document.createElement('a'); a.href = '#'; a.textContent = item.label;
      a.onclick = e => e.preventDefault();
      li.appendChild(a);
      li.addEventListener('click', () => {
        if (activeIndex === idx) return;
        activeIndex = idx;
        ul.querySelectorAll('li').forEach((el, i) => el.classList.toggle('active', i === idx));
        updatePos(li);
        textEl.classList.remove('active'); void textEl.offsetWidth; textEl.classList.add('active');
        makeParticles();
        setTimeout(() => { if (window._gooeyNavigate) window._gooeyNavigate(item.scene); }, 220);
      });
      ul.appendChild(li);
    });

    window._showGooeyNav = (invCount) => {
      /* update inventory label */
      const lis = ul.querySelectorAll('li');
      if (lis[1]) lis[1].querySelector('a').textContent = '🎒  Inventory' + (invCount > 0 ? ' (' + invCount + ')' : '');
      activeIndex = -1;
      ul.querySelectorAll('li').forEach(el => el.classList.remove('active'));
      filterEl.classList.remove('active');

  <script type="module">
    import { Renderer, Program, Mesh, Color, Triangle } from 'https://esm.sh/ogl@1.0.11';
    const ctn = document.getElementById('aurora-bg');
    const renderer = new Renderer({ alpha: true, premultipliedAlpha: true, antialias: true });
    const gl = renderer.gl;
    gl.clearColor(0,0,0,0); gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.canvas.style.backgroundColor = 'transparent';
    ctn.appendChild(gl.canvas);
    const VERT = `#version 300 es\nin vec2 position;\nvoid main(){gl_Position=vec4(position,0.0,1.0);}`;
    const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform float uAmplitude; uniform vec3 uColorStops[3];
uniform vec2 uResolution; uniform float uBlend;
out vec4 fragColor;
vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)); vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1; i=mod(i,289.0);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0; vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5); vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}
struct ColorStop{vec3 color;float position;};
void main(){
  vec2 uv=gl_FragCoord.xy/uResolution;
  ColorStop colors[3];
  colors[0]=ColorStop(uColorStops[0],0.0);
  colors[1]=ColorStop(uColorStops[1],0.5);
  colors[2]=ColorStop(uColorStops[2],1.0);
  int index=0;
  for(int i=0;i<2;i++){bool b=colors[i].position<=uv.x;index=int(mix(float(index),float(i),float(b)));}
  float range=colors[index+1].position-colors[index].position;
  float lf=(uv.x-colors[index].position)/range;
  vec3 rampColor=mix(colors[index].color,colors[index+1].color,lf);
  float height=snoise(vec2(uv.x*2.0+uTime*0.1,uTime*0.25))*0.5*uAmplitude;
  height=exp(height); height=(uv.y*2.0-height+0.2);
  float intensity=0.6*height;
  float auroraAlpha=smoothstep(0.20-uBlend*0.5,0.20+uBlend*0.5,intensity);
  fragColor=vec4(intensity*rampColor*auroraAlpha,auroraAlpha);
}`;
    function hexRgb(h){const c=new Color(h);return[c.r,c.g,c.b];}
    const cs=['#3b0764','#7c3aed','#1e1b4b'];
    const geometry=new Triangle(gl); delete geometry.attributes.uv;
    const program=new Program(gl,{vertex:VERT,fragment:FRAG,uniforms:{
      uTime:{value:0},uAmplitude:{value:1.2},
      uColorStops:{value:cs.map(hexRgb)},
      uResolution:{value:[ctn.offsetWidth,ctn.offsetHeight]},
      uBlend:{value:0.6}
    }});
    const mesh=new Mesh(gl,{geometry,program});
    function resize(){renderer.setSize(ctn.offsetWidth,ctn.offsetHeight);program.uniforms.uResolution.value=[ctn.offsetWidth,ctn.offsetHeight];}
    window.addEventListener('resize',resize); resize();
    (function loop(t){requestAnimationFrame(loop);program.uniforms.uTime.value=t*0.0004;renderer.render({scene:mesh});})(0);
