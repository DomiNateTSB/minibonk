      p.body.setCircle(size, -size, -size);
      p.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
      p.dmg = dmg;
      this.enemyProjs.add(p);
      this.time.delayedCall(3400, () => { if (p.active) p.destroy(); });
    }

    dropBomb(x, y, tx, ty, dmg) {
      const bombViz = this.add.circle(x, y, 8, 0xea580c, 1);
      const trail = this.add.circle(x, y, 5, 0xfef08a, 0.6);
      this.tweens.add({ targets: bombViz, x: tx, y: ty, duration: 1100, ease: 'power1.in' });
      this.tweens.add({ targets: trail,   x: tx, y: ty, duration: 1100, ease: 'power1.in', delay: 60 });
      this.time.delayedCall(1100, () => {
        bombViz.destroy(); trail.destroy();
        if (this.dead) return;
        const warn = this.add.circle(tx, ty, 60, 0xef4444, 0.22);
        this.tweens.add({ targets: warn, alpha: 0.55, duration: 140, yoyo: true, repeat: 2, onComplete: () => {
          warn.destroy();
          if (this.dead) return;
          const expl = this.add.circle(tx, ty, 10, 0xff4500, 0.95);
          this.tweens.add({ targets: expl, scaleX: 7, scaleY: 7, alpha: 0, duration: 360, ease: 'power2.out', onComplete: () => expl.destroy() });
          if (Phaser.Math.Distance.Between(this.pg.x, this.pg.y, tx, ty) < 68) {
            this.takeDamage(dmg);
          }
        }});
      });
    }

    autoAttack(time) {
      const warchAtkMult = (this.ps.warchiefAtkPer && this._warchiefStacks > 0) ? Math.max(0.35, 1 - Math.min(10,this._warchiefStacks)*this.ps.warchiefAtkPer) : 1;
      if (time - this.lastAtk < this.ps.atkCd * warchAtkMult) return;
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;
      this.lastAtk = time;
      window._SFX.shoot(this.ps.class);
      if (['knight','paladin','berserker'].includes(this.ps.class)) {
        this.meleeAttack(time, all);
      } else {
        const sorted = [...all].sort((a, b) =>
          Phaser.Math.Distance.Between(this.pg.x, this.pg.y, a.x, a.y) -
          Phaser.Math.Distance.Between(this.pg.x, this.pg.y, b.x, b.y)
        );
        sorted.slice(0, 1 + this.ps.multi).forEach(t => this.fireAt(t));
      }
    }

    update(time, delta) {
      if (this.dead || this.paused) return;

      const { up, down, left, right, up2, down2, left2, right2 } = this.keys;
      let vx = 0, vy = 0;
      if (left.isDown  || left2.isDown)  vx = -this.ps.spd;
      if (right.isDown || right2.isDown) vx =  this.ps.spd;
      if (up.isDown    || up2.isDown)    vy = -this.ps.spd;
      if (down.isDown  || down2.isDown)  vy =  this.ps.spd;
      if (vx && vy) { vx *= 0.707; vy *= 0.707; }
      /* Warchief decay */
      if (this.ps.warchiefAtkPer && this.time.now > this._warchiefUntil) this._warchiefStacks = Math.max(0, this._warchiefStacks - 1);
      /* Berserker Fury: speed scales with missing HP */
      let furyMult = 1;
      if (this.ps.furyPerHp && this.ps.maxHp > 0) {
        const hpMissingPct = Math.max(0, 1 - this.ps.hp / this.ps.maxHp);
        furyMult = 1 + Math.floor(hpMissingPct / 0.10) * this.ps.furyPerHp;
      }
      /* Blood Rage speed */
      const bloodRageSpdM = (this.ps.bloodRageSpd && this.ps.hp < this.ps.maxHp*(this.ps.bloodRageThresh||0.35)) ? (1+this.ps.bloodRageSpd) : 1;
      const hasteMult = ((this.ps.hasteBonus && time < this.hasteUntil) ? (1 + this.ps.hasteBonus) : 1) * furyMult * bloodRageSpdM;
      /* Merge touch joystick input */
      const tc = window._touch;
      if (tc && (tc.vx || tc.vy)) {
        vx = tc.vx * this.ps.spd;
        vy = tc.vy * this.ps.spd;
      }
      /* Touch dash — detect rising edge */
      const touchDashNow = tc && tc.dashPressed;
      if (touchDashNow && !this._lastTouchDash) this.keys.dash._justPressed = true;
      this._lastTouchDash = touchDashNow;

      /* Dash */
      const dashJust = Phaser.Input.Keyboard.JustDown(this.keys.dash) || this.keys.dash._justPressed;
      this.keys.dash._justPressed = false;
      if (dashJust && time > this.dashCd) {
        const dx = vx || (right.isDown||right2.isDown ? 1 : left.isDown||left2.isDown ? -1 : (tc&&tc.vx ? tc.vx : 0));
        const dy = vy || (down.isDown||down2.isDown ? 1 : up.isDown||up2.isDown ? -1 : (tc&&tc.vy ? tc.vy : 0));
        if (dx !== 0 || dy !== 0) {
          const len = Math.sqrt(dx*dx+dy*dy);
          this.dashDir = { x:dx/len, y:dy/len };
          this.dashUntil = time + 190;
          if (this.ps.backstabMult) this._justDashed = true;
          window._SFX.dash();
          this.dashCd = time + 1400;
          this.shieldActive = true; this.shieldUntilReady = time + 230;
          for (let i = 0; i < 4; i++) {
            this.time.delayedCall(i * 40, () => {
              if (this.dead) return;
              const tr = this.add.graphics();
              tr.fillStyle(0x60a5fa, 0.32 - i*0.06); tr.fillCircle(this.pg.x, this.pg.y, 12);
              this.tweens.add({ targets:tr, alpha:0, duration:260, onComplete:()=>tr.destroy() });
            });
          }
        }
      }
      if (time < this.dashUntil) {
        this.pg.body.setVelocity(this.dashDir.x * 680, this.dashDir.y * 680);
      } else {
        const MAX_SPD = 520;
        let fvx = vx * hasteMult, fvy = vy * hasteMult;
        const fmag = Math.sqrt(fvx*fvx + fvy*fvy);
        if (fmag > MAX_SPD) { fvx = fvx/fmag*MAX_SPD; fvy = fvy/fmag*MAX_SPD; }
        this.pg.body.setVelocity(fvx, fvy);
      }

      const px = this.pg.x, py = this.pg.y;

      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;

        /* AI by type */
        if (e.eType === 'sniper') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          const pref = 300;
          if (dist < pref - 50) {
            const a = Phaser.Math.Angle.Between(px, py, e.x, e.y);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          } else if (dist > pref + 70) {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 0.55, Math.sin(a) * e.eSpd * 0.55);
          } else {
            e.body.setVelocity(0, 0);
          }
          if (e.sniperState === 'idle' && time - e.lastShot > 3000) {
            e.sniperState = 'aiming'; e.aimStart = time;
            e.aimAt = { x: px, y: py };
            e.aimLine = this.add.graphics();
          }
          if (e.sniperState === 'aiming' && e.aimLine) {
            const prog = Math.min(1, (time - e.aimStart) / 900);
            e.aimLine.clear();
            e.aimLine.lineStyle(1 + Math.floor(prog * 2), 0xef4444, 0.25 + prog * 0.6);
            e.aimLine.lineBetween(e.x, e.y, e.aimAt.x, e.aimAt.y);
            if (prog >= 1) {
              e.sniperState = 'idle'; e.lastShot = time;
              e.aimLine.destroy(); e.aimLine = null;
              this.fireEnemyProj(e.x, e.y, e.aimAt.x, e.aimAt.y, e.eDmg * 1.85, 500, 0xf87171, 6);
            }
          }
        } else if (e.eType === 'burst') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 200) {
            e.body.setVelocity(0, 0);
            if (e.burstState === 'ready' && time - e.lastShot > 2600) {
              e.burstState = 'firing'; e.lastShot = time;
              for (let i = 0; i < 3; i++) {
                this.time.delayedCall(i * 130, () => {
                  if (e.active) this.fireEnemyProj(e.x, e.y, px, py, e.eDmg, 270, 0xe879f9, 5);
                });
              }
              this.time.delayedCall(420, () => { if (e.active) e.burstState = 'ready'; });
            }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'bomber') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 260) {
            e.body.setVelocity(0, 0);
            if (time - e.lastShot > 3800) {
              e.lastShot = time;
              this.dropBomb(e.x, e.y, px, py, e.eDmg * 2.2);
            }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'circler') {
          e.orbitAngle += delta * 0.0016;
          const targetDist = 215;
          const targetX = px + Math.cos(e.orbitAngle) * targetDist;
          const targetY = py + Math.sin(e.orbitAngle) * targetDist;
          const d2t = Phaser.Math.Distance.Between(e.x, e.y, targetX, targetY);
          if (d2t > 10) {
            const a = Phaser.Math.Angle.Between(e.x, e.y, targetX, targetY);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 2.2, Math.sin(a) * e.eSpd * 2.2);
          } else {
            e.body.setVelocity(0, 0);
          }
          if (time - e.lastShot > 1350) {
            e.lastShot = time;
            this.fireEnemyProj(e.x, e.y, px, py, e.eDmg, 230, 0xbef264, 5);
          }
        } else if (e.eType === 'ranged') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 260) {
            e.body.setVelocity(0, 0);
            if (time - e.lastShot > 2200) { e.lastShot = time; this.fireEnemyProj(e.x, e.y, px, py, e.eDmg); }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'charger') {
          if (e.chargeState === 'patrol') {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 0.4, Math.sin(a) * e.eSpd * 0.4);
            if (time > e.chargeTimer) {
              e.chargeState = 'windup'; e.chargeTimer = time + 600;
              e.chargeAngle = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(0, 0);
            }
          } else if (e.chargeState === 'windup') {
            e.body.setVelocity(0, 0);
            if (time > e.chargeTimer) { e.chargeState = 'charging'; e.chargeTimer = time + 700; }
          } else {
            e.body.setVelocity(Math.cos(e.chargeAngle) * e.eSpd * 3.8, Math.sin(e.chargeAngle) * e.eSpd * 3.8);
            if (time > e.chargeTimer) { e.chargeState = 'patrol'; e.chargeTimer = time + Phaser.Math.Between(1800, 3500); }
          }
        } else if (e.isBoss) {
          /* ── BOSS AI by type ── */
          const bt = e.bossType ?? 0;
          const bhp = e.eHp / e.eMaxHp;

          // Phase 2 enrage at 50% HP — faster + bigger attacks
          if (!e.phase2 && bhp <= 0.5) {
            e.phase2 = true;
            e.eSpd = e.eBaseSpd * 1.5;
            e.eBaseSpd = e.eSpd;
            const enrage = this.add.circle(e.x, e.y, e.eSize + 20, 0xff0000, 0);
            enrage.setStrokeStyle(3, 0xff0000, 0.9);
            this.tweens.add({ targets: enrage, scaleX: 3, scaleY: 3, alpha: 0, duration: 600, onComplete: () => enrage.destroy() });
            if (bt === 3) { // Dreadnought spawns 2 minis on phase 2
              for (let i = 0; i < 2; i++) {
                const a2 = (i / 2) * Math.PI * 2;
                this.mkEnemy(e.x + Math.cos(a2)*60, e.y + Math.sin(a2)*60,
                  22, e.eColor, e.eMaxHp * 0.3, e.eBaseSpd * 1.2, e.eDmg * 0.7,
                  Math.floor(e.eXp * 0.25), 'basic', true);
              }
            }
          }

          if (bt === 0) {
            /* ── COLOSSUS: charges + radial burst ── */
            if (e.chargeState === 'patrol') {
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.55, Math.sin(a)*e.eSpd*0.55);
              if (time > e.chargeTimer) {
                e.chargeState = 'windup'; e.chargeTimer = time + 900;
                e.chargeAngle = Phaser.Math.Angle.Between(e.x, e.y, px, py);
                e.body.setVelocity(0, 0);
                // Windup indicator — red arrow
                const warn = this.add.graphics();
                warn.fillStyle(0xff0000, 0.75);
                warn.fillTriangle(0,-e.eSize-22, -12,-e.eSize-8, 12,-e.eSize-8);
                warn.x = e.x; warn.y = e.y;
                warn.setRotation(e.chargeAngle - Math.PI/2);
                this.tweens.add({ targets: warn, alpha: 0, duration: 900, onComplete: () => warn.destroy() });
              }
            } else if (e.chargeState === 'windup') {
              e.body.setVelocity(0, 0);
              if (time > e.chargeTimer) { e.chargeState = 'charging'; e.chargeTimer = time + 600; }
            } else {
              e.body.setVelocity(Math.cos(e.chargeAngle)*e.eSpd*4.2, Math.sin(e.chargeAngle)*e.eSpd*4.2);
              if (time > e.chargeTimer) {
                e.chargeState = 'patrol'; e.chargeTimer = time + Phaser.Math.Between(e.phase2?1000:1800, e.phase2?2200:3500);
              }
            }
            // Radial burst every 5s (3s in phase2)
            const burstCd = e.phase2 ? 3000 : 5000;
            if (time - e.lastSpecial > burstCd) {
              e.lastSpecial = time;
              const shots = e.phase2 ? 12 : 8;
              for (let i = 0; i < shots; i++) {
                const a = (i / shots) * Math.PI * 2;
                this.fireEnemyProj(e.x, e.y, e.x+Math.cos(a)*100, e.y+Math.sin(a)*100, e.eDmg*0.8, 220, 0xfb7185, 7);
              }
            }

          } else if (bt === 1) {
            /* ── TEMPEST: orbits + spiral rings ── */
            e.orbitAngle = (e.orbitAngle || 0) + delta * 0.0012 * (e.phase2 ? 1.6 : 1);
            const dist1 = Phaser.Math.Distance.Between(px, py, e.x, e.y);
            const pref1 = 240;
            if (dist1 < pref1 - 50) {
              const a = Phaser.Math.Angle.Between(px, py, e.x, e.y);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.8, Math.sin(a)*e.eSpd*0.8);
            } else if (dist1 > pref1 + 60) {
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.6, Math.sin(a)*e.eSpd*0.6);
            } else {
              // Strafe sideways
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py) + Math.PI/2;
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.9, Math.sin(a)*e.eSpd*0.9);
            }
            // Spiral ring every 3.5s — player must dodge through gaps
            const spiralCd = e.phase2 ? 2000 : 3500;
            if (time - e.lastSpecial > spiralCd) {
              e.lastSpecial = time;
              const ringShots = e.phase2 ? 16 : 12;
              const gapSize  = e.phase2 ? 1 : 2; // number of missing shots (gap to dodge through)
              const gapStart = Math.floor(Math.random() * ringShots);
              for (let i = 0; i < ringShots; i++) {
                if (i === gapStart || i === (gapStart+1)%ringShots) continue; // gap!
                const a = (i / ringShots) * Math.PI * 2;
                this.time.delayedCall(i * 40, () => {
                  if (!e.active) return;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(a)*100, e.y+Math.sin(a)*100, e.eDmg*0.9, 200, 0x22d3ee, 6);
                });
              }
            }

          } else if (bt === 2) {
            /* ── VOIDWALKER: teleports + void zones ── */
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a)*e.eSpd*0.4, Math.sin(a)*e.eSpd*0.4);
            const tpCd = e.phase2 ? 2500 : 4000;
            if (time - e.lastSpecial > tpCd) {
              e.lastSpecial = time;
              // Flash warning at current pos
              const flash = this.add.circle(e.x, e.y, e.eSize + 14, 0x7c3aed, 0.7);
              this.tweens.add({ targets: flash, alpha: 0, scaleX: 2.5, scaleY: 2.5, duration: 400, onComplete: () => flash.destroy() });
              // Leave void zone at old position
              this.spawnVoidRift(e.x, e.y);
              // Teleport
              this.time.delayedCall(380, () => {
                if (!e.active) return;
                const newX = Phaser.Math.Clamp(px + Phaser.Math.Between(-200, 200), 60, W-60);
                const newY = Phaser.Math.Clamp(py + Phaser.Math.Between(-200, 200), 60, H-60);
                e.x = newX; e.y = newY; e.body.reset(newX, newY);
                // Arrive flash
                const arrive = this.add.circle(e.x, e.y, e.eSize + 8, 0xa78bfa, 0.8);
                this.tweens.add({ targets: arrive, alpha: 0, duration: 300, onComplete: () => arrive.destroy() });
                // Immediate aimed shot burst on arrival
                const shots2 = e.phase2 ? 5 : 3;
                for (let i = 0; i < shots2; i++) {
                  const spread = (i - Math.floor(shots2/2)) * 0.25;
                  const ta = Phaser.Math.Angle.Between(e.x, e.y, px, py) + spread;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(ta)*100, e.y+Math.sin(ta)*100, e.eDmg, 310, 0xa78bfa, 6);
                }
              });
            }

          } else {
            /* ── DREADNOUGHT: all mechanics combined ── */
            // Movement: aggressive chase
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a)*e.eSpd*0.75, Math.sin(a)*e.eSpd*0.75);
            // Cycle: charge → ring → mines, every 2.5s
            const dreadCd = e.phase2 ? 1800 : 2800;
            if (time - e.lastSpecial > dreadCd) {
              e.lastSpecial = time;
              e._dreadPhase = ((e._dreadPhase||0) + 1) % 3;
              if (e._dreadPhase === 0) {
                // Charge
                const ca = Phaser.Math.Angle.Between(e.x, e.y, px, py);
                const warn2 = this.add.graphics();
                warn2.fillStyle(0xfbbf24, 0.7);
                warn2.fillTriangle(0,-e.eSize-20, -10,-e.eSize-8, 10,-e.eSize-8);
                warn2.x = e.x; warn2.y = e.y; warn2.setRotation(ca - Math.PI/2);
                this.tweens.add({ targets: warn2, alpha: 0, duration: 700, onComplete: () => warn2.destroy() });
                this.time.delayedCall(700, () => {
                  if (!e.active) return;
                  e.body.setVelocity(Math.cos(ca)*e.eSpd*5, Math.sin(ca)*e.eSpd*5);
                  this.time.delayedCall(500, () => { if (e.active) e.body.setVelocity(0,0); });
                });
              } else if (e._dreadPhase === 1) {
                // Partial ring with gap
                const ringN = e.phase2 ? 14 : 10;
                const gapIdx = Math.floor(Math.random() * ringN);
                for (let i = 0; i < ringN; i++) {
                  if (i === gapIdx || i === (gapIdx+1)%ringN) continue;
                  const ra = (i / ringN) * Math.PI * 2;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(ra)*100, e.y+Math.sin(ra)*100, e.eDmg*0.75, 240, 0xfbbf24, 6);
                }
              } else {
                // Drop bombs at player position + random offset
                const bombs = e.phase2 ? 3 : 2;
                for (let b = 0; b < bombs; b++) {
                  const bx = px + Phaser.Math.Between(-80, 80);
                  const by = py + Phaser.Math.Between(-80, 80);
                  this.dropBomb(e.x, e.y, bx, by, e.eDmg * 1.8);
                }
              }
            }
          }

        } else {
          const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
          e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
        }

        /* HP bar */
        const bw = e.eSize * 2.8;
        e.hpBar.clear();
        e.hpBar.fillStyle(0x000000, 0.55);
        e.hpBar.fillRect(e.x - bw/2, e.y - e.eSize - 11, bw, 4);
        e.hpBar.fillStyle(e.isBoss ? 0xfbbf24 : 0xef4444, 1);
        e.hpBar.fillRect(e.x - bw/2, e.y - e.eSize - 11, bw * Math.max(0, e.eHp / e.eMaxHp), 4);
        /* Consecrate aura (Paladin) */
      if (this.ps.consecrateDmg) {
        const cR = this.ps.consecrateR || 80;
        /* Persistent ring visual — create once, update position each frame */
        if (!this._consecRing) {
          this._consecRing = this.add.graphics().setDepth(1);
          this._consecPulse = this.add.circle(this.pg.x, this.pg.y, cR, 0xfef9c3, 0).setDepth(1);
          /* Breathe: outer ring pulses in/out gently */
          this._consecRingAlpha = 0.22;
          this._consecBreath = this.tweens.add({
            targets: this._consecPulse,
            scaleX: { from: 0.92, to: 1.06 }, scaleY: { from: 0.92, to: 1.06 },
            alpha: { from: 0.04, to: 0.10 },
            duration: 1100, yoyo: true, repeat: -1, ease: 'sine.inOut',
          });
        }
        /* Redraw ring every frame to follow player */
        this._consecRing.clear();
        /* Outer glow ring */
        this._consecRing.lineStyle(3, 0xfef9c3, 0.30);
        this._consecRing.strokeCircle(this.pg.x, this.pg.y, cR);
        /* Inner faint fill ring */
        this._consecRing.lineStyle(1, 0xfbbf24, 0.18);
        this._consecRing.strokeCircle(this.pg.x, this.pg.y, cR * 0.72);
        /* Rotating cross markers on the ring */
        const rot = (time * 0.0008) % (Math.PI * 2);
        for (let i = 0; i < 4; i++) {
          const a = rot + i * Math.PI / 2;
          const mx = this.pg.x + Math.cos(a) * cR;
          const my = this.pg.y + Math.sin(a) * cR;
          this._consecRing.fillStyle(0xfef9c3, 0.55);
          this._consecRing.fillCircle(mx, my, 3.5);
          this._consecRing.lineStyle(1.5, 0xfef9c3, 0.35);
          this._consecRing.lineBetween(mx - 6, my, mx + 6, my);
          this._consecRing.lineBetween(mx, my - 6, mx, my + 6);
        }
        this._consecPulse.setPosition(this.pg.x, this.pg.y).setRadius(cR);

        /* Damage tick every 1s */
        if (time - this._lastConsecrateT > 1000) {
          this._lastConsecrateT = time;
          this.enemies.getChildren().forEach(e => {
            if (!e.active) return;
            if (Phaser.Math.Distance.Between(this.pg.x, this.pg.y, e.x, e.y) <= cR) {
              e.eHp -= this.ps.consecrateDmg; this.totalDmg = (this.totalDmg||0)+this.ps.consecrateDmg;
              this.hitFlash(e);
              if (this.ps.consecrateSlow) { e.eSpd = e.eBaseSpd * (1-this.ps.consecrateSlow); this.time.delayedCall(1100,()=>{ if(e.active)e.eSpd=e.eBaseSpd; }); }
              if (e.eHp <= 0 && e.active) this.killEnemy(e);
            }
          });
          /* Radiant pulse flash on tick */
          const flash = this.add.circle(this.pg.x, this.pg.y, cR, 0xfef9c3, 0.18).setDepth(1);
          this.tweens.add({ targets: flash, alpha: 0, scaleX: 1.15, scaleY: 1.15, duration: 400, ease: 'power2.out', onComplete: () => flash.destroy() });
        }
      }
      /* Stunned enemy — freeze velocity */
      this.enemies.getChildren().forEach(e => { if (e.active && e.stunUntil && this.time.now < e.stunUntil && e.body) e.body.setVelocity(0,0); });
      /* Elite aura + label follow */
        if (e.eliteAura) e.eliteAura.setPosition(e.x, e.y);
        if (e.eliteLabel) e.eliteLabel.setPosition(e.x, e.y - e.eSize - 16);
        /* Shielder — rotate shield arc toward player and show shield HP bar */
        if (e.shieldArc && e.shieldHp > 0) {
          const ang = Phaser.Math.Angle.Between(e.x, e.y, px, py);
          e.shieldArc.setPosition(e.x, e.y);
          e.shieldArc.setRotation(ang);
          /* Shield HP ticks */
          const sw = e.eSize * 2.8;
          e.hpBar.fillStyle(0x1e40af, 0.8);
          e.hpBar.fillRect(e.x - sw/2, e.y - e.eSize - 16, sw * (e.shieldHp / e.shieldMaxHp), 3);
        }

        /* Contact damage */
        const dist2 = Phaser.Math.Distance.Between(px, py, e.x, e.y);
        if (dist2 < 16 + e.eSize && time - e.lastDmgT > 650) {
          e.lastDmgT = time;
          if (this.shieldActive) {
            this.breakShield(time);
          } else {
            this.takeDamage(e.eDmg);
            if (this.ps.thorns && !(e.shieldHp > 0)) { e.eHp -= this.ps.thorns; if (e.eHp <= 0) { this.killEnemy(e); return; } }
          }
        }
      });

      /* XP magnet */
      this.xpOrbs.getChildren().forEach(o => {
        if (!o.active) return;
        const d = Phaser.Math.Distance.Between(px, py, o.x, o.y);
        if (d < this.ps.xpRange) {
          const a = Phaser.Math.Angle.Between(o.x, o.y, px, py);
          o.body.setVelocity(Math.cos(a) * 300, Math.sin(a) * 300);
        } else { o.body.setVelocity(0, 0); }
      });

      /* Orbiting shards */
      if (this.orbitals.length) {
        const n = this.orbitals.length;
        this.orbitals.forEach((o, i) => {
          const angle = (time * 0.002) + (i * Math.PI * 2 / n);
          o.x = px + Math.cos(angle) * 65; o.y = py + Math.sin(angle) * 65;
          o.body.reset(o.x, o.y);
          this.enemies.getChildren().forEach(e => {
            if (!e.active) return;
            if (Phaser.Math.Distance.Between(o.x, o.y, e.x, e.y) < 9 + e.eSize && time - (o.hitTimes[e._id] || 0) > 500) {
              o.hitTimes[e._id] = time;
              e.eHp -= this.ps.orbitDmg;
              if (e.eHp <= 0) this.killEnemy(e);
            }
          });
        });
      }

      /* Haste visual */
      if (this.ps.hasteBonus && time < this.hasteUntil) {
        if (!this._hastePart || !this._hastePart.active) {
          this._hastePart = this.add.circle(px, py, 18, 0x60a5fa, 0.18);
        }
        this._hastePart.setPosition(px, py);
      } else if (this._hastePart && this._hastePart.active && time >= this.hasteUntil) {
        this._hastePart.destroy(); this._hastePart = null;
      }

      /* Spectral Shield */
      if (this.ps.shieldCd) {
        if (!this.shieldActive && time >= this.shieldUntilReady) {
          this.shieldActive = true;
          if (!this.shieldViz) this.shieldViz = this.add.arc(px, py, 24, 0, 360, false, 0x93c5fd, 0).setStrokeStyle(2, 0x93c5fd, 0.9);
        }
        if (this.shieldViz) this.shieldViz.setPosition(px, py).setAlpha(this.shieldActive ? 1 : 0);
      }

      /* Cursed Aura */
      if (this.ps.auraDmg) {
        if (!this.auraViz) {
          this.auraViz = this.add.circle(px, py, this.ps.auraRange, 0x7c3aed, 0.09);
          this.tweens.add({ targets: this.auraViz, alpha: 0.18, duration: 900, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        }
        this.auraViz.setPosition(px, py).setRadius(this.ps.auraRange);
        if (time - this.lastAura > 1000) {
          this.lastAura = time;
          this.enemies.getChildren().forEach(e => {
            if (!e.active) return;
            if (Phaser.Math.Distance.Between(px, py, e.x, e.y) < this.ps.auraRange + e.eSize) {
              e.eHp -= this.ps.auraDmg;
              if (e.eHp <= 0) this.killEnemy(e);
            }
          });
        }
      }

      /* Magnetism */
      if (this.ps.magnetRange) {
        this.xpOrbs.getChildren().forEach(orb => {
          if (!orb.active) return;
          if (Phaser.Math.Distance.Between(px, py, orb.x, orb.y) < this.ps.magnetRange) {
            const a = Phaser.Math.Angle.Between(orb.x, orb.y, px, py);
            orb.body.setVelocity(Math.cos(a) * this.ps.magnetSpd, Math.sin(a) * this.ps.magnetSpd);
          }
        });
      }

      /* Ground slam */
      if (this.ps.slamDmg && time - this.lastSlam > this.ps.slamCd) {
        this.lastSlam = time; this.doSlam();
      }

      /* Void Pulse */
      if (this.ps.pulseDmg && time - this.lastPulse > (this.ps.pulseCd || 6000)) {
        this.lastPulse = time; this.doPulse();
      }

      /* Meteor Strike */
      if (this.ps.meteorDmg && time - this.lastMeteor > (this.ps.meteorCd || 12000)) {
        this.lastMeteor = time; this.doMeteor();
      }

      /* Frost Nova */
      if (this.ps.frostNova && this.ps.hp < this.ps.maxHp * 0.20 && time - this.lastFrostNova > 10000) {
        this.lastFrostNova = time; this.doFrostNova();
      }

      /* Barrage */
      if (this.ps.barrageShots && time - this.lastBarrage > this.ps.barrageCd) {
        this.lastBarrage = time; this.doBarrage();
      }

      /* Blizzard */
      if (this.ps.blizzardCd && time - this.lastBlizzard > this.ps.blizzardCd) {
        this.lastBlizzard = time; this.doBlizzard(time);
      }

      /* Stormcaller */
      if (this.ps.stormCount && time - this.lastStorm > this.ps.stormCd) {
        this.lastStorm = time;
        const alive = this.enemies.getChildren().filter(e => e.active);
        const shuffled = [...alive].sort(() => Math.random() - 0.5).slice(0, this.ps.stormCount);
        shuffled.forEach(e => {
          const bolt = this.add.graphics();
          bolt.lineStyle(2, 0xfde047, 0.95);
          bolt.lineBetween(e.x, e.y - 200, e.x + Phaser.Math.Between(-20, 20), e.y);
          this.tweens.add({ targets: bolt, alpha: 0, duration: 250, onComplete: () => bolt.destroy() });
          const flash = this.add.circle(e.x, e.y, e.eSize + 6, 0xfde047, 0.7);
          this.tweens.add({ targets: flash, alpha: 0, scaleX: 2, scaleY: 2, duration: 200, onComplete: () => flash.destroy() });
          e.eHp -= this.ps.stormDmg;
          if (e.eHp <= 0) this.killEnemy(e);
        });
      }

      /* Sentinel — slow nearby enemies */
      if (this.ps.sentinelRange) {
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          const d = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (d < this.ps.sentinelRange) {
            e.eSpd = e.eBaseSpd * (1 - this.ps.sentinelSlow);
          } else if (e._sentinelSlowed) {
            e.eSpd = e.eBaseSpd;
          }
          e._sentinelSlowed = d < this.ps.sentinelRange;
        });
      }

      /* Warcry */
      if (this.ps.warcryCd && time - this.lastWarcry > this.ps.warcryCd) {
        this.lastWarcry = time; this.doWarcry(time);
      }

      /* Poison tick on enemies */
      this.enemies.getChildren().forEach(e => {
        if (!e.active || !e.poisonEnd || time > e.poisonEnd) return;
        if (time > (e.poisonTick || 0)) {
          e.poisonTick = time + 500;
          e.eHp -= (e.poisonDmgPerTick || 0);
          if (e.eHp <= 0) this.killEnemy(e);
        }
      });

      /* Regen */
      if (this.ps.regen) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.regen * (delta / 1000));

      /* Minion AI */
      this.minions.getChildren().forEach(m => {
        if (!m.active) return;
        if (time > m.minionLifeEnd) { m.destroy(); return; }
        const alive = this.enemies.getChildren().filter(e => e.active);
        if (!alive.length) { m.body.setVelocity(0, 0); return; }
        const nearest = alive.reduce((a, b) =>
          Phaser.Math.Distance.Between(m.x, m.y, a.x, a.y) <= Phaser.Math.Distance.Between(m.x, m.y, b.x, b.y) ? a : b
        );
        const a = Phaser.Math.Angle.Between(m.x, m.y, nearest.x, nearest.y);
        m.body.setVelocity(Math.cos(a) * m.minionSpd, Math.sin(a) * m.minionSpd);
      });

      this.autoAttack(time);
      this.events.emit('stats', this.ps);
    }

    onMinionHit(minion, enemy) {
      if (!minion.active || !enemy.active) return;
      if (this.time.now - (minion.lastHit || 0) < 800) return;
      minion.lastHit = this.time.now;
      const d = Math.floor((this.ps.dmg || 20) * 0.4 * (this.ps.minionDmg || 1));
      enemy.eHp -= d; this.hitFlash(enemy);
      const t = this.add.text(enemy.x, enemy.y - enemy.eSize - 4, d, {
        fontSize: '11px', fontFamily: 'system-ui', color: '#a78bfa',
        fontStyle: 'bold', stroke: '#000', strokeThickness: 2,
      }).setOrigin(0.5);
      this.tweens.add({ targets: t, y: t.y - 24, alpha: 0, duration: 600, onComplete: () => t.destroy() });
      if (enemy.eHp <= 0) this.killEnemy(enemy);
    }

    doPulse() {
      const px = this.pg.x, py = this.pg.y;
      const r = 180;
      for (let i = 0; i < 2; i++) {
        const ring = this.add.arc(px, py, 18, 0, 360, false, 0x60a5fa, 0);
        ring.setStrokeStyle(3 - i, 0x60a5fa, 0.85 - i * 0.25);
        this.tweens.add({ targets: ring, scaleX: r/18 + i, scaleY: r/18 + i, alpha: 0, duration: 450 + i * 100, ease: 'power2.out', onComplete: () => ring.destroy() });
      }
      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;
        const d = Phaser.Math.Distance.Between(px, py, e.x, e.y);
        if (d < r + e.eSize) {
          e.eHp -= this.ps.pulseDmg;
          const angle = Phaser.Math.Angle.Between(px, py, e.x, e.y);
          e.body.setVelocity(Math.cos(angle) * 420, Math.sin(angle) * 420);
          this.time.delayedCall(280, () => { if (e.active) e.body.setVelocity(0, 0); });
          if (e.eHp <= 0) this.killEnemy(e);
        }
      });
    }

    doMeteor() {
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;
      const target = all[Math.floor(Math.random() * Math.min(5, all.length))];
      const tx = target.x, ty = target.y;
      const warn = this.add.circle(tx, ty, 65, 0xff4500, 0.18);
      this.tweens.add({ targets: warn, alpha: 0.45, duration: 250, yoyo: true, repeat: 2, onComplete: () => warn.destroy() });
      // Falling meteor visual
      const mHead = this.add.circle(tx - 120, ty - 150, 18, 0xff4500, 0.9);
      this.tweens.add({ targets: mHead, x: tx, y: ty, duration: 750, ease: 'power2.in',
        onComplete: () => {
          mHead.destroy();
          if (this.dead) return;
          const expl = this.add.circle(tx, ty, 12, 0xff6b00, 1);
          this.tweens.add({ targets: expl, scaleX: 9, scaleY: 9, alpha: 0, duration: 420, ease: 'power2.out', onComplete: () => expl.destroy() });
          this.enemies.getChildren().forEach(e => {
            if (!e.active) return;
            if (Phaser.Math.Distance.Between(tx, ty, e.x, e.y) < 90 + e.eSize) {
              e.eHp -= this.ps.meteorDmg;
              if (e.eHp <= 0) this.killEnemy(e);
            }
          });
        }
      });
    }

    doFrostNova() {
      const px = this.pg.x, py = this.pg.y;
      const ring = this.add.arc(px, py, 18, 0, 360, false, 0x93c5fd, 0);
      ring.setStrokeStyle(4, 0x93c5fd, 0.95);
      this.tweens.add({ targets: ring, scaleX: 20, scaleY: 20, alpha: 0, duration: 500, ease: 'power2.out', onComplete: () => ring.destroy() });
      const r = this.ps.frostNovaAll ? 9999 : 200;
      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;
        if (Phaser.Math.Distance.Between(px, py, e.x, e.y) < r + e.eSize) {
          e.eSpd = 0;
          this.time.delayedCall(4000, () => { if (e.active) e.eSpd = e.eBaseSpd; });
          if (this.ps.frostNovaDmg) { e.eHp -= this.ps.frostNovaDmg; if (e.eHp <= 0) this.killEnemy(e); }
        }
      });
    }

    breakShield(time) {
      this.shieldActive = false;
      this.shieldUntilReady = time + this.ps.shieldCd;
      // Crack shards — small arcs that scatter outward
      const px = this.pg.x, py = this.pg.y;
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + Math.random() * 0.4;
        const shard = this.add.arc(px, py, 14, 0, 50, false, 0x93c5fd, 0.7);
        shard.setRotation(angle);
        this.tweens.add({
          targets: shard,
          x: px + Math.cos(angle) * 38, y: py + Math.sin(angle) * 38,
          alpha: 0, scaleX: 0.3, scaleY: 0.3,
          duration: 380, ease: 'power2.out',
          onComplete: () => shard.destroy()
        });
      }
      if (this.shieldViz) { this.shieldViz.setAlpha(0); }
    }

    doBarrage() {
      const { x: px, y: py } = this.pg;
      for (let i = 0; i < this.ps.barrageShots; i++) {
        const angle = (i / this.ps.barrageShots) * Math.PI * 2;
        const p = this.add.graphics();
        p.fillStyle(0x60a5fa, 1); p.fillCircle(0, 0, 5);
        p.x = px; p.y = py;
        this.physics.add.existing(p);
        p.body.setCircle(5, -5, -5);
        p.body.setVelocity(Math.cos(angle) * this.ps.projSpd, Math.sin(angle) * this.ps.projSpd);
        p.pierceLeft = this.ps.pierce;
        this.projectiles.add(p);
        this.time.delayedCall(1800, () => { if (p.active) p.destroy(); });
      }
    }

    doBlizzard(time) {
      const overlay = this.add.rectangle(W/2, H/2, W, H, 0x93c5fd, 0.12);
      this.tweens.add({ targets: overlay, alpha: 0, duration: this.ps.blizzardDur, onComplete: () => overlay.destroy() });
      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;
        const prevSpd = e.eBaseSpd;
        e.eSpd = this.ps.blizzardFreeze ? 0 : e.eBaseSpd * (1 - (this.ps.blizzardSlow || 0.6));
        this.time.delayedCall(this.ps.blizzardDur, () => { if (e.active) e.eSpd = prevSpd; });
      });
    }

    doWarcry(time) {
      const px = this.pg.x, py = this.pg.y;
      const ring = this.add.arc(px, py, 20, 0, 360, false, 0xfbbf24, 0);
      ring.setStrokeStyle(4, 0xfbbf24, 1);
      this.tweens.add({ targets: ring, scaleX: 12, scaleY: 12, alpha: 0, duration: 450, ease: 'power2.out', onComplete: () => ring.destroy() });
      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;
        if (Phaser.Math.Distance.Between(px, py, e.x, e.y) > 280) return;
        const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
        e.body.setVelocity(Math.cos(a) * 320, Math.sin(a) * 320);
        this.time.delayedCall(400, () => { if (e.active) e.body.setVelocity(0, 0); });
      });
      this.warcryUntil = time + this.ps.warcryDur;
    }

    onDeath() {
      if (this.dead) return;
      window._showTouchControls(false);
      window._triggerPause = null;
      // Undying — revive instead of dying
      if (this.ps.undying && this.ps.reviveCount > 0) {
        this.ps.reviveCount--;
        this.ps.hp = Math.floor(this.ps.maxHp * (this.ps.undyingHp || 0.25));
        this.shieldActive = true; this.shieldUntilReady = this.time.now + 4000; // brief invulnerability
        return;
      }
      this.dead = true; this.physics.pause();
      window._SFX.death();
      const timeSec = Math.floor((Date.now() - this._runStart) / 1000);
      const baseSouls = Math.floor(this.waveNum * 3 + this.ps.kills * 0.15);
      const souls = Math.floor(baseSouls * (this.ps.soulMult || 1));
      postScore(localStorage.getItem('hoa_name') || 'Unknown', this.waveNum, this.ps.kills, this.ps.level, this.ps.class, this.ps.is1hp);
      const meta2 = loadMeta();
      if ((this.waveNum  > (meta2.bestWave  || 0))) meta2.bestWave  = this.waveNum;
      if ((this.ps.kills > (meta2.bestKills || 0))) meta2.bestKills = this.ps.kills;
      if ((this.ps.level > (meta2.bestLevel || 0))) meta2.bestLevel = this.ps.level;
      saveMeta(meta2);
      /* Update persistent stats */
      const st = loadStats();
      st.totalKills = (st.totalKills||0) + this.ps.kills;
      st.totalRuns  = (st.totalRuns||0)  + 1;
      st.totalSouls = (st.totalSouls||0) + souls;
      st.totalBossKills = (st.totalBossKills||0) + (this._bossKills||0);
      st.bestWave   = Math.max(st.bestWave||0, this.waveNum);
      st.bestLevel  = Math.max(st.bestLevel||0, this.ps.level);
      st.bestKillRun  = Math.max(st.bestKillRun||0, this.ps.kills);
      st.bestEliteRun = Math.max(st.bestEliteRun||0, this._eliteKills||0);
      st.bestDmgRun   = Math.max(st.bestDmgRun||0, this.totalDmg||0);
      st.lastTimeSec  = timeSec;
      if (this.ps.is1hp) st.best1hpSec = Math.max(st.best1hpSec||0, timeSec);
      st['played_'+(this.ps.class||'hunter')] = true;
      const legendaryCount = (this.ps.traits||[]).filter(id=>{ const bp=BLUEPRINTS.find(b=>b.id===id); return bp&&bp._takenTier==='legendary'; }).length;
      st.bestLegendaryRun = Math.max(st.bestLegendaryRun||0, legendaryCount);
      if (this._perfectWaveEver) st.perfectWaveEver = true;
      saveStats(st);
      this._newAchievements = checkAchievements(st);
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.time.delayedCall(420, () => {

        });

      g.events.on('kill',  k  => this.killTxt.setText(`Kills: ${k}`));
      g.events.on('stats', ps => {
        this.hpBar.width = 210 * Math.max(0, ps.hp / ps.maxHp);
        this.hpTxt.setText(`HP  ${Math.max(0, Math.floor(ps.hp))} / ${ps.maxHp}`);
        this.xpBar.width = 210 * (ps.xp / ps.xpNext);
        this.levelTxt.setText(`Level ${ps.level}`);
        this._refreshTraits(ps);
      });
    }

    _refreshTraits(ps) {
      const traits = ps.traits || [];
      const stacks = ps.traitStacks || {};
      const b = ps.b || {};
      /* Rebuild whenever stacks change, not just trait count */
      const stackSig = JSON.stringify(stacks);
      if (stackSig === this._lastStackSig) return;
      this._lastStackSig = stackSig;
      this._lastTraitCount = traits.length;
      this._traitContainer.removeAll(true);

      const W_PANEL = 148, pillH = 17, gap = 3;
      let row = 0;

      /* ── Section 1: accumulated stat totals via fmt() ── */
      const statLines = [];
      BLUEPRINTS.forEach(bp => {
        if (!bp.fmt) return;
        const line = bp.fmt(b);
        if (line && !statLines.includes(line)) statLines.push(line);
      });

      statLines.forEach(line => {
        const y = -(row * (pillH + gap));
        const bg = this.add.graphics();
        bg.fillStyle(0x0d0820, 0.90);
        bg.fillRoundedRect(-W_PANEL, y - pillH/2, W_PANEL - 4, pillH, 3);
        bg.lineStyle(1, 0x4c1d95, 0.60);
        bg.strokeRoundedRect(-W_PANEL, y - pillH/2, W_PANEL - 4, pillH, 3);
        const lbl = this.add.text(-W_PANEL/2 - 2, y, line.trim(), {
          fontSize: '10px', fontFamily: 'system-ui', color: '#c4b5fd',
        }).setOrigin(0.5);
        this._traitContainer.add([bg, lbl]);
        row++;
      });

      /* ── Divider + TRAITS header ── */
      if (traits.length > 0 && statLines.length > 0) {
        const dy = -(row * (pillH + gap));
        const div = this.add.graphics();
        div.lineStyle(1, 0x4c1d95, 0.35);
        div.lineBetween(-W_PANEL, dy, -4, dy);
        this._traitContainer.add(div);
        row += 0.8;
      }

      /* ── Section 2: trait name pills with ×N stacks ── */
      traits.slice().reverse().forEach(id => {
        const bp = BLUEPRINTS.find(b => b.id === id);
        const name = bp ? bp.name : id;
        const n = stacks[id] || 1;
        const label = n > 1 ? `${name} ×${n}` : name;
        const y = -(row * (pillH + gap));
        const pill = this.add.graphics();
        pill.fillStyle(0x1e1030, 0.82);
        pill.fillRoundedRect(-W_PANEL, y - pillH/2, W_PANEL - 4, pillH, 4);
        pill.lineStyle(1, 0x7c3aed, 0.45);
        pill.strokeRoundedRect(-W_PANEL, y - pillH/2, W_PANEL - 4, pillH, 4);
        const txt = this.add.text(-W_PANEL/2 - 2, y, label, {
          fontSize: '10px', fontFamily: 'system-ui', color: n > 1 ? '#fbbf24' : '#a78bfa',
        }).setOrigin(0.5);
        this._traitContainer.add([pill, txt]);
        row++;
      });

      if (traits.length > 0) {
        const hy = -(row * (pillH + gap));
        const htxt = this.add.text(-W_PANEL/2 - 2, hy + 6, 'TRAITS', {
          fontSize: '9px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#4c1d95',
        }).setOrigin(0.5);
        this._traitContainer.add(htxt);
      }
    }

    update() {
      if (this.trackedBoss && this.trackedBoss.active) {
        this.bossBarFill.width = this._bossBarW * Math.max(0, this.trackedBoss.eHp / this.trackedBoss.eMaxHp);
      }
    }
  }

  /* ── LEVEL UP ── */
  class LevelUpScene extends Phaser.Scene {
    constructor() { super('LevelUp'); }
    init(d) { this.ps = d.ps; this.game_ = d.game; }
    create() {
      this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.70);
      this.add.text(W / 2, H / 2 - 185, `LEVEL ${this.ps.level}`, {
        fontSize: '38px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#a78bfa',
      }).setOrigin(0.5);
      this.add.text(W / 2, H / 2 - 135, 'Choose a trait', {
        fontSize: '17px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.45)',
      }).setOrigin(0.5);

      const offers = pickOffers(this.ps.class || 'hunter', this.ps.traits || [], this.ps.is1hp);
      const cw = Math.min(200, (W - 130) / 3);
      const ch = 165, gap = 22;
      const sx = W / 2 - (cw * 3 + gap * 2) / 2;

      offers.forEach(({ bp, tier, desc, fn }, i) => {
        const tc = TIER_CFG[tier];
        const cx = sx + i * (cw + gap), cy = H / 2 - 80;

        const card = this.add.rectangle(cx, cy, cw, ch, tc.bg, 0.97).setOrigin(0).setInteractive({ useHandCursor: true });
        card.setStrokeStyle(tier === 'legendary' ? 2.5 : 1.5, tc.border);

        this.add.text(cx + cw / 2, cy + 14, tc.label, {
          fontSize: '10px', fontFamily: 'system-ui', fontStyle: 'bold', color: tc.col, letterSpacing: 2,
        }).setOrigin(0.5, 0);

        const stacks = (this.ps.traitStacks || {})[bp.id] || 0;
        const nameLabel = stacks > 0 ? `${bp.name}  ×${stacks + 1}` : bp.name;
        this.add.text(cx + cw / 2, cy + 38, nameLabel, {
          fontSize: '16px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#f1f5f9',
          wordWrap: { width: cw - 20 }, align: 'center',
        }).setOrigin(0.5, 0);

        this.add.text(cx + cw / 2, cy + 80, desc, {
          fontSize: '13px', fontFamily: 'system-ui', color: tc.col,
          wordWrap: { width: cw - 20 }, align: 'center',
        }).setOrigin(0.5, 0);

        /* Current accumulated total for this trait */
        if (stacks > 0 && bp.fmt && this.ps.b) {
          const currentTotal = bp.fmt(this.ps.b);
          if (currentTotal) {
            this.add.text(cx + cw / 2, cy + ch - 18, `now: ${currentTotal.split(/\s{2,}/)[1] || currentTotal}`, {
              fontSize: '11px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.45)',
              wordWrap: { width: cw - 16 }, align: 'center',
            }).setOrigin(0.5, 0);
          }
        }

        card.on('pointerover', () => card.setFillColor(tc.hover));
        card.on('pointerout',  () => card.setFillColor(tc.bg));
        card.on('pointerdown', () => {
          fn(this.ps);
          if (!this.ps.traits) this.ps.traits = [];
          if (!this.ps.traitStacks) this.ps.traitStacks = {};
          this.ps.traitStacks[bp.id] = (this.ps.traitStacks[bp.id] || 0) + 1;
          if (!this.ps.traits.includes(bp.id)) { this.ps.traits.push(bp.id); bp._takenTier = tier; }
          window._SFX.levelUp();
          this.game_.resume();
        });

        this.tweens.add({ targets: card, alpha: { from: 0, to: 0.97 }, y: { from: cy + 20, to: cy }, duration: 270, delay: i * 90, ease: 'power2.out' });
      });

      /* ── CURSE BUTTON ── */
      this._buildCurseBtn();
    }

    _buildCurseBtn() {
      /* Pick 2 random curses */
      const pool = [...CURSES].sort(() => Math.random() - 0.5).slice(0, 2);
      const curse = pool[Math.floor(Math.random() * pool.length)];
      const souls = curse.souls;

      const bw = 310, bh = 44;
      const bx = W / 2, by = H / 2 + 115;

      const btn = this.add.rectangle(bx, by, bw, bh, 0x3b0000, 0.92)
        .setStrokeStyle(1.5, 0xef4444, 0.8)
        .setInteractive({ useHandCursor: true });

      this.add.text(bx, by - 8, `⚠  TAKE A CURSE: ${curse.name}`, {
        fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#ef4444',
      }).setOrigin(0.5);
      this.add.text(bx, by + 10, `${curse.desc}  —  +${souls} souls`, {
        fontSize: '11px', fontFamily: 'system-ui', color: '#fca5a5',
      }).setOrigin(0.5);

      btn.on('pointerover', () => btn.setFillStyle(0x5c1111, 0.95));
      btn.on('pointerout',  () => btn.setFillStyle(0x3b0000, 0.92));
      btn.on('pointerdown', () => {
        curse.apply(this.ps);
        this.ps._curseSouls = (this.ps._curseSouls || 0) + souls;
        this.game_.resume();
      });
    }
  }

  /* ── END-OF-RUN SUMMARY ── */
  class SummaryScene extends Phaser.Scene {
    constructor() { super('Summary'); }
    init(d) {
      this.souls = d.souls; this.wave = d.wave; this.kills = d.kills;
      this.level = d.level; this.totalDmg = d.totalDmg; this.traits = d.traits || [];
      this.curseSouls = d.curseSouls || 0; this.timeSec = d.timeSec || 0;
      this.newAch = d.newAch || [];
    }
    create() {
      const cx = W / 2;
      this.cameras.main.setBackgroundColor('#06000f');
      this.cameras.main.fadeIn(350, 0, 0, 0);

      /* Title */
      this.add.text(cx, 52, 'RUN COMPLETE', {
        fontSize: '34px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#a78bfa', letterSpacing: 6,
      }).setOrigin(0.5);

      /* Stats panel */
      const panelY = 130;
      const mm = String(Math.floor(this.timeSec/60)).padStart(2,'0');
      const ss = String(this.timeSec%60).padStart(2,'0');
      const stats = [
        ['Wave Reached',   this.wave],
        ['Enemies Slain',  this.kills],
        ['Damage Dealt',   (this.totalDmg||0).toLocaleString()],
        ['Level Reached',  this.level],
        ['Time Survived',  `${mm}:${ss}`],
        ['Souls Earned',   this.souls + this.curseSouls + (this.curseSouls > 0 ? ` (+${this.curseSouls} curse)` : '')],
      ];
      stats.forEach(([label, val], i) => {
        const y = panelY + i * 44;
        this.add.rectangle(cx, y, 420, 36, 0x1a0033, 0.85).setOrigin(0.5);
        this.add.text(cx - 160, y, label, {
          fontSize: '15px', fontFamily: 'system-ui', color: '#94a3b8',
        }).setOrigin(0, 0.5);
        this.add.text(cx + 160, y, String(val), {
          fontSize: '16px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#e2e8f0',
        }).setOrigin(1, 0.5);
      });

      /* Traits taken */
      const traitsY = panelY + stats.length * 44 + 24;
      this.add.text(cx, traitsY, 'TRAITS TAKEN', {
        fontSize: '12px', fontFamily: 'system-ui', fontStyle: 'bold',
        color: '#7c3aed', letterSpacing: 3,
      }).setOrigin(0.5);

      const traitNames = this.traits.map(id => {
        const bp = BLUEPRINTS.find(b => b.id === id);
        return bp ? bp.name : id;
      });
      const traitStr = traitNames.length ? traitNames.join('  ·  ') : 'None';
      this.add.text(cx, traitsY + 24, traitStr, {
        fontSize: '12px', fontFamily: 'system-ui', color: '#a78bfa',
        wordWrap: { width: W - 80 }, align: 'center',
      }).setOrigin(0.5, 0);

      /* New Achievements unlocked this run */
      if (this.newAch && this.newAch.length) {
        const achY0 = traitsY + 50;
        this.add.text(cx, achY0, '🏆  ACHIEVEMENTS UNLOCKED', {
          fontSize:'12px', fontFamily:'system-ui', fontStyle:'bold', color:'#fbbf24', letterSpacing:3,
        }).setOrigin(0.5);
        this.newAch.forEach((ach, ai) => {
          const ay = achY0 + 22 + ai * 28;
          const abg = this.add.rectangle(cx, ay, 380, 24, 0x1a1000, 0.95).setStrokeStyle(1,0xf59e0b,0.8);
          this.add.text(cx, ay, `${ach.icon}  ${ach.name}  —  ${ach.desc}`, {
            fontSize:'12px', fontFamily:'system-ui', fontStyle:'bold', color:'#fcd34d',
          }).setOrigin(0.5);
          this.tweens.add({ targets:[abg], alpha:{from:0,to:0.95}, duration:400, delay:ai*150 });
        });
      }
      /* Continue button */
      const btnY = H - 80;
      const btn = this.add.rectangle(cx, btnY, 280, 48, 0x4c1d95, 1)
        .setStrokeStyle(2, 0xa78bfa).setInteractive({ useHandCursor: true });
      const btnTxt = this.add.text(cx, btnY, 'CLAIM SOULS & UPGRADE', {
        fontSize: '14px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#e2e8f0',
      }).setOrigin(0.5);

      btn.on('pointerover', () => btn.setFillStyle(0x6d28d9));
      btn.on('pointerout',  () => btn.setFillStyle(0x4c1d95));
      btn.on('pointerdown', () => {
        const totalSouls = this.souls + this.curseSouls;
        this.scene.start('Meta', {
          souls: totalSouls, shown: totalSouls,
          wave: this.wave, kills: this.kills, level: this.level,
        });
      });

      /* Share score button */
      const shareTxt = this.add.text(cx, H - 38, '📋  Share Score', {
        fontSize:'13px', fontFamily:'system-ui', color:'rgba(167,139,250,0.65)',
      }).setOrigin(0.5).setInteractive({ useHandCursor:true });
      shareTxt.on('pointerover', ()=>shareTxt.setColor('#a78bfa'));
      shareTxt.on('pointerout',  ()=>shareTxt.setColor('rgba(167,139,250,0.65)'));
      shareTxt.on('pointerdown', ()=>{
        const txt = `🏆 Halls of Aurora — Wave ${this.wave} | ${this.kills} kills | Level ${this.level} | ${mm}:${ss}\nPlay at: halls-of-aurora.vercel.app`;
        navigator.clipboard.writeText(txt).then(()=>{
          shareTxt.setText('✓  Copied to clipboard!');
          this.time.delayedCall(2200, ()=>shareTxt.setText('📋  Share Score'));
        }).catch(()=>{});
      });

      /* Tween in stats */
      this.tweens.add({ targets: btnTxt, alpha: { from: 0.4, to: 1 }, duration: 900, yoyo: true, repeat: -1, ease: 'sine.inOut' });
    }
  }

  /* ── META UPGRADE SCENE ── */
  class MetaScene extends Phaser.Scene {
    constructor() { super('Meta'); }
    init(d) { this.earned = d.souls; this.shown = d.shown ?? d.souls; this.wave = d.wave; this.kills = d.kills; this.level = d.level || 1; }
    create() {
      const meta = loadMeta();
      meta.souls = (meta.souls || 0) + this.earned;
      saveMeta(meta);

      this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.94);

      this.add.text(W / 2, 50, 'DEFEATED', {
        fontSize: '52px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#dc2626',
      }).setOrigin(0.5);

      this.add.text(W / 2, 115, `Wave ${this.wave}  ·  ${this.kills} kills  ·  +${this.shown} souls earned`, {
        fontSize: '18px', fontFamily: 'system-ui', color: '#fff',
      }).setOrigin(0.5);

      this.add.text(W / 2, 150, `Total Souls: ${meta.souls}`, {
        fontSize: '15px', fontFamily: 'system-ui', color: '#fbbf24',
      }).setOrigin(0.5);

      /* Play Again button */
      const playAgainBtn = this.add.rectangle(W / 2, 178, 200, 36, 0x4c1d95, 0.95)
        .setStrokeStyle(1.5, 0xa78bfa, 0.8).setInteractive({ useHandCursor: true });
      const playAgainTxt = this.add.text(W / 2, 178, '▶  PLAY AGAIN', {
        fontSize: '14px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#e9d5ff',
      }).setOrigin(0.5);
      playAgainBtn.on('pointerover', () => { playAgainBtn.setFillColor(0x6d28d9); playAgainTxt.setColor('#fff'); });
      playAgainBtn.on('pointerout',  () => { playAgainBtn.setFillColor(0x4c1d95); playAgainTxt.setColor('#e9d5ff'); });
      playAgainBtn.on('pointerdown', () => {
        this.cameras.main.fadeOut(250, 0, 0, 0);
        this.time.delayedCall(270, () => this.scene.start('ClassSelect'));
      });

      this.add.text(W / 2, 206, 'PERMANENT UPGRADES', {
        fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold', color: 'rgba(255,255,255,0.3)', letterSpacing: 3,
      }).setOrigin(0.5);

      const cols = 5, uw = 148, uh = 108, ugap = 8;
      const rows = Math.ceil(META_UPGRADES.length / cols);
      const sx = W / 2 - (cols * uw + (cols - 1) * ugap) / 2;

      META_UPGRADES.forEach((u, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        const ux = sx + col * (uw + ugap), uy = 226 + row * (uh + 10);
        const rank = meta.upgrades[u.id] || 0;
        const maxed = rank >= META_MAX;
        const cost = maxed ? 0 : META_COSTS[rank];
        const canAfford = !maxed && meta.souls >= cost;

        const card = this.add.rectangle(ux, uy, uw, uh, maxed ? 0x0d2b1a : 0x111122, 0.96).setOrigin(0);
        card.setStrokeStyle(1, maxed ? 0x22c55e : (canAfford ? 0xfbbf24 : 0x333355));
        if (!maxed && canAfford) card.setInteractive({ useHandCursor: true });

        this.add.text(ux + uw / 2, uy + 13, u.name, {
          fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: maxed ? '#4ade80' : (canAfford ? '#fbbf24' : '#6b7280'),
        }).setOrigin(0.5, 0);

        this.add.text(ux + uw / 2, uy + 35, u.desc, {
          fontSize: '11px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.45)',
          wordWrap: { width: uw - 18 }, align: 'center',
        }).setOrigin(0.5, 0);

        for (let r = 0; r < META_MAX; r++)
          this.add.circle(ux + 18 + r * 16, uy + uh - 16, 4, r < rank ? 0xfbbf24 : 0x2a2a40);

        this.add.text(ux + uw - 10, uy + uh - 24, maxed ? 'MAX' : `${cost} souls`, {
          fontSize: '10px', fontFamily: 'system-ui',
          color: maxed ? '#4ade80' : (canAfford ? '#fbbf24' : '#444'),
        }).setOrigin(1, 0);

        if (!maxed && canAfford) {
          card.on('pointerover', () => card.setFillColor(0x1a1a30));
          card.on('pointerout',  () => card.setFillColor(0x111122));
          card.on('pointerdown', () => {
            meta.upgrades[u.id] = (meta.upgrades[u.id] || 0) + 1;
            meta.souls -= cost;
            saveMeta(meta);
            this.scene.restart({ souls: 0, shown: this.shown, wave: this.wave, kills: this.kills, level: this.level });
          });
        }
      });

      /* Leaderboard moved to global overlay (🏆 button, top-left) */

      const btnY = Math.max(205 + rows * (uh + 10) + 20, H - 65);
      const btn = this.add.text(W / 2 - 80, btnY, '[ Play Again ]', {
        fontSize: '22px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#a78bfa',
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      this.tweens.add({ targets: btn, alpha: 0, duration: 700, yoyo: true, repeat: -1 });
      btn.on('pointerdown', () => this.scene.start('Menu'));

      /* Change name button */
      const nameBtn = this.add.text(W / 2 + 100, btnY, `[ ${localStorage.getItem('hoa_name') || '?'} · change ]`, {
        fontSize: '13px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.3)',
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      nameBtn.on('pointerover', () => nameBtn.setColor('rgba(255,255,255,0.7)'));
      nameBtn.on('pointerout',  () => nameBtn.setColor('rgba(255,255,255,0.3)'));
      nameBtn.on('pointerdown', () => {
        localStorage.removeItem('hoa_name');
        this.scene.start('Menu');
      });
    }
  }

  new Phaser.Game({
    type: Phaser.AUTO,
    width: W, height: H,
    transparent: true,
    parent: 'game-container',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: [MenuScene, ClassSelectScene, GameScene, UIScene, LevelUpScene, SummaryScene, MetaScene, PauseMenuScene, AchievementsScene],
  });
  </script>

  <script type="module">
    import { Renderer, Program, Mesh, Color, Triangle } from 'https://esm.sh/ogl@1.0.11';
    const ctn = document.getElementById('aurora-bg');
    const renderer = new Renderer({ alpha: true, premultipliedAlpha: true, antialias: true });
    const gl = renderer.gl;
    gl.clearColor(0,0,0,0); gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.canvas.style.backgroundColor = 'transparent';
    ctn.appendChild(gl.canvas);
    const VERT = `#version 300 es\nin vec2 position;\nvoid main(){gl_Position=vec4(position,0.0,1.0);}`;
    const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform float uAmplitude; uniform vec3 uColorStops[3];
uniform vec2 uResolution; uniform float uBlend;
out vec4 fragColor;
vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)); vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1; i=mod(i,289.0);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0; vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5); vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}
struct ColorStop{vec3 color;float position;};
void main(){
  vec2 uv=gl_FragCoord.xy/uResolution;
  ColorStop colors[3];
  colors[0]=ColorStop(uColorStops[0],0.0);
  colors[1]=ColorStop(uColorStops[1],0.5);
  colors[2]=ColorStop(uColorStops[2],1.0);
  int index=0;
  for(int i=0;i<2;i++){bool b=colors[i].position<=uv.x;index=int(mix(float(index),float(i),float(b)));}
  float range=colors[index+1].position-colors[index].position;
  float lf=(uv.x-colors[index].position)/range;
  vec3 rampColor=mix(colors[index].color,colors[index+1].color,lf);
  float height=snoise(vec2(uv.x*2.0+uTime*0.1,uTime*0.25))*0.5*uAmplitude;
  height=exp(height); height=(uv.y*2.0-height+0.2);
  float intensity=0.6*height;
  float auroraAlpha=smoothstep(0.20-uBlend*0.5,0.20+uBlend*0.5,intensity);
  fragColor=vec4(intensity*rampColor*auroraAlpha,auroraAlpha);
}`;
    function hexRgb(h){const c=new Color(h);return[c.r,c.g,c.b];}
    const cs=['#3b0764','#7c3aed','#1e1b4b'];
    const geometry=new Triangle(gl); delete geometry.attributes.uv;
    const program=new Program(gl,{vertex:VERT,fragment:FRAG,uniforms:{
      uTime:{value:0},uAmplitude:{value:1.2},
      uColorStops:{value:cs.map(hexRgb)},
      uResolution:{value:[ctn.offsetWidth,ctn.offsetHeight]},
      uBlend:{value:0.6}
    }});
    const mesh=new Mesh(gl,{geometry,program});
    function resize(){renderer.setSize(ctn.offsetWidth,ctn.offsetHeight);program.uniforms.uResolution.value=[ctn.offsetWidth,ctn.offsetHeight];}
    window.addEventListener('resize',resize); resize();
    (function loop(t){requestAnimationFrame(loop);program.uniforms.uTime.value=t*0.0004;renderer.render({scene:mesh});})(0);
  </script>
</body>
