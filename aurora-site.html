<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minibonk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06000f; }
    #aurora-bg { position: fixed; inset: 0; z-index: 0; }
    #aurora-bg canvas { width: 100%; height: 100%; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
  </style>
</head>
<body>
  <!-- Name entry overlay -->
  <div id="name-overlay" style="display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;flex-direction:column;font-family:system-ui;">
    <p style="color:#a78bfa;font-size:13px;letter-spacing:3px;margin-bottom:12px;font-weight:bold;">MINIBONK</p>
    <h2 style="color:#fff;font-size:26px;font-weight:bold;margin-bottom:6px;">Enter your name</h2>
    <p style="color:rgba(255,255,255,0.35);font-size:13px;margin-bottom:22px;">It will appear on the leaderboard</p>
    <input id="name-input" type="text" maxlength="16" autocomplete="off" placeholder="Your name…"
      style="background:#1a1a2e;border:1.5px solid #7c3aed;border-radius:8px;color:#fff;font-size:18px;padding:10px 18px;width:260px;outline:none;text-align:center;font-family:system-ui;" />
    <button id="name-submit"
      style="margin-top:14px;background:#7c3aed;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:bold;padding:10px 36px;cursor:pointer;font-family:system-ui;letter-spacing:1px;">
      PLAY
    </button>
  </div>

  <div id="aurora-bg"></div>
  <div id="game-container"></div>

  <!-- ── GLOBAL LEADERBOARD OVERLAY ── -->
  <div id="lb-btn" title="Leaderboard" style="
    position:fixed; top:14px; left:14px; z-index:200;
    background:rgba(15,7,30,0.88); border:1px solid rgba(124,58,237,0.6);
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-family:system-ui; font-size:12px; font-weight:bold;
    color:#a78bfa; letter-spacing:1.5px; user-select:none;
    backdrop-filter:blur(6px); transition:border-color .15s,color .15s;
    display:flex; align-items:center; gap:7px;
  " onmouseenter="this.style.borderColor='rgba(167,139,250,0.9)';this.style.color='#fff'"
     onmouseleave="this.style.borderColor='rgba(124,58,237,0.6)';this.style.color='#a78bfa'"
     onclick="window._lbToggle()">
    🏆 <span>LEADERBOARD</span> <span id="lb-caret" style="font-size:10px">▼</span>
  </div>

  <div id="lb-panel" style="
    display:none; position:fixed; top:52px; left:14px; z-index:199;
    width:340px; background:rgba(8,4,20,0.97); border:1px solid rgba(124,58,237,0.5);
    border-radius:10px; font-family:system-ui; overflow:hidden;
    backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.7);
  ">
    <!-- Tabs -->
    <div style="display:flex; border-bottom:1px solid rgba(124,58,237,0.3);">
      <div id="lb-tab-normal" onclick="window._lbTab('normal')" style="
        flex:1; padding:10px; text-align:center; font-size:11px; font-weight:bold;
        letter-spacing:1.5px; cursor:pointer; color:#a78bfa;
        border-bottom:2px solid #7c3aed; transition:color .15s;
      ">⚔ NORMAL</div>
      <div id="lb-tab-1hp" onclick="window._lbTab('1hp')" style="
        flex:1; padding:10px; text-align:center; font-size:11px; font-weight:bold;
        letter-spacing:1.5px; cursor:pointer; color:rgba(167,139,250,0.4);
        border-bottom:2px solid transparent; transition:color .15s;
      ">☠ 1HP MODE</div>
    </div>
    <!-- Rows container — top 10 visible, scroll for more -->
    <div id="lb-rows" style="
      max-height:320px; overflow-y:auto; padding:8px 0;
      scrollbar-width:thin; scrollbar-color:rgba(124,58,237,0.4) transparent;
    ">
      <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">Loading…</div>
    </div>
    <!-- Hint -->
    <div style="text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,0.18);border-top:1px solid rgba(124,58,237,0.15);">
      Best score per player • scroll for full list
    </div>
  </div>

  <script>
  (function(){
    const CLASS_EMOJI_DOM = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀' };
    let _open = false, _activeTab = 'normal', _cache = { normal: null, '1hp': null };

    function renderRows(scores) {
      const rows = document.getElementById('lb-rows');
      const you = localStorage.getItem('hoa_name') || '';
      const is1hp = _activeTab === '1hp';
      if (!Array.isArray(scores) || scores.length === 0) {
        rows.innerHTML = `<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">${is1hp ? 'No 1HP runs yet — dare to try?' : 'No scores yet.'}</div>`;
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      rows.innerHTML = scores.map((s, i) => {
        const medal  = medals[i] || `<span style="color:rgba(255,255,255,0.35);font-size:11px">${i+1}.</span>`;
        const emoji  = CLASS_EMOJI_DOM[s.class_name] || '❓';
        const isYou  = s.name === you;
        const divider = i === 9 ? 'border-top:1px dashed rgba(124,58,237,0.3);margin-top:4px;padding-top:4px;' : '';
        return `<div style="
          display:flex; align-items:center; gap:8px; padding:7px 14px;
          background:${isYou ? 'rgba(124,58,237,0.18)' : 'transparent'};
          border-left:${isYou ? '2px solid #7c3aed' : '2px solid transparent'};
          ${divider}
        ">
          <span style="width:22px;text-align:center;font-size:13px">${medal}</span>
          <span style="font-size:13px">${emoji}</span>
          <span style="flex:1;font-size:12px;color:${isYou ? '#c4b5fd' : 'rgba(255,255,255,0.8)'};
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${isYou?'bold':'normal'}">
            ${s.name}${isYou?' ◀':''}
          </span>
          <span style="font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap">
            Wave <b style="color:#e2e8f0">${s.wave}</b>
          </span>
          <span style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap">
            ${s.kills}k
          </span>
        </div>`;
      }).join('');
    }

    async function loadTab(tab) {
      if (_cache[tab]) { renderRows(_cache[tab]); return; }
      document.getElementById('lb-rows').innerHTML =
        '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">Loading…</div>';
      try {
        const SB_URL = 'https://biclaeemulhkdejyeysv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xhZWVtdWxoa2RlanlleXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTkzODIsImV4cCI6MjA5Nzc3NTM4Mn0.VkFCPzroqgPgUkxXfLjrWbWBXoOONV6OFHBuyrRm7l0';
        const table = tab === '1hp' ? 'minibonk_leaderboard_1hp' : 'minibonk_leaderboard';
        const r = await fetch(`${SB_URL}/rest/v1/${table}?select=name,wave,kills,level,class_name&order=wave.desc,kills.desc&limit=100`,
          { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
        const data = await r.json();
        _cache[tab] = Array.isArray(data) ? data : [];
        renderRows(_cache[tab]);
      } catch { renderRows([]); }
    }

    window._lbToggle = function() {
      _open = !_open;
      document.getElementById('lb-panel').style.display = _open ? 'block' : 'none';
      document.getElementById('lb-caret').textContent = _open ? '▲' : '▼';
      if (_open) { _cache = { normal: null, '1hp': null }; loadTab(_activeTab); }
    };

    window._lbTab = function(tab) {
      _activeTab = tab;
      ['normal','1hp'].forEach(t => {
        const el = document.getElementById(`lb-tab-${t}`);
        const active = t === tab;
        el.style.color = active ? '#a78bfa' : 'rgba(167,139,250,0.4)';
        el.style.borderBottom = active ? '2px solid #7c3aed' : '2px solid transparent';
      });
      loadTab(tab);
    };

    /* Close when clicking outside */
    document.addEventListener('click', e => {
      if (_open && !e.target.closest('#lb-btn') && !e.target.closest('#lb-panel')) {
        _open = false;
        document.getElementById('lb-panel').style.display = 'none';
        document.getElementById('lb-caret').textContent = '▼';
      }
    });
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <script>
  const W = window.innerWidth;
  const H = window.innerHeight;

  /* ── SUPABASE LEADERBOARD ── */
  /*
    Run this SQL once in Supabase Dashboard → SQL Editor to set up:
    ─────────────────────────────────────────────────────────────────
    DELETE FROM minibonk_leaderboard;
    ALTER TABLE minibonk_leaderboard ADD COLUMN IF NOT EXISTS class_name text;
    CREATE UNIQUE INDEX IF NOT EXISTS lb_name_unique ON minibonk_leaderboard(name);

    CREATE TABLE IF NOT EXISTS minibonk_leaderboard_1hp (
      id bigserial primary key,
      name text unique,
      wave int, kills int, level int,
      class_name text,
      created_at timestamptz default now()
    );
    ALTER TABLE minibonk_leaderboard_1hp ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "pub" ON minibonk_leaderboard_1hp FOR ALL USING (true) WITH CHECK (true);
    ─────────────────────────────────────────────────────────────────
  */
  const SB_URL = 'https://biclaeemulhkdejyeysv.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xhZWVtdWxoa2RlanlleXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTkzODIsImV4cCI6MjA5Nzc3NTM4Mn0.VkFCPzroqgPgUkxXfLjrWbWBXoOONV6OFHBuyrRm7l0';
  const SB_HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

  const CLASS_EMOJI = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀' };

  async function postScore(name, wave, kills, level, cls, is1hp) {
    const table = is1hp ? 'minibonk_leaderboard_1hp' : 'minibonk_leaderboard';
    try {
      /* Fetch existing entry for this player */
      const r = await fetch(
        `${SB_URL}/rest/v1/${table}?name=eq.${encodeURIComponent(name)}&select=id,wave,kills`,
        { headers: SB_HDR }
      );
      const existing = await r.json();
      if (!Array.isArray(existing)) return;
      const payload = { name, wave, kills, level, class_name: cls || 'hunter' };
      if (existing.length === 0) {
        await fetch(`${SB_URL}/rest/v1/${table}`, {
          method: 'POST', headers: SB_HDR, body: JSON.stringify(payload),
        });
      } else {
        const e = existing[0];
        if (wave > e.wave || (wave === e.wave && kills > e.kills)) {
          await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${e.id}`, {
            method: 'PATCH', headers: SB_HDR, body: JSON.stringify(payload),
          });
        }
      }
    } catch {}
  }

  async function fetchLeaderboard(is1hp) {
    const table = is1hp ? 'minibonk_leaderboard_1hp' : 'minibonk_leaderboard';
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/${table}?select=name,wave,kills,level,class_name&order=wave.desc,kills.desc&limit=100`,
        { headers: SB_HDR }
      );
      return res.json();
    } catch { return []; }
  }

  /* ── META SYSTEM ── */
  const SAVE_KEY = 'hoa_meta';
  const META_UPGRADES = [
    { id:'hp',         name:'Fortitude',    desc:'+20 starting HP',           apply:(p,r)=>{ p.maxHp+=r*20; p.hp=p.maxHp; } },
    { id:'dmg',        name:'Whetstone',    desc:'+6% starting damage',       apply:(p,r)=>{ p.dmg*=Math.pow(1.06,r); } },
    { id:'spd',        name:'Swiftness',    desc:'+6% move speed',            apply:(p,r)=>{ p.spd*=Math.pow(1.06,r); } },
    { id:'atkCd',      name:'Focus',        desc:'-5% attack cooldown',       apply:(p,r)=>{ p.atkCd*=Math.pow(0.95,r); } },
    { id:'xpMult',     name:'Scholar',      desc:'+15% XP gain',              apply:(p,r)=>{ p.xpMult=(p.xpMult||1)*Math.pow(1.15,r); } },
    { id:'pierce',     name:'Arrowhead',    desc:'+1 starting pierce',        apply:(p,r)=>{ p.pierce+=r; } },
    { id:'ironSkin',   name:'Iron Skin',    desc:'Reduce dmg taken by 6%',    apply:(p,r)=>{ p.dmgReduce=(p.dmgReduce||0)+r*0.06; } },
    { id:'soulHvst',   name:'Soul Harvest', desc:'+25% souls earned per run', apply:(p,r)=>{ p.soulMult=(p.soulMult||1)*Math.pow(1.25,r); } },
    { id:'swiftstrike',name:'Swiftstrike',  desc:'+1 starting multishot',     apply:(p,r)=>{ p.multi+=r; } },
    { id:'vitality',   name:'Vitality',     desc:'+0.4 HP regen per sec',     apply:(p,r)=>{ p.regen=(p.regen||0)+r*0.4; } },
    { id:'arcanePow',  name:'Arcane Power', desc:'+15% starting proj size',   apply:(p,r)=>{ p.projSize*=Math.pow(1.15,r); } },
    { id:'fortune',    name:'Fortune',      desc:'+30 starting XP range',     apply:(p,r)=>{ p.xpRange+=r*30; } },
  ];
  const META_COSTS = [200, 600, 1800, 5000, 14000];
  const META_MAX   = META_COSTS.length;
  function loadMeta() {
    try {
      const d = JSON.parse(localStorage.getItem(SAVE_KEY)) || { souls:0, upgrades:{} };
      /* v2 economy reset — wipes all progress once for the new pricing */
      if (!d._econV2) { d.souls = 0; d.upgrades = {}; d._econV2 = true; saveMeta(d); }
      return d;
    }
    catch { return { souls:0, upgrades:{}, _econV2:true }; }
  }
  function saveMeta(d) { try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch {} }

  function waveCfg(n) {
    const boss = n % 5 === 0;
    const late = Math.max(0, n - 15);           // extra scaling after wave 15
    const surge = Math.max(0, n - 30);          // brutal scaling after wave 30
    return {
      n, boss,
      count:    boss ? Math.floor(20 + n * 8 + late * 4)
                     : Math.floor(30 + n * 15 + late * 10 + surge * 8),
      interval: Math.max(50, 320 - n * 22),     // floor 50ms (slightly tighter)
      hp:       Math.floor(25 + n * 22 + late * late * 2 + surge * surge * 3),
      speed:    Math.min(280, 58 + n * 3.5 + late * 2 + surge * 1.5),
      dmg:      Math.floor(8 + n * 2 + late * 0.8 + surge * 0.6),
      xpVal:    4 + n * 2,
      eliteTier:Math.floor(n / 7),              // every 7 waves a new elite tier
      bossHp:   Math.floor(500 + n * 200 + late * late * 12 + surge * surge * 8),
      bossType: (Math.floor(n / 5) - 1) % 4,   // cycles through 4 boss archetypes
    };
  }

  /* ── TRAIT BLUEPRINTS (tiered) ── */
  const BLUEPRINTS = [
    { id:'dmg',       name:'Damage',
      common:    { desc:'+20% damage',            fn: p => { p.dmg*=1.20;  p.b.dmg=(p.b.dmg||0)+20; } },
      rare:      { desc:'+40% damage',            fn: p => { p.dmg*=1.40;  p.b.dmg=(p.b.dmg||0)+40; } },
      legendary: { desc:'+85% damage',            fn: p => { p.dmg*=1.85;  p.b.dmg=(p.b.dmg||0)+85; } },
      fmt: b => b.dmg   != null ? `Damage         +${b.dmg}%`           : null },
    { id:'atkCd',     name:'Attack Speed',
      common:    { desc:'-15% attack cooldown',   fn: p => { p.atkCd*=0.85; p.b.atkCd=(p.b.atkCd||0)+15; } },
      rare:      { desc:'-30% attack cooldown',   fn: p => { p.atkCd*=0.70; p.b.atkCd=(p.b.atkCd||0)+30; } },
      legendary: { desc:'-55% attack cooldown',   fn: p => { p.atkCd*=0.45; p.b.atkCd=(p.b.atkCd||0)+55; } },
      fmt: b => b.atkCd != null ? `Atk Speed      +${b.atkCd}%`         : null },
    { id:'spd',       name:'Move Speed',
      common:    { desc:'+15% move speed',        fn: p => { p.spd*=1.15;  p.b.spd=(p.b.spd||0)+15; } },
      rare:      { desc:'+30% move speed',        fn: p => { p.spd*=1.30;  p.b.spd=(p.b.spd||0)+30; } },
      legendary: { desc:'+65% move speed',        fn: p => { p.spd*=1.65;  p.b.spd=(p.b.spd||0)+65; } },
      fmt: b => b.spd   != null ? `Move Speed     +${b.spd}%`           : null },
    { id:'hp',        name:'Max HP', givesHp:true,
      common:    { desc:'+40 max HP, heal 30',    fn: p => { p.maxHp+=40;  p.hp=Math.min(p.maxHp,p.hp+30);  p.b.hp=(p.b.hp||0)+40; } },
      rare:      { desc:'+90 max HP, heal 60',    fn: p => { p.maxHp+=90;  p.hp=Math.min(p.maxHp,p.hp+60);  p.b.hp=(p.b.hp||0)+90; } },
      legendary: { desc:'+200 max HP, full heal', fn: p => { p.maxHp+=200; p.hp=p.maxHp;                     p.b.hp=(p.b.hp||0)+200; } },
      fmt: b => b.hp    != null ? `Max HP         +${b.hp}`              : null },
    { id:'pierce',    name:'Pierce', cls:['hunter','wizard'],
      common:    { desc:'Projectiles pierce +1',  fn: p => { p.pierce+=1;  p.b.pierce=(p.b.pierce||0)+1; } },
      rare:      { desc:'Projectiles pierce +2',  fn: p => { p.pierce+=2;  p.b.pierce=(p.b.pierce||0)+2; } },
      legendary: { desc:'Projectiles pierce +5',  fn: p => { p.pierce+=5;  p.b.pierce=(p.b.pierce||0)+5; } },
      fmt: b => b.pierce!= null ? `Pierce         +${b.pierce}`          : null },
    { id:'multi',     name:'Multishot', cls:['hunter','wizard'],
      common:    { desc:'Fire at +1 extra enemy', fn: p => { p.multi+=1;   p.b.multi=(p.b.multi||0)+1; } },
      rare:      { desc:'Fire at +2 extra enemies',fn: p => { p.multi+=2;  p.b.multi=(p.b.multi||0)+2; } },
      legendary: { desc:'Fire at +5 extra enemies',fn: p => { p.multi+=5;  p.b.multi=(p.b.multi||0)+5; } },
      fmt: b => b.multi != null ? `Multishot      +${b.multi} targets`   : null },
    { id:'xpRange',   name:'XP Range',
      common:    { desc:'+80 XP pickup range',    fn: p => { p.xpRange+=80;  p.b.xpRange=(p.b.xpRange||0)+80; } },
      rare:      { desc:'+180 XP pickup range',   fn: p => { p.xpRange+=180; p.b.xpRange=(p.b.xpRange||0)+180; } },
      legendary: { desc:'+420 XP pickup range',   fn: p => { p.xpRange+=420; p.b.xpRange=(p.b.xpRange||0)+420; } },
      fmt: b => b.xpRange!=null? `XP Range       +${b.xpRange}`          : null },
    { id:'lifeSteal', name:'Life Steal', givesHp:true,
      common:    { desc:'Heal 2 HP per kill',     fn: p => { p.lifeSteal+=2;  p.b.ls=(p.b.ls||0)+2; } },
      rare:      { desc:'Heal 5 HP per kill',     fn: p => { p.lifeSteal+=5;  p.b.ls=(p.b.ls||0)+5; } },
      legendary: { desc:'Heal 14 HP per kill',    fn: p => { p.lifeSteal+=14; p.b.ls=(p.b.ls||0)+14; } },
      fmt: b => b.ls    != null ? `Life Steal     +${b.ls} HP/kill`       : null },
    { id:'projSpd',   name:'Proj Speed', cls:['hunter','wizard'],
      common:    { desc:'+30% proj speed',        fn: p => { p.projSpd*=1.30; p.b.projSpd=(p.b.projSpd||0)+30; } },
      rare:      { desc:'+60% proj speed',        fn: p => { p.projSpd*=1.60; p.b.projSpd=(p.b.projSpd||0)+60; } },
      legendary: { desc:'+130% proj speed',       fn: p => { p.projSpd*=2.30; p.b.projSpd=(p.b.projSpd||0)+130; } },
      fmt: b => b.projSpd!=null? `Proj Speed     +${b.projSpd}%`         : null },
    { id:'projSize',  name:'Proj Size', cls:['hunter','wizard'],
      common:    { desc:'+40% proj size',         fn: p => { p.projSize*=1.40; p.b.projSize=(p.b.projSize||0)+40; } },
      rare:      { desc:'+85% proj size',         fn: p => { p.projSize*=1.85; p.b.projSize=(p.b.projSize||0)+85; } },
      legendary: { desc:'+180% proj size',        fn: p => { p.projSize*=2.80; p.b.projSize=(p.b.projSize||0)+180; } },
      fmt: b => b.projSize!=null?`Proj Size      +${b.projSize}%`        : null },
    { id:'crit',      name:'Critical Hit',
      common:    { desc:'+15% crit chance (2×)',  fn: p => { p.critChance=(p.critChance||0)+0.15; p.b.crit=Math.round(p.critChance*100); } },
      rare:      { desc:'+28% crit chance (2×)',  fn: p => { p.critChance=(p.critChance||0)+0.28; p.b.crit=Math.round(p.critChance*100); } },
      legendary: { desc:'+55% crit (3× damage)',  fn: p => { p.critChance=(p.critChance||0)+0.55; p.critMult=3; p.b.crit=Math.round(p.critChance*100); } },
      fmt: b => b.crit  != null ? `Crit Chance    ${b.crit}%`            : null },
    { id:'slow',      name:'Frost',

  function rollRarity() {
    const r = Math.random();
    return r < 0.01 ? 'legendary' : r < 0.16 ? 'rare' : 'common';
  }

  function pickOffers(playerClass, takenTraits = [], is1hp = false) {
    const cls = playerClass || 'hunter';
    const pool = BLUEPRINTS.filter(bp => {
      if (bp.requires && !bp.requires.every(r => takenTraits.includes(r))) return false;
      if (is1hp && bp.givesHp) return false;
      if (!bp.cls) return true;
      if (Array.isArray(bp.cls)) return bp.cls.includes(cls);
      return bp.cls === cls;
    });
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 3).map(bp => {
      const tier = rollRarity();
      return { bp, tier, desc: bp[tier].desc, fn: bp[tier].fn };
    });
  }

    /* ── ElectricBorder noise helpers ── */
    _ebRnd(x) { return (Math.sin(x * 12.9898) * 43758.5453) % 1; }
    _ebN2(x, y) {
      const i=Math.floor(x),j=Math.floor(y),fx=x-i,fy=y-j;
      const a=this._ebRnd(i+j*57),b=this._ebRnd(i+1+j*57),c=this._ebRnd(i+(j+1)*57),d=this._ebRnd(i+1+(j+1)*57);
      const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
      return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy;
    }
    _ebON(x, t, seed) {
      let y=0,amp=0.084,freq=16;
      for(let i=0;i<9;i++){
        y+=amp*this._ebN2(freq*x+seed*100,t*freq*0.3);
        freq*=1.6; amp*=0.7;
      }
      return y;
    }
    _ebPt(t, l, top, w, h, r) {
      const sw=w-2*r,sh=h-2*r,ca=(Math.PI*r)/2;
      const total=2*sw+2*sh+4*ca,dist=t*total;
      let acc=0;
      if(dist<=acc+sw){const p=(dist-acc)/sw;return{x:l+r+p*sw,y:top};}acc+=sw;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=-Math.PI/2+p*Math.PI/2;return{x:l+w-r+r*Math.cos(a),y:top+r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sh){const p=(dist-acc)/sh;return{x:l+w,y:top+r+p*sh};}acc+=sh;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=p*Math.PI/2;return{x:l+w-r+r*Math.cos(a),y:top+h-r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sw){const p=(dist-acc)/sw;return{x:l+w-r-p*sw,y:top+h};}acc+=sw;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=Math.PI/2+p*Math.PI/2;return{x:l+r+r*Math.cos(a),y:top+h-r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sh){const p=(dist-acc)/sh;return{x:l,y:top+h-r-p*sh};}acc+=sh;
      const p=(dist-acc)/ca,a=Math.PI+p*Math.PI/2;
      return{x:l+r+r*Math.cos(a),y:top+r+r*Math.sin(a)};
    }
    _drawEB(g, left, top, width, height, radius, time, color) {
      const disp=16, samples=Math.floor((2*(width+height))/4);
      const pts=[];
      for(let i=0;i<=samples;i++){
        const pr=i/samples, pt=this._ebPt(pr,left,top,width,height,radius);
        pts.push({x:pt.x+this._ebON(pr*8,time,0)*disp, y:pt.y+this._ebON(pr*8,time,1)*disp});
      }
      [[6,color,0.10],[3,color,0.28],[1.5,color,0.95]].forEach(([lw,col,alpha])=>{
        g.lineStyle(lw,col,alpha);
        g.beginPath();
        pts.forEach((p,i)=>{ if(i===0)g.moveTo(p.x,p.y);else g.lineTo(p.x,p.y); });
        g.closePath(); g.strokePath();
      });
    }

    startWave() {
      if (this.dead) return;
      this.waveNum++;
      this.waveKills = 0;
      const cfg = waveCfg(this.waveNum);
      this.cfg = cfg; this.spawned = 0; this.total = cfg.count; this.alive = 0;
      this.events.emit('wave', this.waveNum, cfg.boss);
      if (cfg.boss) this.time.delayedCall(600, () => this.spawnBoss(cfg));
      this.time.addEvent({ delay: cfg.interval, repeat: cfg.count - 1, callback: () => this.spawnEnemy(cfg) });
    }

    offscreenPos() {
      const s = Phaser.Math.Between(0, 3), m = 55;
      if (s === 0) return [Phaser.Math.FloatBetween(0, W), -m];
      if (s === 1) return [W + m, Phaser.Math.FloatBetween(0, H)];
      if (s === 2) return [Phaser.Math.FloatBetween(0, W), H + m];
      return [-m, Phaser.Math.FloatBetween(0, H)];
    }

    spawnEnemy(cfg) {
      if (this.dead) return;
      this.spawned++;
      const [x, y] = this.offscreenPos();
      const wn = this.waveNum;
      const roll = Math.random();

      let size = 13, color = 0xdc2626, hp = cfg.hp, spd = cfg.speed, type = 'basic';
      if      (wn >= 9 && roll < 0.07) { size=12; color=0x84cc16; spd*=0.5;  hp*=1.0; type='circler';  }
      else if (wn >= 7 && roll < 0.13) { size=14; color=0xea580c; spd*=0.55; hp*=1.1; type='bomber';   }
      else if (wn >= 6 && roll < 0.19) { size=10; color=0xd946ef; spd*=0.6;  hp*=0.7; type='burst';    }
      else if (wn >= 5 && roll < 0.25) { size=10; color=0x22d3ee; spd*=0.45; hp*=0.85;type='sniper';   }
      else if (wn >= 4 && roll < 0.32) { size=11; color=0xeab308; spd*=0.6;  hp*=0.8; type='ranged';   }
      else if (wn >= 6 && roll < 0.39) { size=16; color=0x9333ea; spd*=0.7;  hp*=1.4; type='splitter'; }
      else if (wn >= 8 && roll < 0.45) { size=18; color=0x1d4ed8; spd*=0.35; hp*=2.2; type='charger';  }
      else if (wn >= 3 && roll < 0.56) { size=9;  color=0xf97316; spd*=1.9;  hp*=0.5; type='fast';     }
      else if (wn >= 5 && roll < 0.66) { size=21; color=0x7f1d1d; spd*=0.5;  hp*=3.0; type='tank';     }
      else if (wn >= 4 && roll < 0.75) { size=15; color=0x475569; spd*=0.55; hp*=1.8; type='shielder'; }

      // Elite modifier — higher tier = more elites and stronger ones
      const eliteTier = cfg.eliteTier || 0;
      const eliteChance = Math.min(0.45, eliteTier * 0.07);
      const eliteMult   = 1 + eliteTier * 0.5;
      if (eliteTier > 0 && Math.random() < eliteChance) {
        hp   = Math.floor(hp * (1.8 + eliteMult));
        spd  = Math.min(300, spd * (1 + eliteTier * 0.08));
        size = Math.floor(size * (1 + eliteTier * 0.05));
      }

      this.mkEnemy(x, y, size, color, hp, spd, cfg.dmg, cfg.xpVal, type);
    }

    mkEnemy(x, y, size, color, hp, spd, dmg, xpVal, type, isMini = false) {
      const isElite = !isMini && type !== 'boss' && Math.random() < 0.08;
      if (isElite) { hp *= 3; xpVal = Math.floor(xpVal * 2.5); size = Math.floor(size * 1.15); }

      if (this.ps && this.ps.enemySpeedCurse && !isMini) spd = Math.min(300, spd * this.ps.enemySpeedCurse);

      const g = this.add.graphics();
      if (isElite) { g.lineStyle(3, 0xfbbf24, 1); g.strokeCircle(0, 0, size + 5); g.lineStyle(0); }
      g.fillStyle(color, 1);      g.fillCircle(0, 0, size);
      g.fillStyle(0xffffff, 0.9); g.fillCircle(-(size*0.35), -(size*0.3), size*0.2);
                                  g.fillCircle(  size*0.35,  -(size*0.3), size*0.2);
      if (type === 'ranged')   { g.fillStyle(0xfef08a, 1); g.fillCircle(0, size*0.4, size*0.22); }
      if (type === 'splitter') { g.lineStyle(2, 0xffffff, 0.5); g.strokeCircle(0, 0, size*0.55); }
      if (type === 'charger')  { g.fillStyle(0x93c5fd, 1); g.fillTriangle(0,-size*0.55, size*0.4, size*0.3, -size*0.4, size*0.3); }
      if (type === 'sniper')   { g.lineStyle(2, 0x67e8f9, 0.85); g.strokeCircle(0, 0, size*0.55); g.lineBetween(-size*0.55, 0, size*0.55, 0); g.lineBetween(0, -size*0.55, 0, size*0.55); }
      if (type === 'burst')    { for (let i=0;i<3;i++) { g.fillStyle(0xfce7f3,0.9); g.fillCircle(-size*0.35+i*size*0.35, size*0.45, size*0.18); } }
      if (type === 'bomber')   { g.fillStyle(0xfef08a,1); g.fillCircle(0,-size*0.6,size*0.2); g.lineStyle(2,0xfef08a,0.7); g.lineBetween(0,-size*0.4,0,-size*0.1); }
      if (type === 'circler')  { g.lineStyle(1, 0xbef264, 0.55); g.strokeCircle(0, 0, size*0.65); }
      g.x = x; g.y = y;
      this.physics.add.existing(g);
      g.body.setCircle(size, -size, -size);
      g._id = ++this._eid;
      g.eHp = hp; g.eMaxHp = hp; g.eSpd = spd; g.eBaseSpd = spd;
      g.eDmg = dmg; g.eXp = xpVal; g.eSize = size; g.eColor = color; g.eType = type;
      g.isElite = isElite; g.isMini = isMini; g.lastDmgT = 0; g.lastShot = 0;
      /* Shielder — separate shield graphic that rotates toward player */
      if (type === 'shielder') {
        const shieldG = this.add.graphics();
        const drawShield = (sg, sz) => {
          sg.clear();
          sg.lineStyle(5, 0x93c5fd, 0.9);
          sg.beginPath(); sg.arc(0, 0, sz * 1.2, -0.95, 0.95); sg.strokePath();
          sg.lineStyle(2, 0xdbeafe, 0.55);
          sg.beginPath(); sg.arc(0, 0, sz * 1.2 + 3, -0.95, 0.95); sg.strokePath();
          sg.fillStyle(0x93c5fd, 0.12);
          sg.slice(0, 0, sz * 1.2, -0.95, 0.95); sg.fillPath();
        };
        drawShield(shieldG, size);
        shieldG.setPosition(x, y);
        g.shieldArc = shieldG;
        g.shieldDrawFn = drawShield;
        g.shieldHp = 4 + Math.floor(hp / 50);
        g.shieldMaxHp = g.shieldHp;
        g.shieldAngle = 0;
      }
      g.chargeState = 'patrol'; g.chargeTimer = this.time.now + Phaser.Math.Between(1500, 3000);
      g.sniperState = 'idle'; g.aimLine = null;
      g.burstState = 'ready';
      g.orbitAngle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      g.hpBar = this.add.graphics();
      if (isElite) {
        const aura = this.add.circle(g.x, g.y, size + 14, 0xfbbf24, 0.18);
        this.tweens.add({ targets: aura, alpha: 0.48, duration: 550, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        g.eliteAura = aura;
        const lbl = this.add.text(g.x, g.y - size - 16, 'ELITE', {
          fontSize: '9px', fontFamily: 'system-ui', fontStyle: 'bold',
          color: '#fbbf24', stroke: '#000', strokeThickness: 2,
        }).setOrigin(0.5);
        g.eliteLabel = lbl;
      }
      this.enemies.add(g);
      this.alive++;
      return g;
    }

    spawnBoss(cfg) {
      if (this.dead) return;
      const bt = cfg.bossType ?? 0;   // 0 Colossus | 1 Tempest | 2 Voidwalker | 3 Dreadnought
      const bossColors = [0xbe123c, 0x0e7490, 0x4c1d95, 0x78350f];
      const bossDark   = [0x4c0519, 0x0c4a6e, 0x2e1065, 0x451a03];
      const bossEyeCol = [0xff0000, 0x22d3ee, 0xa78bfa, 0xfbbf24];
      const size = 38 + bt * 4;
      const x = Phaser.Math.FloatBetween(W * 0.2, W * 0.8);
      const g = this.add.graphics();
      g.fillStyle(bossDark[bt], 1);   g.fillCircle(0, 0, size);
      g.fillStyle(bossColors[bt], 1); g.fillCircle(0, 0, size - 5);
      // Type-specific silhouette details
      if (bt === 0) { // Colossus — horns
        g.fillStyle(bossDark[bt], 1);
        g.fillTriangle(-size*0.6,-size*0.7, -size*0.3,-size*0.2, -size*0.9,-size*0.2);
        g.fillTriangle( size*0.6,-size*0.7,  size*0.3,-size*0.2,  size*0.9,-size*0.2);
      } else if (bt === 1) { // Tempest — lightning ring
        g.lineStyle(3, 0x67e8f9, 0.8); g.strokeCircle(0, 0, size + 8);
        g.lineStyle(1, 0x67e8f9, 0.4); g.strokeCircle(0, 0, size + 16);
      } else if (bt === 2) { // Voidwalker — void crown
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2; const r = size + 10;
          g.fillStyle(0x7c3aed, 0.85); g.fillCircle(Math.cos(a)*r*0.7, Math.sin(a)*r*0.7, 5);
        }
      } else { // Dreadnought — cracks
        g.lineStyle(2, 0xfbbf24, 0.7);
        g.lineBetween(-size*0.6, -size*0.2, 0, size*0.3);
        g.lineBetween(0, size*0.3, size*0.5, -size*0.4);
      }
      g.fillStyle(0xffffff, 1); g.fillCircle(-12, -10, 8); g.fillCircle(12, -10, 8);
      g.fillStyle(bossEyeCol[bt], 1); g.fillCircle(-12, -10, 5); g.fillCircle(12, -10, 5);
      g.x = x; g.y = -80;
      this.physics.add.existing(g);
      g.body.setCircle(size, -size, -size);
      g._id = ++this._eid;
      g.eHp = cfg.bossHp; g.eMaxHp = cfg.bossHp;
      g.eSpd = 50 + this.waveNum * 1.5; g.eBaseSpd = g.eSpd;
      g.eDmg = cfg.dmg * 2.5; g.eXp = 60 + this.waveNum * 15;
      g.eSize = size; g.eColor = bossColors[bt]; g.eType = 'boss';
      g.isBoss = true; g.bossType = bt;
      g.lastDmgT = 0; g.lastShot = 0; g.lastSpecial = 0;
      g.chargeState = 'patrol'; g.chargeTimer = this.time.now + 2500;
      g.phase2 = false;
      g.hpBar = this.add.graphics();
      this.enemies.add(g);
      this.alive++;
      this.boss = g;
      this.events.emit('bossSpawn', g, this.waveNum);
      // Announce boss type
      const names = ['THE COLOSSUS', 'THE TEMPEST', 'THE VOIDWALKER', 'THE DREADNOUGHT'];
      const nameColors = ['#fb7185', '#22d3ee', '#a78bfa', '#fbbf24'];
      const label = this.add.text(W/2, H*0.18, names[bt], {
        fontSize: '26px', fontFamily: 'system-ui', fontStyle: 'bold',
        color: nameColors[bt], stroke: '#000', strokeThickness: 4, alpha: 0,
      }).setOrigin(0.5);
      this.tweens.add({ targets: label, alpha: 1, duration: 400,
        onComplete: () => this.time.delayedCall(1800, () => this.tweens.add({ targets: label, alpha: 0, duration: 500, onComplete: () => label.destroy() }))
      });
    }

    flashPlayer() {
      this.drawPlayer(true);
      this.time.delayedCall(160, () => { if (!this.dead) this.drawPlayer(); });
    }

    takeDamage(raw) {
      if (this.shieldActive) return 0;
      let dmg = this.ps.dmgReduce ? Math.max(1, Math.floor(raw * (1 - Math.min(0.85, this.ps.dmgReduce)))) : raw;
      dmg = Math.floor(dmg * (this.ps.curseDmgIn || 1));
      /* Bone Armor absorbs hits */
      if (this.ps.boneArmor && this.ps.boneStacks > 0) {
        const absorbed = Math.min(dmg, this.ps.boneStacks * this.ps.bonePerStack);
        dmg = Math.max(0, dmg - absorbed);
        const stacksUsed = Math.ceil(absorbed / this.ps.bonePerStack);
        this.ps.boneStacks = Math.max(0, this.ps.boneStacks - stacksUsed);
      }
      if (dmg <= 0) return 0;
      this.ps.hp -= dmg;
      this.flashPlayer();
      if (this.ps.hp <= 0) { this.ps.hp = 0; this.onDeath(); }
      return dmg;
    }

    hitFlash(enemy) {
      if (!enemy || !enemy.active) return;
      const flash = this.add.circle(enemy.x, enemy.y, enemy.eSize || 14, 0xffffff, 0.55);
      this.tweens.add({ targets: flash, alpha: 0, duration: 90, ease: 'power2.in', onComplete: () => flash.destroy() });
    }

    deathBurst(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const p = this.add.circle(x, y, Phaser.Math.Between(2, 5), color);
        this.tweens.add({
          targets: p,
          x: x + Math.cos(angle) * (30 + Math.random() * 40),
          y: y + Math.sin(angle) * (30 + Math.random() * 40),
          alpha: 0, scaleX: 0, scaleY: 0,
          duration: 350 + Math.random() * 200,
          ease: 'power2.out',
          onComplete: () => p.destroy(),
        });
      }
    }

    onHit(proj, enemy) {
      if (!proj.active || !enemy.active) return;
      if (proj.hitSet && proj.hitSet.has(enemy)) return;

      /* Shielder — absorb hit with shield */
      if (enemy.eType === 'shielder' && enemy.shieldHp > 0) {
        enemy.shieldHp--;
        this.hitFlash(enemy);
        const blk = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, '⛨', {
          fontSize: '16px', fontFamily: 'system-ui', color: '#93c5fd', stroke:'#000', strokeThickness:2,
        }).setOrigin(0.5);
        this.tweens.add({ targets: blk, y: blk.y - 22, alpha: 0, duration: 500, onComplete: () => blk.destroy() });
        if (enemy.shieldHp <= 0 && enemy.shieldArc) {
          const sa = enemy.shieldArc; enemy.shieldArc = null;
          this.tweens.add({ targets: sa, alpha: 0, duration: 200, onComplete: () => sa.destroy() });
          const crack = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, 'SHIELD BROKEN', {
            fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#fbbf24', stroke:'#000', strokeThickness:2,
          }).setOrigin(0.5);
          this.tweens.add({ targets: crack, y: crack.y - 28, alpha: 0, duration: 800, onComplete: () => crack.destroy() });
        }
        if (proj.pierceLeft > 0) { if (!proj.hitSet) proj.hitSet = new Set(); proj.hitSet.add(enemy); proj.pierceLeft--; }
        else { proj.destroy(); }
        return;
      }

      let mult = 0.8 + Math.random() * 0.4, isCrit = false;
      if (this.ps.critChance && Math.random() < this.ps.critChance) {
        mult *= (this.ps.critMult || 2); isCrit = true;
      }
      // Arcane Surge bonus
      if (proj.isSurge) mult *= (this.ps.surgeMult || 2);
      // Hunter Trueshot: crits get extra pierce
      if (isCrit && this.ps.critPierce && proj.pierceLeft < this.ps.critPierce) proj.pierceLeft = this.ps.critPierce;
      // Berserker stacking bonus
      const bsrkMult = this.ps.bsrkPerKill ? 1 + Math.min(this.ps.bsrkMax, (this.waveKills||0) * this.ps.bsrkPerKill) : 1;
      // Iron Will — bonus damage when low HP
      const ironWillMult = (this.ps.ironWill && this.ps.hp < this.ps.maxHp * 0.30) ? this.ps.ironWill : 1;
      // Marked for Death — mark on first hit, bonus on subsequent hits
      const markMult = (this.ps.markMult && enemy.marked) ? this.ps.markMult : 1;
      if (this.ps.markMult && !enemy.marked) enemy.marked = true;
      // Phantom Shot counter
      if (this.ps.phantomEvery) {
        this.phantomCount++;
        if (this.phantomCount >= this.ps.phantomEvery) {
          this.phantomCount = 0;
          proj.pierceLeft = 9999; proj.isPhantom = true;
          if (!this.ps.phantomDmgMult) {
            proj.slowAll = true; // slow on phantom pierce
          } else {
            mult *= this.ps.phantomDmgMult;
          }
        }
      }
      // Ricochet base dmg tag
      if (proj.ricochetMult) mult *= proj.ricochetMult;

      const bossBonusMult = (this.ps.bossDmgBonus && this.time.now < this.bossDmgUntil) ? (1 + this.ps.bossDmgBonus) : 1;
      const curseDmgOut = this.ps.curseDmgOut || 1;
      const dmg = Math.floor(this.ps.dmg * mult * bsrkMult * ironWillMult * markMult * bossBonusMult * curseDmgOut);
      enemy.eHp -= dmg;
      this.totalDmg = (this.totalDmg || 0) + dmg;
      this.hitFlash(enemy);
      // Vampiric Strike — leech
      if (this.ps.vStrike) {
        const leechMult = (this.ps.bloodPact && this.ps.hp < this.ps.maxHp * 0.30) ? (this.ps.bloodPact || 1) : 1;
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.max(1, Math.floor(dmg * this.ps.vStrike * leechMult)));
      }
      // Necromancer slow on hit
      if (proj.isNecroOrb && !enemy._necroSlow) {
        enemy._necroSlow = true;
        enemy.eSpd = enemy.eBaseSpd * 0.55;
        this.time.delayedCall(2000, () => { if (enemy.active) { enemy.eSpd = enemy.eBaseSpd; enemy._necroSlow = false; } });
      }

      if (this.ps.slowOnHit) {
        enemy.eSpd = enemy.eBaseSpd * (1 - Math.min(0.85, this.ps.slowOnHit));
        this.time.delayedCall(1500, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      const t = this.add.text(enemy.x, enemy.y - enemy.eSize - 4, isCrit ? `${dmg}!` : dmg, {
        fontSize: isCrit ? '17px' : '13px', fontFamily: 'system-ui',
        color: isCrit ? '#facc15' : (enemy.isBoss ? '#fbbf24' : '#ffffff'),
        fontStyle: 'bold', stroke: '#000', strokeThickness: 2,
      }).setOrigin(0.5);
      this.tweens.add({ targets: t, y: t.y - 32, alpha: 0, duration: 700, onComplete: () => t.destroy() });

      // Fireball explosion
      if (proj.isFireball) {
        const expl = this.add.circle(enemy.x, enemy.y, 22, 0xff4500, 0.75);
        this.tweens.add({ targets: expl, scaleX: 2.8, scaleY: 2.8, alpha: 0, duration: 280, onComplete: () => expl.destroy() });
        const splR = this.ps.splashR || 35;
        const splMult = this.ps.splashMult || 0.25;
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(enemy.x, enemy.y, e2.x, e2.y) < splR + e2.eSize) {
            e2.eHp -= Math.floor(this.ps.dmg * splMult);
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
        if (this.ps.leaveFire) this.spawnFirePuddle(enemy.x, enemy.y);
      }

      // Venomous — apply poison DOT
      if (this.ps.poisonDmg && !proj.isRicochet) {
        const now = this.time.now;
        enemy.poisonEnd = now + this.ps.poisonDur;
        enemy.poisonDmgPerTick = this.ps.poisonDmg * 0.5;
        if (!enemy.poisonTick) enemy.poisonTick = now + 500;
      }

      // Phantom Shot slow-on-pierce
      if (proj.slowAll) {
        enemy.eSpd = enemy.eBaseSpd * 0.35;
        this.time.delayedCall(2000, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      // Explosive Rounds — splash AOE (hunter, no recursion on ricochet/phantom)
      if (this.ps.explodeRange && !proj.isRicochet && !proj.isExplosion) {
        const ex = enemy.x, ey = enemy.y, er = this.ps.explodeRange;
        const expl = this.add.circle(ex, ey, 6, 0xff8c00, 0.9);
        this.tweens.add({ targets: expl, scaleX: er/6, scaleY: er/6, alpha: 0, duration: 200, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < er + e2.eSize) {
            e2.eHp -= Math.floor(dmg * (this.ps.explodeMult || 0.4));
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
      }

      // Overload — every Nth fireball triggers Frost Nova
      if (proj.isFireball && this.ps.overloadEvery) {
        this.overloadCount++;
        if (this.overloadCount >= this.ps.overloadEvery) {
          this.overloadCount = 0;
          this.doFrostNova();
          if (this.ps.overloadAoe) {
            const blast = this.add.circle(this.pg.x, this.pg.y, 10, 0x7c3aed, 0.8);
            this.tweens.add({ targets: blast, scaleX: 15, scaleY: 15, alpha: 0, duration: 400, onComplete: () => blast.destroy() });
          }
        }
      }

      // Void Rift — leave damaging zone where fireball lands
      if (proj.isFireball && this.ps.voidRift) {
        this.spawnVoidRift(enemy.x, enemy.y);
      }

      // Ricochet — spawn bouncing fragments
      if (this.ps.ricochetCount && !proj.isRicochet) {
        const targets = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a,b) => Phaser.Math.Distance.Between(enemy.x,enemy.y,a.x,a.y)-Phaser.Math.Distance.Between(enemy.x,enemy.y,b.x,b.y))
          .slice(0, this.ps.ricochetCount);
        targets.forEach(t => {
          const rf = this.add.graphics();
          rf.fillStyle(0x93c5fd, 1); rf.fillCircle(0,0,4);
          rf.x = enemy.x; rf.y = enemy.y;
          this.physics.add.existing(rf);
          rf.body.setCircle(4,-4,-4);
          const ra = Phaser.Math.Angle.Between(enemy.x, enemy.y, t.x, t.y);
          rf.body.setVelocity(Math.cos(ra)*480, Math.sin(ra)*480);
          rf.pierceLeft = 0; rf.isRicochet = true; rf.ricochetMult = this.ps.ricochetMult;
          this.projectiles.add(rf);
          this.time.delayedCall(600, () => { if (rf.active) rf.destroy(); });
        });
      }

      // Chain Reaction — delayed secondary explosion
      if (proj.isFireball && this.ps.chainReact) {
        const ex = enemy.x, ey = enemy.y;
        this.time.delayedCall(280, () => {
          if (this.dead) return;
          const b2 = this.add.circle(ex, ey, 8, 0xff6b00, 0.85);
          this.tweens.add({ targets: b2, scaleX: this.ps.chainReact/8, scaleY: this.ps.chainReact/8, alpha: 0, duration: 260, onComplete: () => b2.destroy() });
          this.enemies.getChildren().forEach(e2 => {
            if (!e2.active) return;
            if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < this.ps.chainReact + e2.eSize) {
              e2.eHp -= Math.floor(this.ps.dmg * (this.ps.chainReactMult || 0.25));
              if (e2.eHp <= 0) this.killEnemy(e2);
            }
          });
        });
      }

      // Chain lightning
      if (this.ps.chainCount) {
        const nearby = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a, b) => Phaser.Math.Distance.Between(enemy.x, enemy.y, a.x, a.y) - Phaser.Math.Distance.Between(enemy.x, enemy.y, b.x, b.y))
          .slice(0, this.ps.chainCount);
        nearby.forEach(e2 => {
          const bolt = this.add.graphics();
          bolt.lineStyle(2, 0x93c5fd, 0.9);
          bolt.lineBetween(enemy.x, enemy.y, e2.x, e2.y);
          this.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
          const chainDmg = Math.floor(dmg * (this.ps.chainMult || 0.5));
          e2.eHp -= chainDmg;
          if (e2.eHp <= 0) this.killEnemy(e2);
        });
      }

      if (proj.pierceLeft > 0) {
        if (!proj.hitSet) proj.hitSet = new Set();
        proj.hitSet.add(enemy); proj.pierceLeft--;
      } else { proj.destroy(); }

      if (enemy.eHp <= 0) this.killEnemy(enemy);
    }

    spawnFirePuddle(x, y) {
      const puddle = this.add.circle(x, y, 35, 0xff6b00, 0.5);
      let ticks = 0;
      this.time.addEvent({ delay: 500, repeat: 7, callback: () => {
        ticks++;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < 40 + e.eSize) {
            e.eHp -= Math.floor(this.ps.dmg * 0.15);
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
        if (ticks >= 8) { puddle.destroy(); }
      }});
    }

    spawnVoidRift(x, y) {
      const dur = this.ps.voidDur || 4000;
      const radius = 30;
      const rift = this.add.arc(x, y, radius, 0, 360, false, 0x4c1d95, 0.65);
      rift.setStrokeStyle(2, 0x7c3aed, 0.9);
      this.tweens.add({ targets: rift, alpha: 0, duration: dur, onComplete: () => rift.destroy() });
      const dmgPerTick = this.ps.voidDmg || 15;
      this.time.addEvent({ delay: 500, repeat: Math.floor(dur / 500) - 1, callback: () => {
        if (!rift.active) return;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < radius + e.eSize) {
            e.eHp -= dmgPerTick;
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
      }});
    }

    onEnemyProj(player, proj) {
      if (!proj.active) return;
      proj.destroy();
      if (this.shieldActive) { this.breakShield(this.time.now); return; }
      this.takeDamage(proj.dmg);
    }

    killEnemy(enemy) {
      if (!enemy.active) return;
      this.deathBurst(enemy.x, enemy.y, enemy.eColor);
      enemy.hpBar.destroy();
      if (enemy.aimLine)    { enemy.aimLine.destroy();    enemy.aimLine    = null; }
      if (enemy.eliteAura)  { enemy.eliteAura.destroy();  enemy.eliteAura  = null; }
      if (enemy.eliteLabel) { enemy.eliteLabel.destroy(); enemy.eliteLabel = null; }
      if (enemy.shieldArc)  { enemy.shieldArc.destroy();  enemy.shieldArc  = null; }

      /* Necromancer — raise dead (not bosses, not already-minions) */
      if (this.ps.raiseDead && !enemy.isBoss && !enemy.isMinion && !enemy.isMini) {
        const chance = this.ps.raiseChance || 0.35;
        if (Math.random() < chance) this.spawnMinion(enemy.x, enemy.y, enemy.eBaseSpd);
      }

      /* Splitter spawns 2 minis */
      if (enemy.eType === 'splitter' && !enemy.isMini) {
        for (let i = 0; i < 2; i++) {
          const a = (i / 2) * Math.PI * 2 + Math.random();
          this.mkEnemy(enemy.x + Math.cos(a) * 22, enemy.y + Math.sin(a) * 22,
            8, 0xc026d3, enemy.eMaxHp * 0.35, enemy.eBaseSpd * 1.3, enemy.eDmg * 0.7,
            Math.floor(enemy.eXp * 0.5), 'basic', true);
        }
      }

      /* XP orb with pulse tween */
      const orb = this.add.circle(enemy.x, enemy.y, 5, 0xa78bfa, 0.9);
      this.physics.add.existing(orb);
      orb.body.setCircle(5);
      orb.xpVal = enemy.eXp;
      this.xpOrbs.add(orb);
      this.tweens.add({ targets: orb, scaleX: 1.5, scaleY: 1.5, duration: 500, yoyo: true, repeat: -1, ease: 'sine.inOut' });

      if (enemy.isBoss) { this.boss = null; this.events.emit('bossDead'); }
      if (this.ps.lifeSteal > 0) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.lifeSteal);

      // Reaper — death explosion (no chain recursion)
      if (this.ps.reaperDmg && !enemy.isMini && !enemy.fromReaper) {
        const rx = enemy.x, ry = enemy.y, rr = this.ps.reaperRange;
        const expl = this.add.circle(rx, ry, 8, 0x6d28d9, 0.85);
        this.tweens.add({ targets: expl, scaleX: rr/8, scaleY: rr/8, alpha: 0, duration: 280, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(rx, ry, e2.x, e2.y) < rr + e2.eSize) {
            e2.eHp -= this.ps.reaperDmg;
            if (e2.eHp <= 0) { e2.fromReaper = true; this.killEnemy(e2); }
          }
        });
      }

      // Haste — speed burst on kill
      if (this.ps.hasteBonus) this.hasteUntil = this.time.now + this.ps.hasteDur;

      this.ps.kills++;
      this.waveKills++;

      // Soul Eater — permanent damage gain per 10 kills
      if (this.ps.soulEaterDmg && this.ps.kills % 10 === 0) this.ps.dmg += this.ps.soulEaterDmg;

      // Bone Armor — gain stack on kill
      if (this.ps.boneArmor) this.ps.boneStacks = Math.min(this.ps.boneMax, (this.ps.boneStacks || 0) + 1);

      // Blood Pact — kill heal when below 30%
      if (this.ps.bloodPactKillHeal && this.ps.hp < this.ps.maxHp * 0.30)
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.floor(this.ps.maxHp * this.ps.bloodPactKillHeal));

      // Last Rites — boss kill bonus
      if (enemy.isBoss && this.ps.bossHeal) {
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.bossHeal);
        this.bossDmgUntil = this.time.now + this.ps.bossDmgDur;
      }
      this.alive = Math.max(0, this.alive - 1);
      enemy.destroy();
      this.events.emit('kill', this.ps.kills);

      if (this.alive === 0 && this.spawned >= this.total)
        this.time.delayedCall(2000, () => { if (!this.dead) this.startWave(); });
    }

    onXP(player, orb) {
      if (!orb.active) return;
      this.ps.xp += Math.floor(orb.xpVal * (this.ps.xpMult || 1));
      orb.destroy();
      if (this.ps.xp >= this.ps.xpNext) {
        this.ps.xp -= this.ps.xpNext;
        this.ps.level++;
        this.ps.xpNext = Math.floor(this.ps.xpNext * 1.45);
        this.doLevelUp();
      }
    }

    doLevelUp() {
      this.paused = true; this.physics.pause();
      this.scene.pause('Game');
      this.scene.launch('LevelUp', { ps: this.ps, game: this });
    }

    resume() {
      this.scene.stop('LevelUp');
      this.scene.resume('Game');
      this.physics.resume();
      this.paused = false;
      this.rebuildOrbitals();
    }

    spawnMinion(x, y, speed) {
      const limit = this.ps.minionLimit || 3;
      if (this.minions.getLength() >= limit) return;

      const spd = Math.min(200, (speed || 80) * 0.7 * (this.ps.minionSpeed || 1));
      const hp  = Math.floor(40 + this.ps.level * 8);
      const g = this.add.graphics();
      g.fillStyle(0x4c1d95, 0.85); g.fillCircle(0, 0, 8);
      g.fillStyle(0xa78bfa, 0.9);  g.fillCircle(-3, -3, 2); g.fillCircle(3, -3, 2);
      g.lineStyle(1, 0x7c3aed, 0.7); g.strokeCircle(0, 0, 10);
      g.x = x; g.y = y;
      g.isMinion = true;
      g.minionHp  = hp;
      g.minionSpd = spd;
      g.minionLifeEnd = this.time.now + (this.ps.minionDur || 18000);
      this.minions.add(g, true); // true = add physics body via the physics group
      g.body.setCircle(8, -8, -8);
      g.body.setCollideWorldBounds(true);
    }

    rebuildOrbitals() {
      this.orbitals.forEach(o => o.destroy());
      this.orbitals = [];
      const count = this.ps.orbitCount || 0;
      for (let i = 0; i < count; i++) {
        const g = this.add.graphics();
        g.fillStyle(0xc4b5fd, 1); g.fillCircle(0, 0, 9);
        g.fillStyle(0xffffff, 0.5); g.fillCircle(-2, -3, 3);
        this.physics.add.existing(g);
        g.body.setCircle(9, -9, -9);
        g.hitTimes = {};
        this.orbitals.push(g);
      }
    }

    doSlam() {
      const px = this.pg.x, py = this.pg.y;
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;

      /* Closest enemy — always hit regardless of distance */
      const closest = all.reduce((a, b) =>
        Phaser.Math.Distance.Between(px, py, a.x, a.y) <=
        Phaser.Math.Distance.Between(px, py, b.x, b.y) ? a : b
      );

      /* White burst rings — use arc() so scaleX/Y expand from player centre */
      for (let i = 0; i < 3; i++) {
        const ring = this.add.arc(px, py, 20 + i * 8, 0, 360, false, 0xffffff, 0);
        ring.setStrokeStyle(3 - i, 0xffffff, 1 - i * 0.25);
        this.tweens.add({
          targets: ring, scaleX: 7, scaleY: 7, alpha: 0,
          duration: 320 + i * 60, delay: i * 50, ease: 'power2.out',
          onComplete: () => ring.destroy(),
        });
      }

      /* Bright flash at player origin */
      const flash = this.add.circle(px, py, 22, 0xffffff, 0.85);
      this.tweens.add({ targets: flash, alpha: 0, scaleX: 0.4, scaleY: 0.4, duration: 160, ease: 'power3.in', onComplete: () => flash.destroy() });

      /* Impact flash at target */
      const hit = this.add.circle(closest.x, closest.y, closest.eSize + 12, 0xffffff, 0.65);
      this.tweens.add({ targets: hit, alpha: 0, scaleX: 2.5, scaleY: 2.5, duration: 280, ease: 'power2.out', onComplete: () => hit.destroy() });

      /* Damage: closest always hit + anyone within 120px */
      all.forEach(e => {
        if (!e.active) return;
        if (e === closest || Phaser.Math.Distance.Between(px, py, e.x, e.y) < 120 + e.eSize) {
          e.eHp -= this.ps.slamDmg;
          if (e.eHp <= 0) { this.killEnemy(e); return; }
          const t = this.add.text(e.x, e.y - e.eSize - 4, this.ps.slamDmg, {
            fontSize: '14px', color: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2, fontFamily: 'system-ui',
          }).setOrigin(0.5);
          this.tweens.add({ targets: t, y: t.y - 30, alpha: 0, duration: 700, onComplete: () => t.destroy() });
        }
      });
    }

    fireAt(target) {
      const angle = Phaser.Math.Angle.Between(this.pg.x, this.pg.y, target.x, target.y);
      const isWizard = this.ps.class === 'wizard';
      const isNecro  = this.ps.class === 'necromancer';
      const r = Math.round((isWizard ? 8 : 6) * this.ps.projSize);
      const p = this.add.graphics();
      if (isWizard) {
        p.fillStyle(0xff4500, 1); p.fillCircle(0, 0, r);
        p.fillStyle(0xfef08a, 0.9); p.fillCircle(-r*0.3, -r*0.35, r*0.4);
        p.fillStyle(0xef4444, 0.7); p.fillCircle(r*0.2, r*0.2, r*0.3);
        p.isFireball = true;
        if (this.ps.surgeEvery) {
          this.ps.surgeCount = (this.ps.surgeCount || 0) + 1;
          if (this.ps.surgeCount >= this.ps.surgeEvery) { this.ps.surgeCount = 0; p.isSurge = true; }
        }
      } else if (isNecro) {
        p.fillStyle(0x4c1d95, 1); p.fillCircle(0, 0, r);
        p.fillStyle(0x7c3aed, 0.85); p.fillCircle(-r*0.25, -r*0.25, r*0.45);
        p.fillStyle(0xa78bfa, 0.6); p.fillCircle(r*0.2, r*0.2, r*0.25);
        p.isNecroOrb = true;
      } else {
        p.fillStyle(0xddd6fe, 1); p.fillCircle(0, 0, r);
      }
      p.x = this.pg.x; p.y = this.pg.y;
      this.physics.add.existing(p);
      p.body.setCircle(r, -r, -r);
      p.body.setVelocity(Math.cos(angle) * this.ps.projSpd, Math.sin(angle) * this.ps.projSpd);
      p.pierceLeft = this.ps.pierce;
      this.projectiles.add(p);
      const lifetime = this.ps.projLifetime || (isWizard ? 2400 : 1800);
      this.time.delayedCall(lifetime, () => { if (p.active) p.destroy(); });
    }

    meleeAttack(time, enemies) {
      const px = this.pg.x, py = this.pg.y;
      const range = this.ps.meleeRange || 90;
      const nearest = enemies.reduce((a, b) =>
        Phaser.Math.Distance.Between(px, py, a.x, a.y) <= Phaser.Math.Distance.Between(px, py, b.x, b.y) ? a : b
      );
      const swingAngle = Phaser.Math.Angle.Between(px, py, nearest.x, nearest.y);
      // Swing arc visual
      const arc = this.add.graphics();
      arc.lineStyle(6, 0xfbbf24, 0.85);
      arc.beginPath();
      arc.arc(px, py, range * 0.85, swingAngle - Math.PI * 0.45, swingAngle + Math.PI * 0.45, false);
      arc.strokePath();
      arc.lineStyle(2, 0xfef08a, 0.5);
      arc.beginPath();
      arc.arc(px, py, range * 0.6, swingAngle - Math.PI * 0.45, swingAngle + Math.PI * 0.45, false);
      arc.strokePath();
      this.tweens.add({ targets: arc, alpha: 0, duration: 230, ease: 'power2.in', onComplete: () => arc.destroy() });

      const hitEnemies = [];
      enemies.forEach(e => {
        if (!e.active) return;
        if (Phaser.Math.Distance.Between(px, py, e.x, e.y) > range + e.eSize) return;
        let mult = 0.85 + Math.random() * 0.3, isCrit = false;
        if (this.ps.critChance && Math.random() < this.ps.critChance) { mult *= (this.ps.critMult || 2); isCrit = true; }
        if (this.ps.executeMult && e.eHp < e.eMaxHp * 0.25) mult *= this.ps.executeMult;
        const bsrkMult = this.ps.bsrkPerKill ? 1 + Math.min(this.ps.bsrkMax, (this.waveKills||0) * this.ps.bsrkPerKill) : 1;
        const warcryMult = (this.ps.warcryMult && this.time.now < this.warcryUntil) ? this.ps.warcryMult : 1;
        const ironWillMult = (this.ps.ironWill && this.ps.hp < this.ps.maxHp * 0.30) ? this.ps.ironWill : 1;
        const markMult2 = (this.ps.markMult && e.marked) ? this.ps.markMult : 1;
        if (this.ps.markMult && !e.marked) e.marked = true;
        const curseDmgOutM = this.ps.curseDmgOut || 1;
        let dmg = Math.floor(this.ps.dmg * mult * bsrkMult * warcryMult * ironWillMult * markMult2 * curseDmgOutM);
        e.eHp -= dmg;
        this.totalDmg = (this.totalDmg || 0) + dmg;
        this.hitFlash(e);
        if (this.ps.vStrike) {
          const leechM = (this.ps.bloodPact && this.ps.hp < this.ps.maxHp * 0.30) ? (this.ps.bloodPact || 1) : 1;
          this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.max(1, Math.floor(dmg * this.ps.vStrike * leechM)));
        }
        const t = this.add.text(e.x, e.y - e.eSize - 4, isCrit ? `${dmg}!` : dmg, {
          fontSize: isCrit ? '17px' : '14px', fontFamily:'system-ui',
          color: isCrit ? '#facc15' : '#fbbf24', fontStyle:'bold', stroke:'#000', strokeThickness:2,
        }).setOrigin(0.5);
        this.tweens.add({ targets:t, y:t.y-32, alpha:0, duration:700, onComplete:()=>t.destroy() });
        // On-hit effects (same as projectile hits)
        if (this.ps.slowOnHit) {
          e.eSpd = e.eBaseSpd * (1 - Math.min(0.85, this.ps.slowOnHit));
          this.time.delayedCall(1500, () => { if (e.active) e.eSpd = e.eBaseSpd; });
        }
        if (this.ps.poisonDmg) {
          e.poisonEnd = time + this.ps.poisonDur;
          e.poisonDmgPerTick = this.ps.poisonDmg * 0.5;
          if (!e.poisonTick) e.poisonTick = time + 500;
        }
        if (e.eHp <= 0) { this.killEnemy(e); return; }
        hitEnemies.push({ e, dmg });
      });
      // Chain Lightning — arcs from each melee-hit enemy to nearby ones
      if (this.ps.chainCount && hitEnemies.length) {
        hitEnemies.forEach(({ e, dmg }) => {
          if (!e.active) return;
          const chainTargets = enemies
            .filter(e2 => e2.active && !hitEnemies.find(h => h.e === e2) && e2 !== e)
            .sort((a, b) => Phaser.Math.Distance.Between(e.x,e.y,a.x,a.y) - Phaser.Math.Distance.Between(e.x,e.y,b.x,b.y))
            .slice(0, this.ps.chainCount);
          chainTargets.forEach(e2 => {
            const bolt = this.add.graphics();
            bolt.lineStyle(2, 0x93c5fd, 0.9);
            bolt.lineBetween(e.x, e.y, e2.x, e2.y);
            this.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
            e2.eHp -= Math.floor(dmg * (this.ps.chainMult || 0.5));
            if (e2.eHp <= 0) this.killEnemy(e2);
          });
        });
      }
    }

    fireEnemyProj(x, y, tx, ty, dmg, speed = 220, color = 0xfbbf24, size = 5) {
      const angle = Phaser.Math.Angle.Between(x, y, tx, ty);
      const p = this.add.graphics();
      p.fillStyle(color, 1); p.fillCircle(0, 0, size);
      p.x = x; p.y = y;
      this.physics.add.existing(p);
      p.body.setCircle(size, -size, -size);
      p.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
      p.dmg = dmg;
      this.enemyProjs.add(p);
      this.time.delayedCall(3400, () => { if (p.active) p.destroy(); });
    }

    dropBomb(x, y, tx, ty, dmg) {
      const bombViz = this.add.circle(x, y, 8, 0xea580c, 1);
      const trail = this.add.circle(x, y, 5, 0xfef08a, 0.6);
      this.tweens.add({ targets: bombViz, x: tx, y: ty, duration: 1100, ease: 'power1.in' });
      this.tweens.add({ targets: trail,   x: tx, y: ty, duration: 1100, ease: 'power1.in', delay: 60 });
      this.time.delayedCall(1100, () => {
        bombViz.destroy(); trail.destroy();
        if (this.dead) return;
        const warn = this.add.circle(tx, ty, 60, 0xef4444, 0.22);
        this.tweens.add({ targets: warn, alpha: 0.55, duration: 140, yoyo: true, repeat: 2, onComplete: () => {
          warn.destroy();
          if (this.dead) return;
          const expl = this.add.circle(tx, ty, 10, 0xff4500, 0.95);
          this.tweens.add({ targets: expl, scaleX: 7, scaleY: 7, alpha: 0, duration: 360, ease: 'power2.out', onComplete: () => expl.destroy() });
          if (Phaser.Math.Distance.Between(this.pg.x, this.pg.y, tx, ty) < 68) {
            this.takeDamage(dmg);
          }
        }});
      });
    }

    autoAttack(time) {
      if (time - this.lastAtk < this.ps.atkCd) return;
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;
      this.lastAtk = time;
      if (this.ps.class === 'knight') {
        this.meleeAttack(time, all);
      } else {
        const sorted = [...all].sort((a, b) =>
          Phaser.Math.Distance.Between(this.pg.x, this.pg.y, a.x, a.y) -
          Phaser.Math.Distance.Between(this.pg.x, this.pg.y, b.x, b.y)
        );
        sorted.slice(0, 1 + this.ps.multi).forEach(t => this.fireAt(t));
      }
    }

    update(time, delta) {
      if (this.dead || this.paused) return;

      const { up, down, left, right, up2, down2, left2, right2 } = this.keys;
      let vx = 0, vy = 0;
      if (left.isDown  || left2.isDown)  vx = -this.ps.spd;
      if (right.isDown || right2.isDown) vx =  this.ps.spd;
      if (up.isDown    || up2.isDown)    vy = -this.ps.spd;
      if (down.isDown  || down2.isDown)  vy =  this.ps.spd;
      if (vx && vy) { vx *= 0.707; vy *= 0.707; }
      const hasteMult = (this.ps.hasteBonus && time < this.hasteUntil) ? (1 + this.ps.hasteBonus) : 1;
      this.pg.body.setVelocity(vx * hasteMult, vy * hasteMult);

      const px = this.pg.x, py = this.pg.y;

      this.enemies.getChildren().forEach(e => {
        if (!e.active) return;

        /* AI by type */
        if (e.eType === 'sniper') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          const pref = 300;
          if (dist < pref - 50) {
            const a = Phaser.Math.Angle.Between(px, py, e.x, e.y);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          } else if (dist > pref + 70) {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 0.55, Math.sin(a) * e.eSpd * 0.55);
          } else {
            e.body.setVelocity(0, 0);
          }
          if (e.sniperState === 'idle' && time - e.lastShot > 3000) {
            e.sniperState = 'aiming'; e.aimStart = time;
            e.aimAt = { x: px, y: py };
            e.aimLine = this.add.graphics();
          }
          if (e.sniperState === 'aiming' && e.aimLine) {
            const prog = Math.min(1, (time - e.aimStart) / 900);
            e.aimLine.clear();
            e.aimLine.lineStyle(1 + Math.floor(prog * 2), 0xef4444, 0.25 + prog * 0.6);
            e.aimLine.lineBetween(e.x, e.y, e.aimAt.x, e.aimAt.y);
            if (prog >= 1) {
              e.sniperState = 'idle'; e.lastShot = time;
              e.aimLine.destroy(); e.aimLine = null;
              this.fireEnemyProj(e.x, e.y, e.aimAt.x, e.aimAt.y, e.eDmg * 1.85, 500, 0xf87171, 6);
            }
          }
        } else if (e.eType === 'burst') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 200) {
            e.body.setVelocity(0, 0);
            if (e.burstState === 'ready' && time - e.lastShot > 2600) {
              e.burstState = 'firing'; e.lastShot = time;
              for (let i = 0; i < 3; i++) {
                this.time.delayedCall(i * 130, () => {
                  if (e.active) this.fireEnemyProj(e.x, e.y, px, py, e.eDmg, 270, 0xe879f9, 5);
                });
              }
              this.time.delayedCall(420, () => { if (e.active) e.burstState = 'ready'; });
            }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'bomber') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 260) {
            e.body.setVelocity(0, 0);
            if (time - e.lastShot > 3800) {
              e.lastShot = time;
              this.dropBomb(e.x, e.y, px, py, e.eDmg * 2.2);
            }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'circler') {
          e.orbitAngle += delta * 0.0016;
          const targetDist = 215;
          const targetX = px + Math.cos(e.orbitAngle) * targetDist;
          const targetY = py + Math.sin(e.orbitAngle) * targetDist;
          const d2t = Phaser.Math.Distance.Between(e.x, e.y, targetX, targetY);
          if (d2t > 10) {
            const a = Phaser.Math.Angle.Between(e.x, e.y, targetX, targetY);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 2.2, Math.sin(a) * e.eSpd * 2.2);
          } else {
            e.body.setVelocity(0, 0);
          }
          if (time - e.lastShot > 1350) {
            e.lastShot = time;
            this.fireEnemyProj(e.x, e.y, px, py, e.eDmg, 230, 0xbef264, 5);
          }
        } else if (e.eType === 'ranged') {
          const dist = Phaser.Math.Distance.Between(px, py, e.x, e.y);
          if (dist < 260) {
            e.body.setVelocity(0, 0);
            if (time - e.lastShot > 2200) { e.lastShot = time; this.fireEnemyProj(e.x, e.y, px, py, e.eDmg); }
          } else {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
          }
        } else if (e.eType === 'charger') {
          if (e.chargeState === 'patrol') {
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a) * e.eSpd * 0.4, Math.sin(a) * e.eSpd * 0.4);
            if (time > e.chargeTimer) {
              e.chargeState = 'windup'; e.chargeTimer = time + 600;
              e.chargeAngle = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(0, 0);
            }
          } else if (e.chargeState === 'windup') {
            e.body.setVelocity(0, 0);
            if (time > e.chargeTimer) { e.chargeState = 'charging'; e.chargeTimer = time + 700; }
          } else {
            e.body.setVelocity(Math.cos(e.chargeAngle) * e.eSpd * 3.8, Math.sin(e.chargeAngle) * e.eSpd * 3.8);
            if (time > e.chargeTimer) { e.chargeState = 'patrol'; e.chargeTimer = time + Phaser.Math.Between(1800, 3500); }
          }
        } else if (e.isBoss) {
          /* ── BOSS AI by type ── */
          const bt = e.bossType ?? 0;
          const bhp = e.eHp / e.eMaxHp;

          // Phase 2 enrage at 50% HP — faster + bigger attacks
          if (!e.phase2 && bhp <= 0.5) {
            e.phase2 = true;
            e.eSpd = e.eBaseSpd * 1.5;
            e.eBaseSpd = e.eSpd;
            const enrage = this.add.circle(e.x, e.y, e.eSize + 20, 0xff0000, 0);
            enrage.setStrokeStyle(3, 0xff0000, 0.9);
            this.tweens.add({ targets: enrage, scaleX: 3, scaleY: 3, alpha: 0, duration: 600, onComplete: () => enrage.destroy() });
            if (bt === 3) { // Dreadnought spawns 2 minis on phase 2
              for (let i = 0; i < 2; i++) {
                const a2 = (i / 2) * Math.PI * 2;
                this.mkEnemy(e.x + Math.cos(a2)*60, e.y + Math.sin(a2)*60,
                  22, e.eColor, e.eMaxHp * 0.3, e.eBaseSpd * 1.2, e.eDmg * 0.7,
                  Math.floor(e.eXp * 0.25), 'basic', true);
              }
            }
          }

          if (bt === 0) {
            /* ── COLOSSUS: charges + radial burst ── */
            if (e.chargeState === 'patrol') {
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.55, Math.sin(a)*e.eSpd*0.55);
              if (time > e.chargeTimer) {
                e.chargeState = 'windup'; e.chargeTimer = time + 900;
                e.chargeAngle = Phaser.Math.Angle.Between(e.x, e.y, px, py);
                e.body.setVelocity(0, 0);
                // Windup indicator — red arrow
                const warn = this.add.graphics();
                warn.fillStyle(0xff0000, 0.75);
                warn.fillTriangle(0,-e.eSize-22, -12,-e.eSize-8, 12,-e.eSize-8);
                warn.x = e.x; warn.y = e.y;
                warn.setRotation(e.chargeAngle - Math.PI/2);
                this.tweens.add({ targets: warn, alpha: 0, duration: 900, onComplete: () => warn.destroy() });
              }
            } else if (e.chargeState === 'windup') {
              e.body.setVelocity(0, 0);
              if (time > e.chargeTimer) { e.chargeState = 'charging'; e.chargeTimer = time + 600; }
            } else {
              e.body.setVelocity(Math.cos(e.chargeAngle)*e.eSpd*4.2, Math.sin(e.chargeAngle)*e.eSpd*4.2);
              if (time > e.chargeTimer) {
                e.chargeState = 'patrol'; e.chargeTimer = time + Phaser.Math.Between(e.phase2?1000:1800, e.phase2?2200:3500);
              }
            }
            // Radial burst every 5s (3s in phase2)
            const burstCd = e.phase2 ? 3000 : 5000;
            if (time - e.lastSpecial > burstCd) {
              e.lastSpecial = time;
              const shots = e.phase2 ? 12 : 8;
              for (let i = 0; i < shots; i++) {
                const a = (i / shots) * Math.PI * 2;
                this.fireEnemyProj(e.x, e.y, e.x+Math.cos(a)*100, e.y+Math.sin(a)*100, e.eDmg*0.8, 220, 0xfb7185, 7);
              }
            }

          } else if (bt === 1) {
            /* ── TEMPEST: orbits + spiral rings ── */
            e.orbitAngle = (e.orbitAngle || 0) + delta * 0.0012 * (e.phase2 ? 1.6 : 1);
            const dist1 = Phaser.Math.Distance.Between(px, py, e.x, e.y);
            const pref1 = 240;
            if (dist1 < pref1 - 50) {
              const a = Phaser.Math.Angle.Between(px, py, e.x, e.y);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.8, Math.sin(a)*e.eSpd*0.8);
            } else if (dist1 > pref1 + 60) {
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.6, Math.sin(a)*e.eSpd*0.6);
            } else {
              // Strafe sideways
              const a = Phaser.Math.Angle.Between(e.x, e.y, px, py) + Math.PI/2;
              e.body.setVelocity(Math.cos(a)*e.eSpd*0.9, Math.sin(a)*e.eSpd*0.9);
            }
            // Spiral ring every 3.5s — player must dodge through gaps
            const spiralCd = e.phase2 ? 2000 : 3500;
            if (time - e.lastSpecial > spiralCd) {
              e.lastSpecial = time;
              const ringShots = e.phase2 ? 16 : 12;
              const gapSize  = e.phase2 ? 1 : 2; // number of missing shots (gap to dodge through)
              const gapStart = Math.floor(Math.random() * ringShots);
              for (let i = 0; i < ringShots; i++) {
                if (i === gapStart || i === (gapStart+1)%ringShots) continue; // gap!
                const a = (i / ringShots) * Math.PI * 2;
                this.time.delayedCall(i * 40, () => {
                  if (!e.active) return;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(a)*100, e.y+Math.sin(a)*100, e.eDmg*0.9, 200, 0x22d3ee, 6);
                });
              }
            }

          } else if (bt === 2) {
            /* ── VOIDWALKER: teleports + void zones ── */
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a)*e.eSpd*0.4, Math.sin(a)*e.eSpd*0.4);
            const tpCd = e.phase2 ? 2500 : 4000;
            if (time - e.lastSpecial > tpCd) {
              e.lastSpecial = time;
              // Flash warning at current pos
              const flash = this.add.circle(e.x, e.y, e.eSize + 14, 0x7c3aed, 0.7);
              this.tweens.add({ targets: flash, alpha: 0, scaleX: 2.5, scaleY: 2.5, duration: 400, onComplete: () => flash.destroy() });
              // Leave void zone at old position
              this.spawnVoidRift(e.x, e.y);
              // Teleport
              this.time.delayedCall(380, () => {
                if (!e.active) return;
                const newX = Phaser.Math.Clamp(px + Phaser.Math.Between(-200, 200), 60, W-60);
                const newY = Phaser.Math.Clamp(py + Phaser.Math.Between(-200, 200), 60, H-60);
                e.x = newX; e.y = newY; e.body.reset(newX, newY);
                // Arrive flash
                const arrive = this.add.circle(e.x, e.y, e.eSize + 8, 0xa78bfa, 0.8);
                this.tweens.add({ targets: arrive, alpha: 0, duration: 300, onComplete: () => arrive.destroy() });
                // Immediate aimed shot burst on arrival
                const shots2 = e.phase2 ? 5 : 3;
                for (let i = 0; i < shots2; i++) {
                  const spread = (i - Math.floor(shots2/2)) * 0.25;
                  const ta = Phaser.Math.Angle.Between(e.x, e.y, px, py) + spread;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(ta)*100, e.y+Math.sin(ta)*100, e.eDmg, 310, 0xa78bfa, 6);
                }
              });
            }

          } else {
            /* ── DREADNOUGHT: all mechanics combined ── */
            // Movement: aggressive chase
            const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
            e.body.setVelocity(Math.cos(a)*e.eSpd*0.75, Math.sin(a)*e.eSpd*0.75);
            // Cycle: charge → ring → mines, every 2.5s
            const dreadCd = e.phase2 ? 1800 : 2800;
            if (time - e.lastSpecial > dreadCd) {
              e.lastSpecial = time;
              e._dreadPhase = ((e._dreadPhase||0) + 1) % 3;
              if (e._dreadPhase === 0) {
                // Charge
                const ca = Phaser.Math.Angle.Between(e.x, e.y, px, py);
                const warn2 = this.add.graphics();
                warn2.fillStyle(0xfbbf24, 0.7);
                warn2.fillTriangle(0,-e.eSize-20, -10,-e.eSize-8, 10,-e.eSize-8);
                warn2.x = e.x; warn2.y = e.y; warn2.setRotation(ca - Math.PI/2);
                this.tweens.add({ targets: warn2, alpha: 0, duration: 700, onComplete: () => warn2.destroy() });
                this.time.delayedCall(700, () => {
                  if (!e.active) return;
                  e.body.setVelocity(Math.cos(ca)*e.eSpd*5, Math.sin(ca)*e.eSpd*5);
                  this.time.delayedCall(500, () => { if (e.active) e.body.setVelocity(0,0); });
                });
              } else if (e._dreadPhase === 1) {
                // Partial ring with gap
                const ringN = e.phase2 ? 14 : 10;
                const gapIdx = Math.floor(Math.random() * ringN);
                for (let i = 0; i < ringN; i++) {
                  if (i === gapIdx || i === (gapIdx+1)%ringN) continue;
                  const ra = (i / ringN) * Math.PI * 2;
                  this.fireEnemyProj(e.x, e.y, e.x+Math.cos(ra)*100, e.y+Math.sin(ra)*100, e.eDmg*0.75, 240, 0xfbbf24, 6);
                }
              } else {
                // Drop bombs at player position + random offset
                const bombs = e.phase2 ? 3 : 2;
                for (let b = 0; b < bombs; b++) {
                  const bx = px + Phaser.Math.Between(-80, 80);
                  const by = py + Phaser.Math.Between(-80, 80);
                  this.dropBomb(e.x, e.y, bx, by, e.eDmg * 1.8);
                }
              }
            }
          }

        } else {
          const a = Phaser.Math.Angle.Between(e.x, e.y, px, py);
          e.body.setVelocity(Math.cos(a) * e.eSpd, Math.sin(a) * e.eSpd);
        }

        /* HP bar */
        const bw = e.eSize * 2.8;
        e.hpBar.clear();
        e.hpBar.fillStyle(0x000000, 0.55);
        e.hpBar.fillRect(e.x - bw/2, e.y - e.eSize - 11, bw, 4);
        e.hpBar.fillStyle(e.isBoss ? 0xfbbf24 : 0xef4444, 1);
        e.hpBar.fillRect(e.x - bw/2, e.y - e.eSize - 11, bw * Math.max(0, e.eHp / e.eMaxHp), 4);
        /* Elite aura + label follow */
        if (e.eliteAura) e.eliteAura.setPosition(e.x, e.y);
        if (e.eliteLabel) e.eliteLabel.setPosition(e.x, e.y - e.eSize - 16);
        /* Shielder — rotate shield arc toward player and show shield HP bar */
        if (e.shieldArc && e.shieldHp > 0) {
          const ang = Phaser.Math.Angle.Between(e.x, e.y, px, py);
          e.shieldArc.setPosition(e.x, e.y);
          e.shieldArc.setRotation(ang);
          /* Shield HP ticks */
          const sw = e.eSize * 2.8;
          e.hpBar.fillStyle(0x1e40af, 0.8);
          e.hpBar.fillRect(e.x - sw/2, e.y - e.eSize - 16, sw * (e.shieldHp / e.shieldMaxHp), 3);
        }

        /* Contact damage */
        const dist2 = Phaser.Math.Distance.Between(px, py, e.x, e.y);
        if (dist2 < 16 + e.eSize && time - e.lastDmgT > 650) {
          e.lastDmgT = time;
          if (this.shieldActive) {
            this.breakShield(time);
          } else {
            this.takeDamage(e.eDmg);
            if (this.ps.thorns && !(e.shieldHp > 0)) { e.eHp -= this.ps.thorns; if (e.eHp <= 0) { this.killEnemy(e); return; } }
          }
        }
      });

      /* XP magnet */
      this.xpOrbs.getChildren().forEach(o => {
        if (!o.active) return;
        const d = Phaser.Math.Distance.Between(px, py, o.x, o.y);
        if (d < this.ps.xpRange) {
          const a = Phaser.Math.Angle.Between(o.x, o.y, px, py);
          o.body.setVelocity(Math.cos(a) * 300, Math.sin(a) * 300);
        } else { o.body.setVelocity(0, 0); }
      });

      /* Orbiting shards */
      if (this.orbitals.length) {
        const n = this.orbitals.length;
        this.orbitals.forEach((o, i) => {
          const angle = (time * 0.002) + (i * Math.PI * 2 / n);
          o.x = px + Math.cos(angle) * 65; o.y = py + Math.sin(angle) * 65;
          o.body.reset(o.x, o.y);
          this.enemies.getChildren().forEach(e => {
            if (!e.active) return;
            if (Phaser.Math.Distance.Between(o.x, o.y, e.x, e.y) < 9 + e.eSize && time - (o.hitTimes[e._id] || 0) > 500) {
              o.hitTimes[e._id] = time;
              e.eHp -= this.ps.orbitDmg;
              if (e.eHp <= 0) this.killEnemy(e);
            }
          });
        });
      }

      /* Haste visual */
      if (this.ps.hasteBonus && time < this.hasteUntil) {
        if (!this._hastePart || !this._hastePart.active) {
          this._hastePart = this.add.circle(px, py, 18, 0x60a5fa, 0.18);
        }
        this._hastePart.setPosition(px, py);
      } else if (this._hastePart && this._hastePart.active && time >= this.hasteUntil) {
        this._hastePart.destroy(); this._hastePart = null;
      }

      /* Spectral Shield */
      if (this.ps.shieldCd) {
        if (!this.shieldActive && time >= this.shieldUntilReady) {
          this.shieldActive = true;
          if (!this.shieldViz) this.shieldViz = this.add.arc(px, py, 24, 0, 360, false, 0x93c5fd, 0).setStrokeStyle(2, 0x93c5fd, 0.9);
        }
        if (this.shieldViz) this.shieldViz.setPosition(px, py).setAlpha(this.shieldActive ? 1 : 0);
      }

      /* Cursed Aura */
      if (this.ps.auraDmg) {
        if (!this.auraViz) {
          this.auraViz = this.add.circle(px, py, this.ps.auraRange, 0x7c3aed, 0.09);
          this.tweens.add({ targets: this.auraViz, alpha: 0.18, duration: 900, yoyo: true, repeat: -1, ease: 'sine.inOut' });
        }
