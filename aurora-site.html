  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06000f; touch-action: none; }
    #aurora-bg { position: fixed; inset: 0; z-index: 0; }
    #aurora-bg canvas { width: 100%; height: 100%; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { touch-action: none; }
    /* Touch controls */
    #tc-wrap { display:none; position:fixed; inset:0; z-index:60; pointer-events:none; }
    #tc-joy-zone { position:absolute; left:0; top:0; width:55%; height:100%; pointer-events:all; }
    #tc-base { position:absolute; display:none; width:112px; height:112px; border-radius:50%;

    #tc-stick { position:absolute; display:none; width:50px; height:50px; border-radius:50%;

    #tc-dash { position:absolute; right:28px; bottom:110px; width:74px; height:74px; border-radius:50%;

      pointer-events:all; display:flex; align-items:center; justify-content:center;
      font-size:18px; user-select:none; -webkit-user-select:none; }

<body>

  <!-- Touch controls (shown only during gameplay on touch devices) -->

    <div id="tc-joy-zone"></div>
    <div id="tc-base"></div>
    <div id="tc-stick"></div>
    <div id="tc-dash">DASH</div>
    <div id="tc-pause">⏸</div>
  </div>

  <script>
  /* ── TOUCH CONTROLS ── */
  window._isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  window._touch = { vx: 0, vy: 0, dashPressed: false, _dashWas: false };

  window._showTouchControls = function(show) {
    if (!window._isMobile) return;
    document.getElementById('tc-wrap').style.display = show ? 'block' : 'none';
  };

  (function() {
    const wrap    = document.getElementById('tc-wrap');
    const jZone   = document.getElementById('tc-joy-zone');
    const jBase   = document.getElementById('tc-base');
    const jStick  = document.getElementById('tc-stick');
    const dashBtn = document.getElementById('tc-dash');
    const JR = 52; // max joystick radius
    let jOrigin = null, jTouchId = null;

    function updateStick(cx, cy) {
      const dx = cx - jOrigin.x, dy = cy - jOrigin.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const capped = Math.min(dist, JR);
      const nx = dist > 0 ? dx/dist : 0;
      const ny = dist > 0 ? dy/dist : 0;
      jStick.style.left = (jOrigin.x + nx*capped - 25) + 'px';
      jStick.style.top  = (jOrigin.y + ny*capped - 25) + 'px';
      window._touch.vx = nx * Math.min(1, dist / JR);
      window._touch.vy = ny * Math.min(1, dist / JR);
    }

    jZone.addEventListener('touchstart', e => {
      e.preventDefault();
      if (jTouchId !== null) return;
      const t = e.changedTouches[0];
      jTouchId = t.identifier;
      jOrigin = { x: t.clientX, y: t.clientY };
      jBase.style.cssText += ';display:block;left:'+(t.clientX-56)+'px;top:'+(t.clientY-56)+'px;';
      jStick.style.cssText += ';display:block;left:'+(t.clientX-25)+'px;top:'+(t.clientY-25)+'px;';
    }, { passive: false });

    jZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) { updateStick(t.clientX, t.clientY); break; }
      }
    }, { passive: false });

    jZone.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) {
          jTouchId = null; jOrigin = null;
          jBase.style.display = 'none'; jStick.style.display = 'none';
          window._touch.vx = 0; window._touch.vy = 0;
          break;
        }
      }
    }, { passive: false });
    jZone.addEventListener('touchcancel', () => { jTouchId = null; jOrigin = null; jBase.style.display = 'none'; jStick.style.display = 'none'; window._touch.vx = 0; window._touch.vy = 0; }, { passive: false });

    dashBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      window._touch.dashPressed = true;
      dashBtn.classList.add('active');
    }, { passive: false });
    dashBtn.addEventListener('touchend', e => {
      e.preventDefault();
      window._touch.dashPressed = false;
      dashBtn.classList.remove('active');
    }, { passive: false });

    // Pause button
    document.getElementById('tc-pause').addEventListener('touchstart', e => {
      e.preventDefault();
      if (window._triggerPause) window._triggerPause();
    }, { passive: false });

    // Prevent default touch on canvas to avoid scroll/zoom
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  })();
  </script>

    <!-- Hint -->

  <script>
  (function(){
    const CLASS_EMOJI_DOM = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀', rogue:'🗡️', paladin:'🛡️', berserker:'🪓' };
    let _open = false, _activeTab = 'normal', _cache = { normal: null, '1hp': null };

    const ACH_DEFS = [
      { id:'firstBlood',  icon:'🩸', name:'First Blood',     hint:'Kill 1 enemy',              cat:'easy' },
      { id:'survivor5',   icon:'⏱️', name:'Survivor',         hint:'Last 5 minutes',            cat:'easy' },
      { id:'wave10',      icon:'🌊', name:'Wave Rider',       hint:'Reach wave 10',             cat:'easy' },
      { id:'level10',     icon:'⭐', name:'Rising Star',      hint:'Get to level 10',           cat:'easy' },
      { id:'century',     icon:'💯', name:'Century',          hint:'100 kills in one run',      cat:'medium' },
      { id:'allClasses',  icon:'🎭', name:'Class Act',        hint:'Try every starter class',   cat:'medium' },
      { id:'elite25',     icon:'👑', name:'Elite Slayer',     hint:'25 elites in one run',      cat:'medium' },
      { id:'souls5k',     icon:'✦',  name:'Soul Hoarder',     hint:'Earn 5000 total souls',     cat:'medium' },
      { id:'speedRunner', icon:'🏃', name:'Speed Runner',     hint:'Last 10 minutes in one run',cat:'hard', unlocks:'Rogue' },
      { id:'wave25',      icon:'🏆', name:'Wave Champion',    hint:'Reach wave 25',             cat:'hard', unlocks:'Berserker' },
      { id:'millennium',  icon:'💀', name:'Millennium',       hint:'1000 total kills ever',     cat:'hard', unlocks:'Paladin' },
      { id:'triLegend',   icon:'🌟', name:'Legendary Run',    hint:'3 legendaries in one run',  cat:'hard' },
      { id:'bossHunter',  icon:'🐉', name:'Boss Hunter',      hint:'Defeat 20 bosses total',    cat:'hard' },
      { id:'untouchable', icon:'🛡️', name:'Untouchable',      hint:'No damage for one wave',    cat:'legendary' },
      { id:'wave35',      icon:'👹', name:'Apex Predator',    hint:'Reach wave 35',             cat:'legendary' },
      { id:'decimator',   icon:'💥', name:'Decimator',        hint:'1M damage in one run',      cat:'legendary' },
      { id:'onehpLegend', icon:'☠️', name:'1HP Legend',       hint:'10 min in 1HP mode',        cat:'legendary' },
      { id:'speedDemon',  icon:'⚡', name:'Speed Demon',      hint:'Last 20 minutes',           cat:'legendary' },
    ];

    const CAT_COL = { easy:'#4ade80', medium:'#60a5fa', hard:'#f87171', legendary:'#fbbf24' };

    function renderAchievements() {
      let granted = [];
      try { granted = JSON.parse(localStorage.getItem('hoa_ach')) || []; } catch {}
      const rows = document.getElementById('ach-rows');
      const count = document.getElementById('ach-count');
      count.textContent = `${granted.length} / ${ACH_DEFS.length}`;
      const cats = ['easy','medium','hard','legendary'];
      const catLabel = { easy:'Easy', medium:'Medium', hard:'Hard', legendary:'Legendary' };
      rows.innerHTML = cats.map(cat => {
        const group = ACH_DEFS.filter(a => a.cat === cat);
        const items = group.map(a => {
          const earned = granted.includes(a.id);
          return `<div style="
            display:flex; align-items:center; gap:8px; padding:5px 12px;
            opacity:${earned ? 1 : 0.38};
          ">
            <span style="font-size:14px;width:18px;text-align:center">${a.icon}</span>
            <div style="flex:1; min-width:0;">
              <div style="font-size:11px;font-weight:bold;color:${earned ? CAT_COL[cat] : '#6b7280'};
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${a.name}${a.unlocks ? ` <span style="font-size:9px;color:#fbbf24">🔓 ${a.unlocks}</span>` : ''}
              </div>
              <div style="font-size:9px;color:rgba(255,255,255,${earned?0.45:0.25});margin-top:1px;">
                ${earned ? '✓ Completed' : a.hint}
              </div>
            </div>
            ${earned ? '<span style="color:#fbbf24;font-size:12px">✓</span>' : ''}
          </div>`;
        }).join('');
        return `<div style="padding:4px 12px 2px;font-size:9px;font-weight:bold;letter-spacing:2px;color:${CAT_COL[cat]};opacity:0.7;margin-top:4px;">${catLabel[cat].toUpperCase()}</div>${items}`;
      }).join('');
    }

    function renderRows(scores) {
      const rows = document.getElementById('lb-rows');
      const you = localStorage.getItem('hoa_name') || '';
      const is1hp = _activeTab === '1hp';
      if (!Array.isArray(scores) || scores.length === 0) {
        rows.innerHTML = `<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">${is1hp ? 'No 1HP runs yet — dare to try?' : 'No scores yet.'}</div>`;
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      rows.innerHTML = scores.map((s, i) => {
        const medal  = medals[i] || `<span style="color:rgba(255,255,255,0.35);font-size:11px">${i+1}.</span>`;
        const emoji  = CLASS_EMOJI_DOM[s.class_name] || '❓';
        const isYou  = s.name === you;
        const divider = i === 9 ? 'border-top:1px dashed rgba(124,58,237,0.3);margin-top:4px;padding-top:4px;' : '';
        return `<div style="
          display:flex; align-items:center; gap:8px; padding:7px 14px;
          background:${isYou ? 'rgba(124,58,237,0.18)' : 'transparent'};
          border-left:${isYou ? '2px solid #7c3aed' : '2px solid transparent'};

          <span style="font-size:13px">${emoji}</span>
          <span style="flex:1;font-size:12px;color:${isYou ? '#c4b5fd' : 'rgba(255,255,255,0.8)'};
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${isYou?'bold':'normal'}">
            ${s.name}${isYou?' ◀':''}
          </span>
          <span style="font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap">

          </span>
          <span style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap">
            ${s.kills}k
          </span>
        </div>`;
      }).join('');
    }

    async function loadTab(tab) {
      if (_cache[tab]) { renderRows(_cache[tab]); return; }
      document.getElementById('lb-rows').innerHTML =
        '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">Loading…</div>';
      try {
        const SB_URL = 'https://biclaeemulhkdejyeysv.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xhZWVtdWxoa2RlanlleXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTkzODIsImV4cCI6MjA5Nzc3NTM4Mn0.VkFCPzroqgPgUkxXfLjrWbWBXoOONV6OFHBuyrRm7l0';
        const table = tab === '1hp' ? 'aurora_leaderboard_1hp' : 'aurora_leaderboard';
        const r = await fetch(`${SB_URL}/rest/v1/${table}?select=name,wave,kills,level,class_name&order=wave.desc,kills.desc&limit=100`,
          { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
        const data = await r.json();
        _cache[tab] = Array.isArray(data) ? data : [];
        renderRows(_cache[tab]);
      } catch { renderRows([]); }
    }

    window._lbToggle = function() {
      _open = !_open;
      document.getElementById('lb-panel').style.display = _open ? 'block' : 'none';
      document.getElementById('ach-panel').style.display = _open ? 'block' : 'none';
      document.getElementById('lb-caret').textContent = _open ? '▲' : '▼';
      if (_open) { _cache = { normal: null, '1hp': null }; loadTab(_activeTab); renderAchievements(); }
    };

    window._lbTab = function(tab) {
      _activeTab = tab;
      ['normal','1hp'].forEach(t => {
        const el = document.getElementById(`lb-tab-${t}`);
        const active = t === tab;
        el.style.color = active ? '#a78bfa' : 'rgba(167,139,250,0.4)';
        el.style.borderBottom = active ? '2px solid #7c3aed' : '2px solid transparent';
      });
      loadTab(tab);
    };

    /* Close when clicking outside */
    document.addEventListener('click', e => {
      if (_open && !e.target.closest('#lb-btn') && !e.target.closest('#lb-panel') && !e.target.closest('#ach-panel')) {
        _open = false;
        document.getElementById('lb-panel').style.display = 'none';
        document.getElementById('lb-caret').textContent = '▼';
      }
    });
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <script>
  const W = window.innerWidth;
  const H = window.innerHeight;

  /* ── SUPABASE LEADERBOARD ── */
  /*
    Run this SQL once in Supabase Dashboard → SQL Editor to set up:
    ─────────────────────────────────────────────────────────────────
    DELETE FROM aurora_leaderboard;
    ALTER TABLE aurora_leaderboard ADD COLUMN IF NOT EXISTS class_name text;
    CREATE UNIQUE INDEX IF NOT EXISTS lb_name_unique ON aurora_leaderboard(name);

    CREATE TABLE IF NOT EXISTS aurora_leaderboard_1hp (
      id bigserial primary key,
      name text unique,
      wave int, kills int, level int,
      class_name text,
      created_at timestamptz default now()
    );
    ALTER TABLE aurora_leaderboard_1hp ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "pub" ON aurora_leaderboard_1hp FOR ALL USING (true) WITH CHECK (true);
    ─────────────────────────────────────────────────────────────────
  */
  const SB_URL = 'https://biclaeemulhkdejyeysv.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xhZWVtdWxoa2RlanlleXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTkzODIsImV4cCI6MjA5Nzc3NTM4Mn0.VkFCPzroqgPgUkxXfLjrWbWBXoOONV6OFHBuyrRm7l0';
  const SB_HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

  const CLASS_EMOJI = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀', rogue:'🗡️', paladin:'🛡️', berserker:'🪓' };

  async function postScore(name, wave, kills, level, cls, is1hp) {
    const table = is1hp ? 'aurora_leaderboard_1hp' : 'aurora_leaderboard';
    try {
      /* Fetch existing entry for this player */
      const r = await fetch(
        `${SB_URL}/rest/v1/${table}?name=eq.${encodeURIComponent(name)}&select=id,wave,kills`,
        { headers: SB_HDR }
      );
      const existing = await r.json();
      if (!Array.isArray(existing)) return;

  function checkAchievements(runStats) {
    const st = loadStats();

    ACHIEVEMENTS.forEach(ach => {
      if (granted.includes(ach.id)) return;
      if (ach.check(st, runStats)) { granted.push(ach.id); newlyGranted.push(ach); }
    });
    if (newlyGranted.length) saveAch(granted);
    return newlyGranted;
  }

  /* ── SFX ENGINE (Web Audio API, no external files) ── */
  const SFX = (() => {
    let ctx = null, muted = false;
    const vol = () => muted ? 0 : 1;

    function getCtx() {
      if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
      if (ctx && ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function tone(freq, dur, type = 'sine', gain = 0.18, delay = 0, detune = 0) {
      const c = getCtx(); if (!c || muted) return;
      const g = c.createGain();
      const t0 = c.currentTime + delay;
      g.gain.setValueAtTime(0.001, t0);
      g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      const o = c.createOscillator();
      o.type = type; o.frequency.value = freq; o.detune.value = detune;
      o.connect(g); g.connect(c.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    }

    function noise(dur, gain = 0.12, delay = 0, hpFreq = 0) {
      const c = getCtx(); if (!c || muted) return;
      const sr = c.sampleRate;
      const buf = c.createBuffer(1, Math.ceil(sr * dur), sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const g = c.createGain();
      const t0 = c.currentTime + delay;
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      let node = src;
      if (hpFreq) {
        const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = hpFreq;
        src.connect(hp); hp.connect(g);
      } else { src.connect(g); }
      g.connect(c.destination);
      src.start(t0);
    }

    return {
      init() { getCtx(); },
      toggleMute() { muted = !muted; return muted; },
      isMuted() { return muted; },

      /* ── Per-class shoot sounds ── */
      shoot(cls) {
        if (muted) return;
        if (cls === 'knight' || cls === 'paladin' || cls === 'berserker') {
          noise(0.06, 0.20, 0, 400); tone(180, 0.09, 'sawtooth', 0.12);
        } else if (cls === 'wizard') {
          tone(820, 0.05, 'sine', 0.13); tone(1100, 0.08, 'sine', 0.08, 0.02);
        } else if (cls === 'necromancer') {
          tone(220, 0.12, 'sawtooth', 0.10); tone(180, 0.10, 'sine', 0.07, 0.04);
        } else if (cls === 'rogue') {
          noise(0.04, 0.14, 0, 1200); tone(680, 0.04, 'square', 0.07);
        } else { /* hunter */
          tone(900, 0.05, 'sawtooth', 0.10); tone(640, 0.04, 'sine', 0.07, 0.02);
        }
      },

      kill() {
        noise(0.07, 0.18, 0, 200);
        tone(520, 0.06, 'sine', 0.14); tone(780, 0.08, 'sine', 0.09, 0.04);
      },

      eliteKill() {

  /* ── SEEDED RNG for Daily Challenge ── */
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function getDailySeed() {
    const d = new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  }

  function waveCfg(n) {
    const boss = n % 5 === 0;
    let waveType = 'normal';
    if (!boss && n >= 4 && n % 3 === 0) waveType = 'horde';
    if (!boss && n >= 7 && n % 7 === 0) waveType = 'elite';
    const late = Math.max(0, n - 15);
    const surge = Math.max(0, n - 30);
    const base = boss ? Math.floor(20+n*8+late*4) : Math.floor(30+n*15+late*10+surge*8);
    const baseInt = Math.max(50, 320 - n * 22);
    return {
      n, boss, waveType,
      count:    waveType === 'horde' ? base * 2 : base,
      interval: waveType === 'horde' ? Math.max(28, baseInt * 0.44) : baseInt,
      hp:       Math.floor((25+n*22+late*late*2+surge*surge*3) * (waveType==='elite' ? 1.2 : 1)),
      speed:    Math.min(280, 58 + n*3.5 + late*2 + surge*1.5),
      dmg:      Math.floor(8 + n*2 + late*0.8 + surge*0.6),
      xpVal:    4 + n * 2,
      eliteAll: waveType === 'elite',
      eliteTier:Math.floor(n / 7),
      bossHp:   Math.floor(500 + n*200 + late*late*12 + surge*surge*8),
      bossType: (Math.floor(n / 5) - 1) % 4,
    };
  }

  function rollRarity() {
    const r = Math.random();
    return r < 0.01 ? 'legendary' : r < 0.16 ? 'rare' : 'common';
  }

  function pickOffers(playerClass, takenTraits = [], is1hp = false) {
    const cls = playerClass || 'hunter';
    const pool = BLUEPRINTS.filter(bp => {
      if (bp.requires && !bp.requires.every(r => takenTraits.includes(r))) return false;
      if (is1hp && bp.givesHp) return false;
      if (!bp.cls) return true;
      if (Array.isArray(bp.cls)) return bp.cls.includes(cls);
      return bp.cls === cls;
    });
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 3).map(bp => {
      const tier = rollRarity();
      return { bp, tier, desc: bp[tier].desc, fn: bp[tier].fn };
    });
  }

  class MenuScene extends Phaser.Scene {
    constructor() { super('Menu'); }
    create() {
      const meta = loadMeta();
      const cx = W / 2, cy = H / 2;
      const title = this.add.text(cx, cy - 80, 'HALLS OF AURORA', {
        fontSize: Math.min(62, W / 13) + 'px',
        fontFamily: 'system-ui', fontStyle: 'bold', color: '#ffffff',
      }).setOrigin(0.5).setAlpha(0);
      const sub = this.add.text(cx, cy - 14, 'A survivor roguelite', {
        fontSize: '18px', fontFamily: 'system-ui', color: '#a78bfa',
      }).setOrigin(0.5).setAlpha(0);
      const hint = this.add.text(cx, cy + 55, 'Press ENTER or click to play', {
        fontSize: '16px', fontFamily: 'system-ui', color: '#7c3aed',
      }).setOrigin(0.5).setAlpha(0);

      const scores = [];
      if (meta.bestWave)  scores.push(`Best wave: ${meta.bestWave}`);
      if (meta.bestKills) scores.push(`Most kills: ${meta.bestKills}`);
      if (meta.bestLevel) scores.push(`Highest level: ${meta.bestLevel}`);
      if (scores.length) {
        this.add.text(cx, cy + 95, scores.join('   ·   '), {
          fontSize: '12px', fontFamily: 'system-ui', color: 'rgba(255,255,255,0.4)',
        }).setOrigin(0.5);
      }
      if (meta.souls > 0) {
        this.add.text(cx, cy + 118, `✦ ${meta.souls} souls saved`, {
          fontSize: '13px', fontFamily: 'system-ui', color: '#fbbf24',
        }).setOrigin(0.5).setAlpha(0.85);
      }

      this.tweens.add({ targets: title, alpha: 1, y: cy - 70, duration: 700, ease: 'power3.out', delay: 100 });
      this.tweens.add({ targets: sub,   alpha: 1, y: cy - 4,  duration: 600, ease: 'power3.out', delay: 300 });
      this.tweens.add({ targets: hint,  alpha: 1, duration: 500, delay: 600, onComplete: () =>
        this.tweens.add({ targets: hint, alpha: 0, duration: 700, yoyo: true, repeat: -1 })
      });

      /* Daily Challenge button */
      const dailyBtn = this.add.text(cx, cy + 148, '🗓  Daily Challenge', {
        fontSize:'14px', fontFamily:'system-ui', fontStyle:'bold', color:'#fbbf24',
      }).setOrigin(0.5).setInteractive({ useHandCursor:true }).setAlpha(0);
      dailyBtn.on('pointerover', ()=>dailyBtn.setAlpha(1));
      dailyBtn.on('pointerout',  ()=>dailyBtn.setAlpha(0.8));
      dailyBtn.on('pointerdown', ()=>{
        localStorage.setItem('hoa_daily','1');
        const goDaily = () => { this.cameras.main.fadeOut(350,0,0,0); this.time.delayedCall(370,()=>this.scene.start('ClassSelect')); };
        if (!localStorage.getItem('hoa_name')) {
          const ov = document.getElementById('name-overlay'); ov.style.display='flex';
          const inp = document.getElementById('name-input'); inp.focus();
          const sub = ()=>{ const n=inp.value.trim().slice(0,16); if(!n)return; localStorage.setItem('hoa_name',n); ov.style.display='none'; goDaily(); };
          document.getElementById('name-submit').onclick = sub; inp.onkeydown = e=>{ if(e.key==='Enter') sub(); };
        } else { goDaily(); }
      });
      this.tweens.add({ targets:dailyBtn, alpha:0.8, duration:500, delay:700 });

      /* Achievements button */
      const achBtn = this.add.text(cx, cy + 178, '🏆  Achievements', {
        fontSize:'13px', fontFamily:'system-ui', color:'rgba(251,191,36,0.6)',
      }).setOrigin(0.5).setInteractive({ useHandCursor:true }).setAlpha(0);
      achBtn.on('pointerover', ()=>achBtn.setColor('#fbbf24'));
      achBtn.on('pointerout',  ()=>achBtn.setColor('rgba(251,191,36,0.6)'));
      achBtn.on('pointerdown', ()=>{ this.cameras.main.fadeOut(250,0,0,0); this.time.delayedCall(270,()=>this.scene.start('Achievements')); });
      this.tweens.add({ targets:achBtn, alpha:0.8, duration:500, delay:800 });

      const startGame = () => {
        localStorage.removeItem('hoa_daily');
        this.cameras.main.fadeOut(350, 0, 0, 0);
        this.time.delayedCall(370, () => { this.scene.start('ClassSelect'); });
      };

      const go = () => {
        this.input.keyboard.off('keydown-ENTER', go);
        this.input.off('pointerdown', go);
        if (!localStorage.getItem('hoa_name')) {
          const ov = document.getElementById('name-overlay');
          ov.style.display = 'flex';
          const inp = document.getElementById('name-input');
          inp.focus();
          const submit = () => {
            const n = inp.value.trim().slice(0, 16);
            if (!n) return;
            localStorage.setItem('hoa_name', n);
            ov.style.display = 'none';
            startGame();
          };
          document.getElementById('name-submit').onclick = submit;
          inp.onkeydown = e => { if (e.key === 'Enter') submit(); };
        } else {
          startGame();
        }
      };
      this.input.keyboard.on('keydown-ENTER', go);
      this.input.on('pointerdown', go);
    }
  }

  class ClassSelectScene extends Phaser.Scene {
    constructor() { super('ClassSelect'); }

    /* ── ElectricBorder noise helpers ── */
    _ebRnd(x) { return (Math.sin(x * 12.9898) * 43758.5453) % 1; }
    _ebN2(x, y) {
      const i=Math.floor(x),j=Math.floor(y),fx=x-i,fy=y-j;
      const a=this._ebRnd(i+j*57),b=this._ebRnd(i+1+j*57),c=this._ebRnd(i+(j+1)*57),d=this._ebRnd(i+1+(j+1)*57);
      const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
      return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy;
    }
    _ebON(x, t, seed) {
      let y=0,amp=0.084,freq=16;
      for(let i=0;i<9;i++){
        y+=amp*this._ebN2(freq*x+seed*100,t*freq*0.3);
        freq*=1.6; amp*=0.7;
      }
      return y;
    }
    _ebPt(t, l, top, w, h, r) {
      const sw=w-2*r,sh=h-2*r,ca=(Math.PI*r)/2;
      const total=2*sw+2*sh+4*ca,dist=t*total;
      let acc=0;
      if(dist<=acc+sw){const p=(dist-acc)/sw;return{x:l+r+p*sw,y:top};}acc+=sw;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=-Math.PI/2+p*Math.PI/2;return{x:l+w-r+r*Math.cos(a),y:top+r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sh){const p=(dist-acc)/sh;return{x:l+w,y:top+r+p*sh};}acc+=sh;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=p*Math.PI/2;return{x:l+w-r+r*Math.cos(a),y:top+h-r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sw){const p=(dist-acc)/sw;return{x:l+w-r-p*sw,y:top+h};}acc+=sw;
      if(dist<=acc+ca){const p=(dist-acc)/ca,a=Math.PI/2+p*Math.PI/2;return{x:l+r+r*Math.cos(a),y:top+h-r+r*Math.sin(a)};}acc+=ca;
      if(dist<=acc+sh){const p=(dist-acc)/sh;return{x:l,y:top+h-r-p*sh};}acc+=sh;
      const p=(dist-acc)/ca,a=Math.PI+p*Math.PI/2;
      return{x:l+r+r*Math.cos(a),y:top+r+r*Math.sin(a)};
    }
    _drawEB(g, left, top, width, height, radius, time, color) {
      const disp=16, samples=Math.floor((2*(width+height))/4);
      const pts=[];
      for(let i=0;i<=samples;i++){
        const pr=i/samples, pt=this._ebPt(pr,left,top,width,height,radius);
        pts.push({x:pt.x+this._ebON(pr*8,time,0)*disp, y:pt.y+this._ebON(pr*8,time,1)*disp});
      }
      [[6,color,0.10],[3,color,0.28],[1.5,color,0.95]].forEach(([lw,col,alpha])=>{
        g.lineStyle(lw,col,alpha);
        g.beginPath();
        pts.forEach((p,i)=>{ if(i===0)g.moveTo(p.x,p.y);else g.lineTo(p.x,p.y); });
        g.closePath(); g.strokePath();
      });
    }

    create() {
      const W = this.scale.width, H = this.scale.height;
      this.cameras.main.setBackgroundColor('rgba(6,0,15,0.95)');
      this._ebTime = 0;
      this._ebCards = [];

      }).setOrigin(0.5);
      this.add.text(W/2, 83, 'Your choice shapes your playstyle', {
        fontSize:'13px', fontFamily:'system-ui', color:'#64748b',
      }).setOrigin(0.5);

      /* Row 1: starter classes. Row 2: advanced locked classes */
      const row1Keys = ['hunter','knight','wizard','necromancer'];

      const cardW = Math.min(170, (W - 80) / 4);

      /* Row centres — keep clear of header (y≈83) and footer */
      const row1Cy = Math.round(H * 0.33);   // ~198 on a 600H screen

      const buildRow = (keys, rowCy) => {
        const totalW = keys.length * cardW + (keys.length - 1) * gap;
        const startX = W/2 - totalW/2;
        keys.forEach((key, i) => {

          this.add.text(cx, rowCy - hh + 76, cls.desc, {

          }).setOrigin(0.5, 0);

          const divG = this.add.graphics();
          divG.lineStyle(1, cls.color, unlocked ? 0.3 : 0.08);
          divG.lineBetween(cx - cardW*0.35, rowCy + 4, cx + cardW*0.35, rowCy + 4);

          const sd = cls.stats;
          [`HP: ${sd.hp}`, `SPD: ${sd.spd}`, `DMG: ${sd.dmg}`]
            .forEach((stat, si) => {

          if (!unlocked) {

                wordWrap:{ width: cardW - 18 }, align:'center',
              }).setOrigin(0.5, 0);
            });
          }

          if (unlocked) {
            bg.on('pointerover', () => bg.setFillStyle(cls.color, 0.28));
            bg.on('pointerout',  () => bg.setFillStyle(cls.color, 0.13));
            bg.on('pointerdown', () => {
              localStorage.setItem('hoa_class', key);
              this.cameras.main.fadeOut(250, 0, 0, 0);
              this.time.delayedCall(270, () => { this.scene.start('Game'); this.scene.launch('UI'); });
            });
          }
        });
      };

      buildRow(row1Keys, row1Cy);
      /* Divider between the two rows */
      const dividerY = Math.round((row1Cy + cardH/2 + row2Cy - cardH/2) / 2);
      const divLine = this.add.graphics();
      divLine.lineStyle(1, 0x1e1e3a, 1);
      divLine.lineBetween(W*0.05, dividerY, W*0.95, dividerY);
      this.add.text(W/2, dividerY, 'ADVANCED CLASSES — Unlock by completing achievements', {
        fontSize:'10px', fontFamily:'system-ui', fontStyle:'bold', color:'#374151', letterSpacing:2,
      }).setOrigin(0.5);
      buildRow(row2Keys, row2Cy);

      /* ── 1HP Mode toggle ── */
      const is1hp = () => localStorage.getItem('hoa_1hp') === '1';
      const oneBg = this.add.rectangle(W/2, H - 36, 220, 28, 0x7f1d1d, 0.3).setInteractive();
      const oneBorder = this.add.graphics();
      const oneLabel = this.add.text(W/2, H - 56, '', {
        fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#fca5a5',
      }).setOrigin(0.5);
      const refreshOne = () => {
        const on = is1hp();
        oneBg.setFillStyle(on ? 0x7f1d1d : 0x1e1e2e, on ? 0.7 : 0.4);
        oneBorder.clear();
        oneBorder.lineStyle(on ? 2 : 1, on ? 0xef4444 : 0x4b5563, on ? 0.9 : 0.5);
        oneBorder.strokeRect(W/2 - 110, H - 51, 220, 28);

        oneLabel.setColor(on ? '#fca5a5' : '#6b7280');

      refreshOne();
      oneBg.on('pointerdown', () => {
        localStorage.setItem('hoa_1hp', is1hp() ? '0' : '1');
        refreshOne();
      });
      oneBg.on('pointerover', () => oneBg.setStrokeStyle(1, 0xef4444));
      oneBg.on('pointerout',  () => oneBg.setStrokeStyle(0));

      this.add.text(W/2, H - 14, 'ESC — back to menu   ·   Unlock advanced classes by playing and completing achievements', {
        fontSize:'10px', fontFamily:'system-ui', color:'#374151',
      }).setOrigin(0.5);
      this.input.keyboard.on('keydown-ESC', () => this.scene.start('Menu'));
    }

    update(time, delta) {
      if (!this._ebCards || !this._ebCards.length) return;
      this._ebTime += (delta / 1000) * 0.75;
      this._ebCards.forEach(({ g, cx, cy, w, h, color, locked }) => {
        g.clear();
        this._drawEB(g, cx - w/2, cy - h/2, w, h, 8, this._ebTime, locked ? 0x374151 : color);
      });
    }
  }

    startWave() {
      if (this.dead) return;
      this.waveNum++;
      this.waveKills = 0;
      this._warchiefStacks = 0;
      this._waveHit = false;
      const cfg = waveCfg(this.waveNum);
      this.cfg = cfg; this.spawned = 0; this.total = cfg.count; this.alive = 0;
      this.events.emit('wave', this.waveNum, cfg.boss);
      if (cfg.boss) window._SFX.boss(); else if (cfg.waveType === 'elite') window._SFX.waveElite(); else window._SFX.wave();
      if (cfg.boss) {
        this.time.delayedCall(600, () => this.spawnBoss(cfg));
      } else {
        if (cfg.waveType === 'horde') {
          const ann = this.add.text(W/2, H*0.38, '⚡ HORDE WAVE ⚡', {
            fontSize:'38px', fontFamily:'system-ui', fontStyle:'bold',
            color:'#f97316', stroke:'#000', strokeThickness:5,
          }).setOrigin(0.5).setAlpha(0);
          this.tweens.add({ targets:ann, alpha:1, duration:200, onComplete:()=>
            this.time.delayedCall(900,()=>this.tweens.add({ targets:ann, alpha:0, scaleX:1.3, scaleY:1.3, duration:600, onComplete:()=>ann.destroy() }))
          });
        } else if (cfg.waveType === 'elite') {
          const ann = this.add.text(W/2, H*0.38, '★ ELITE WAVE ★', {
            fontSize:'38px', fontFamily:'system-ui', fontStyle:'bold',
            color:'#fbbf24', stroke:'#000', strokeThickness:5,
          }).setOrigin(0.5).setAlpha(0);
          this.tweens.add({ targets:ann, alpha:1, duration:200, onComplete:()=>
            this.time.delayedCall(900,()=>this.tweens.add({ targets:ann, alpha:0, scaleX:1.3, scaleY:1.3, duration:600, onComplete:()=>ann.destroy() }))
          });
        }
      }
      this.time.addEvent({ delay: cfg.interval, repeat: cfg.count - 1, callback: () => this.spawnEnemy(cfg) });
    }

    offscreenPos() {
      const s = Phaser.Math.Between(0, 3), m = 55;
      if (s === 0) return [Phaser.Math.FloatBetween(0, W), -m];
      if (s === 1) return [W + m, Phaser.Math.FloatBetween(0, H)];
      if (s === 2) return [Phaser.Math.FloatBetween(0, W), H + m];
      return [-m, Phaser.Math.FloatBetween(0, H)];
    }

    spawnEnemy(cfg) {
      if (this.dead) return;
      this.spawned++;
      const [x, y] = this.offscreenPos();
      const wn = this.waveNum;
      const roll = Math.random();

      let size = 13, color = 0xdc2626, hp = cfg.hp, spd = cfg.speed, type = 'basic';
      if      (wn >= 9 && roll < 0.07) { size=12; color=0x84cc16; spd*=0.5;  hp*=1.0; type='circler';  }
      else if (wn >= 7 && roll < 0.13) { size=14; color=0xea580c; spd*=0.55; hp*=1.1; type='bomber';   }
      else if (wn >= 6 && roll < 0.19) { size=10; color=0xd946ef; spd*=0.6;  hp*=0.7; type='burst';    }
      else if (wn >= 5 && roll < 0.25) { size=10; color=0x22d3ee; spd*=0.45; hp*=0.85;type='sniper';   }
      else if (wn >= 4 && roll < 0.32) { size=11; color=0xeab308; spd*=0.6;  hp*=0.8; type='ranged';   }
      else if (wn >= 6 && roll < 0.39) { size=16; color=0x9333ea; spd*=0.7;  hp*=1.4; type='splitter'; }
      else if (wn >= 8 && roll < 0.45) { size=18; color=0x1d4ed8; spd*=0.35; hp*=2.2; type='charger';  }
      else if (wn >= 3 && roll < 0.56) { size=9;  color=0xf97316; spd*=1.9;  hp*=0.5; type='fast';     }
      else if (wn >= 5 && roll < 0.66) { size=21; color=0x7f1d1d; spd*=0.5;  hp*=3.0; type='tank';     }
      else if (wn >= 4 && roll < 0.75) { size=15; color=0x475569; spd*=0.55; hp*=1.8; type='shielder'; }

      // Elite modifier — higher tier = more elites and stronger ones
      const eliteTier = cfg.eliteTier || 0;
      const eliteChance = Math.min(0.45, eliteTier * 0.07);
      const eliteMult   = 1 + eliteTier * 0.5;
      if (eliteTier > 0 && Math.random() < eliteChance) {
        hp   = Math.floor(hp * (1.8 + eliteMult));
        spd  = Math.min(300, spd * (1 + eliteTier * 0.08));
        size = Math.floor(size * (1 + eliteTier * 0.05));
      }

      this.mkEnemy(x, y, size, color, hp, spd, cfg.dmg, cfg.xpVal, type);
    }

    mkEnemy(x, y, size, color, hp, spd, dmg, xpVal, type, isMini = false) {
      const isElite = !isMini && type !== 'boss' && (this.cfg?.eliteAll ? Math.random() < 0.5 : Math.random() < 0.08);
      if (isElite) { hp *= 2; xpVal = Math.floor(xpVal * 2.5); size = Math.floor(size * 1.15); }

      if (this.ps && this.ps.enemySpeedCurse && !isMini) spd = Math.min(300, spd * this.ps.enemySpeedCurse);

      const g = this.add.graphics();
      if (isElite) { g.lineStyle(3, 0xfbbf24, 1); g.strokeCircle(0, 0, size + 5); g.lineStyle(0); }
      const s = size;
      if (type === 'basic') {
        // Demon skull
        g.fillStyle(0x7f1d1d, 1); g.fillCircle(0, 0, s);
        g.fillStyle(color, 1); g.fillCircle(0, -1, s - 2);
        g.fillStyle(0x000000, 0.75); g.fillCircle(-s*0.3, -s*0.22, s*0.28); g.fillCircle(s*0.3, -s*0.22, s*0.28);
        g.fillStyle(0xff3333, 1); g.fillCircle(-s*0.3, -s*0.22, s*0.14); g.fillCircle(s*0.3, -s*0.22, s*0.14);
        g.fillStyle(0xffffff, 0.9);
        g.fillTriangle(-s*0.38, s*0.32, -s*0.26, s*0.62, -s*0.14, s*0.32);
        g.fillTriangle(-s*0.14, s*0.32, -s*0.02, s*0.62,  s*0.10, s*0.32);
        g.fillTriangle( s*0.10, s*0.32,  s*0.22, s*0.62,  s*0.34, s*0.32);
        g.fillStyle(0x4a0505, 1);
        g.fillTriangle(-s*0.28, -s*0.82, -s*0.48, -s*1.18, -s*0.08, -s*0.82);
        g.fillTriangle( s*0.28, -s*0.82,  s*0.48, -s*1.18,  s*0.08, -s*0.82);
      } else if (type === 'fast') {
        // Bat imp
        g.fillStyle(0x7c2d12, 1);
        g.fillTriangle(-s*2.1, -s*0.3, -s*0.65, -s*0.55, -s*0.45, s*0.45);
        g.fillTriangle( s*2.1, -s*0.3,  s*0.65, -s*0.55,  s*0.45, s*0.45);
        g.fillStyle(0xc2410c, 0.35);
        g.fillTriangle(-s*1.9, -s*0.2, -s*0.65, -s*0.45, -s*0.45, s*0.35);

        g.lineBetween(-bs*0.48, -bs*0.18, bs*0.12, bs*0.28);
        g.lineBetween(bs*0.12, bs*0.28, -bs*0.1, bs*0.55);
        g.lineBetween(bs*0.12, bs*0.28, bs*0.38, -bs*0.32);
        g.lineStyle(2, 0xfef08a, 0.55);
        g.lineBetween(-bs*0.2, bs*0.05, -bs*0.45, bs*0.4);
        // chest rivets
        g.fillStyle(0xfbbf24, 0.8);
        g.fillCircle(-bs*0.32, bs*0.28, 4); g.fillCircle(bs*0.32, bs*0.28, 4);
        g.fillCircle(0, bs*0.38, 4);
        // multi eye cluster
        g.fillStyle(0xffffff, 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.14); g.fillCircle(bs*0.26, -bs*0.18, bs*0.14);
        g.fillStyle(bossEyeCol[bt], 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.09); g.fillCircle(bs*0.26, -bs*0.18, bs*0.09);
        g.fillStyle(0x000000, 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.04); g.fillCircle(bs*0.26, -bs*0.18, bs*0.04);
        g.fillStyle(0xfef08a, 0.9); g.fillCircle(0, -bs*0.08, bs*0.08); // third glowing eye
      }
      g.x = x; g.y = -80;
      this.physics.add.existing(g);
      g.body.setCircle(size, -size, -size);
      g._id = ++this._eid;
      g.eHp = cfg.bossHp; g.eMaxHp = cfg.bossHp;
      g.eSpd = 50 + this.waveNum * 1.5; g.eBaseSpd = g.eSpd;
      g.eDmg = cfg.dmg * 2.5; g.eXp = 60 + this.waveNum * 15;
      g.eSize = size; g.eColor = bossColors[bt]; g.eType = 'boss';
      g.isBoss = true; g.bossType = bt;
      g.lastDmgT = 0; g.lastShot = 0; g.lastSpecial = 0;
      g.chargeState = 'patrol'; g.chargeTimer = this.time.now + 2500;
      g.phase2 = false;
      g.hpBar = this.add.graphics();
      this.enemies.add(g);
      this.alive++;
      this.boss = g;
      this.events.emit('bossSpawn', g, this.waveNum);
      // Announce boss type
      const names = ['THE COLOSSUS', 'THE TEMPEST', 'THE VOIDWALKER', 'THE DREADNOUGHT'];
      const nameColors = ['#fb7185', '#22d3ee', '#a78bfa', '#fbbf24'];
      const label = this.add.text(W/2, H*0.18, names[bt], {
        fontSize: '26px', fontFamily: 'system-ui', fontStyle: 'bold',
        color: nameColors[bt], stroke: '#000', strokeThickness: 4, alpha: 0,
      }).setOrigin(0.5);
      this.tweens.add({ targets: label, alpha: 1, duration: 400,
        onComplete: () => this.time.delayedCall(1800, () => this.tweens.add({ targets: label, alpha: 0, duration: 500, onComplete: () => label.destroy() }))
      });
    }

    flashPlayer() {
      this.drawPlayer(true);
      this.time.delayedCall(160, () => { if (!this.dead) this.drawPlayer(); });
    }

    takeDamage(raw) {
      if (this.shieldActive) return 0;
      /* Rogue Evasion */
      if (this.ps.dodgeChance && Math.random() < this.ps.dodgeChance) {
        const ft = this.add.text(this.pg.x, this.pg.y - 28, 'DODGE!', { fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#2dd4bf', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:ft, y:ft.y-32, alpha:0, duration:750, onComplete:()=>ft.destroy() });
        if (this.ps.dodgeHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.dodgeHeal);
        if (this.ps.dodgeSpeed) this.hasteUntil = Math.max(this.hasteUntil, this.time.now + 900);
        window._SFX.dodge();
        this._waveHitThisTick = false;
        return 0;
      }
      /* Paladin Divine Shield */
      if (this.ps.divineBlock && Math.random() < this.ps.divineBlock) {
        const ft2 = this.add.text(this.pg.x, this.pg.y - 28, '🛡 BLOCKED!', { fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#fcd34d', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:ft2, y:ft2.y-30, alpha:0, duration:750, onComplete:()=>ft2.destroy() });
        if (this.ps.divineCounter) {
          const near = this.enemies.getChildren().filter(e=>e.active && Phaser.Math.Distance.Between(this.pg.x,this.pg.y,e.x,e.y)<80);
          near.forEach(e=>{ e.eHp -= Math.floor(raw * this.ps.divineCounter); this.hitFlash(e); });
        }
        if (this.ps.divineHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.divineHeal);
        window._SFX.block();
        this._waveHitThisTick = false;
        return 0;
      }
      this._waveHitThisTick = true;
      let dmg = this.ps.dmgReduce ? Math.max(1, Math.floor(raw * (1 - Math.min(0.85, this.ps.dmgReduce)))) : raw;
      dmg = Math.floor(dmg * (this.ps.curseDmgIn || 1));
      /* Bone Armor absorbs hits */
      if (this.ps.boneArmor && this.ps.boneStacks > 0) {
        const absorbed = Math.min(dmg, this.ps.boneStacks * this.ps.bonePerStack);
        dmg = Math.max(0, dmg - absorbed);
        const stacksUsed = Math.ceil(absorbed / this.ps.bonePerStack);
        this.ps.boneStacks = Math.max(0, this.ps.boneStacks - stacksUsed);
      }
      if (dmg <= 0) return 0;
      this.ps.hp -= dmg;
      window._SFX.hurt();
      /* Break streak on damage */
      if (this._streak > 4) this.events.emit('streakBroken', this._streak);
      this._streak = 0;
      this.events.emit('streak', 0);
      this.flashPlayer();
      this.cameras.main.shake(130, 0.007);
      this._vignette.setAlpha(0.7);
      this.tweens.killTweensOf(this._vignette);
      this.tweens.add({ targets:this._vignette, alpha:0, duration:520, ease:'power2.in' });
      if (this.ps.hp <= 0) { this.ps.hp = 0; this.onDeath(); }
      return dmg;
    }

    hitFlash(enemy) {
      if (!enemy || !enemy.active) return;
      const flash = this.add.circle(enemy.x, enemy.y, enemy.eSize || 14, 0xffffff, 0.55);
      this.tweens.add({ targets: flash, alpha: 0, duration: 90, ease: 'power2.in', onComplete: () => flash.destroy() });
    }

    deathBurst(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const p = this.add.circle(x, y, Phaser.Math.Between(2, 5), color);
        this.tweens.add({
          targets: p,
          x: x + Math.cos(angle) * (30 + Math.random() * 40),
          y: y + Math.sin(angle) * (30 + Math.random() * 40),
          alpha: 0, scaleX: 0, scaleY: 0,
          duration: 350 + Math.random() * 200,
          ease: 'power2.out',
          onComplete: () => p.destroy(),
        });
      }
    }

    onHit(proj, enemy) {
      if (!proj.active || !enemy.active) return;
      if (proj.hitSet && proj.hitSet.has(enemy)) return;

      /* Shielder — absorb hit with shield */
      if (enemy.eType === 'shielder' && enemy.shieldHp > 0) {
        enemy.shieldHp--;
        this.hitFlash(enemy);
        const blk = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, '⛨', {
          fontSize: '16px', fontFamily: 'system-ui', color: '#93c5fd', stroke:'#000', strokeThickness:2,
        }).setOrigin(0.5);
        this.tweens.add({ targets: blk, y: blk.y - 22, alpha: 0, duration: 500, onComplete: () => blk.destroy() });
        if (enemy.shieldHp <= 0 && enemy.shieldArc) {
          const sa = enemy.shieldArc; enemy.shieldArc = null;
          this.tweens.add({ targets: sa, alpha: 0, duration: 200, onComplete: () => sa.destroy() });
          const crack = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, 'SHIELD BROKEN', {
            fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#fbbf24', stroke:'#000', strokeThickness:2,
          }).setOrigin(0.5);
          this.tweens.add({ targets: crack, y: crack.y - 28, alpha: 0, duration: 800, onComplete: () => crack.destroy() });
        }
        if (proj.pierceLeft > 0) { if (!proj.hitSet) proj.hitSet = new Set(); proj.hitSet.add(enemy); proj.pierceLeft--; }
        else { proj.destroy(); }
        return;
      }

      let mult = 0.8 + Math.random() * 0.4, isCrit = false;
      if (this.ps.critChance && Math.random() < this.ps.critChance) {
        mult *= (this.ps.critMult || 2); isCrit = true;
      }
      // Arcane Surge bonus
      if (proj.isSurge) mult *= (this.ps.surgeMult || 2);
      // Hunter Trueshot: crits get extra pierce
      if (isCrit && this.ps.critPierce && proj.pierceLeft < this.ps.critPierce) proj.pierceLeft = this.ps.critPierce;
      // Berserker stacking bonus
      const bsrkMult = this.ps.bsrkPerKill ? 1 + Math.min(this.ps.bsrkMax, (this.waveKills||0) * this.ps.bsrkPerKill) : 1;
      const backstabM = (this.ps.backstabMult && this._justDashed) ? this.ps.backstabMult : 1;
      if (this._justDashed) { this._justDashed = false; if (backstabM>1) { const bst=this.add.text(enemy.x,enemy.y-24,'BACKSTAB!',{fontSize:'14px',fontFamily:'system-ui',fontStyle:'bold',color:'#2dd4bf',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(50); this.tweens.add({targets:bst,y:bst.y-36,alpha:0,duration:850,onComplete:()=>bst.destroy()}); } }
      // Iron Will — bonus damage when low HP
      const ironWillMult = (this.ps.ironWill && this.ps.hp < this.ps.maxHp * 0.30) ? this.ps.ironWill : 1;
      // Marked for Death — mark on first hit, bonus on subsequent hits
      const markMult = (this.ps.markMult && enemy.marked) ? this.ps.markMult : 1;
      if (this.ps.markMult && !enemy.marked) enemy.marked = true;
      // Phantom Shot counter
      if (this.ps.phantomEvery) {
        this.phantomCount++;
        if (this.phantomCount >= this.ps.phantomEvery) {
          this.phantomCount = 0;
          proj.pierceLeft = 9999; proj.isPhantom = true;
          if (!this.ps.phantomDmgMult) {
            proj.slowAll = true; // slow on phantom pierce
          } else {
            mult *= this.ps.phantomDmgMult;
          }
        }
      }
      // Ricochet base dmg tag
      if (proj.ricochetMult) mult *= proj.ricochetMult;

      const bossBonusMult = (this.ps.bossDmgBonus && this.time.now < this.bossDmgUntil) ? (1 + this.ps.bossDmgBonus) : 1;
      const curseDmgOut = this.ps.curseDmgOut || 1;
      const bloodRageMProj = (this.ps.bloodRageMult && this.ps.hp < this.ps.maxHp*(this.ps.bloodRageThresh||0.35)) ? (1+this.ps.bloodRageMult) : 1;
      const warchiefDmgMProj = this.ps.warchiefDmgPer ? (1+Math.min(10,this._warchiefStacks)*this.ps.warchiefDmgPer) : 1;
      const dmg = Math.floor(this.ps.dmg * mult * bsrkMult * ironWillMult * markMult * bossBonusMult * curseDmgOut * backstabM * bloodRageMProj * warchiefDmgMProj);
      enemy.eHp -= dmg;
      this.totalDmg = (this.totalDmg || 0) + dmg;
      this.hitFlash(enemy);
      // Vampiric Strike — leech
      if (this.ps.vStrike) {
        const leechMult = (this.ps.bloodPact && this.ps.hp < this.ps.maxHp * 0.30) ? (this.ps.bloodPact || 1) : 1;
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.max(1, Math.floor(dmg * this.ps.vStrike * leechMult)));
      }
      // Necromancer slow on hit
      if (proj.isNecroOrb && !enemy._necroSlow) {
        enemy._necroSlow = true;
        enemy.eSpd = enemy.eBaseSpd * 0.55;
        this.time.delayedCall(2000, () => { if (enemy.active) { enemy.eSpd = enemy.eBaseSpd; enemy._necroSlow = false; } });
      }

      if (this.ps.slowOnHit) {
        enemy.eSpd = enemy.eBaseSpd * (1 - Math.min(0.85, this.ps.slowOnHit));
        this.time.delayedCall(1500, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      const t = this.add.text(enemy.x, enemy.y - enemy.eSize - 4, isCrit ? `${dmg}!` : dmg, {
        fontSize: isCrit ? '17px' : '13px', fontFamily: 'system-ui',
        color: isCrit ? '#facc15' : (enemy.isBoss ? '#fbbf24' : '#ffffff'),
        fontStyle: 'bold', stroke: '#000', strokeThickness: 2,
      }).setOrigin(0.5);
      this.tweens.add({ targets: t, y: t.y - 32, alpha: 0, duration: 700, onComplete: () => t.destroy() });

      // Fireball explosion
      if (proj.isFireball) {
        const expl = this.add.circle(enemy.x, enemy.y, 22, 0xff4500, 0.75);
        this.tweens.add({ targets: expl, scaleX: 2.8, scaleY: 2.8, alpha: 0, duration: 280, onComplete: () => expl.destroy() });
        const splR = this.ps.splashR || 35;
        const splMult = this.ps.splashMult || 0.25;
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(enemy.x, enemy.y, e2.x, e2.y) < splR + e2.eSize) {
            e2.eHp -= Math.floor(this.ps.dmg * splMult);
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
        if (this.ps.leaveFire) this.spawnFirePuddle(enemy.x, enemy.y);
      }

      // Venomous — apply poison DOT
      if (this.ps.poisonDmg && !proj.isRicochet) {
        const now = this.time.now;
        enemy.poisonEnd = now + this.ps.poisonDur;
        enemy.poisonDmgPerTick = this.ps.poisonDmg * 0.5;
        if (!enemy.poisonTick) enemy.poisonTick = now + 500;
      }

      // Phantom Shot slow-on-pierce
      if (proj.slowAll) {
        enemy.eSpd = enemy.eBaseSpd * 0.35;
        this.time.delayedCall(2000, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      // Explosive Rounds — splash AOE (hunter, no recursion on ricochet/phantom)
      if (this.ps.explodeRange && !proj.isRicochet && !proj.isExplosion) {
        const ex = enemy.x, ey = enemy.y, er = this.ps.explodeRange;
        const expl = this.add.circle(ex, ey, 6, 0xff8c00, 0.9);
        this.tweens.add({ targets: expl, scaleX: er/6, scaleY: er/6, alpha: 0, duration: 200, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < er + e2.eSize) {
            e2.eHp -= Math.floor(dmg * (this.ps.explodeMult || 0.4));
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
      }

      // Overload — every Nth fireball triggers Frost Nova
      if (proj.isFireball && this.ps.overloadEvery) {
        this.overloadCount++;
        if (this.overloadCount >= this.ps.overloadEvery) {
          this.overloadCount = 0;
          this.doFrostNova();
          if (this.ps.overloadAoe) {
            const blast = this.add.circle(this.pg.x, this.pg.y, 10, 0x7c3aed, 0.8);
            this.tweens.add({ targets: blast, scaleX: 15, scaleY: 15, alpha: 0, duration: 400, onComplete: () => blast.destroy() });
          }
        }
      }

      // Void Rift — leave damaging zone where fireball lands
      if (proj.isFireball && this.ps.voidRift) {
        this.spawnVoidRift(enemy.x, enemy.y);
      }

      // Ricochet — spawn bouncing fragments
      if (this.ps.ricochetCount && !proj.isRicochet) {
        const targets = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a,b) => Phaser.Math.Distance.Between(enemy.x,enemy.y,a.x,a.y)-Phaser.Math.Distance.Between(enemy.x,enemy.y,b.x,b.y))
          .slice(0, this.ps.ricochetCount);
        targets.forEach(t => {
          const rf = this.add.graphics();
          rf.fillStyle(0x93c5fd, 1); rf.fillCircle(0,0,4);
          rf.x = enemy.x; rf.y = enemy.y;
          this.physics.add.existing(rf);
          rf.body.setCircle(4,-4,-4);
          const ra = Phaser.Math.Angle.Between(enemy.x, enemy.y, t.x, t.y);
          rf.body.setVelocity(Math.cos(ra)*480, Math.sin(ra)*480);
          rf.pierceLeft = 0; rf.isRicochet = true; rf.ricochetMult = this.ps.ricochetMult;
          this.projectiles.add(rf);
          this.time.delayedCall(600, () => { if (rf.active) rf.destroy(); });
        });
      }

      // Chain Reaction — delayed secondary explosion
      if (proj.isFireball && this.ps.chainReact) {
        const ex = enemy.x, ey = enemy.y;
        this.time.delayedCall(280, () => {
          if (this.dead) return;
          const b2 = this.add.circle(ex, ey, 8, 0xff6b00, 0.85);
          this.tweens.add({ targets: b2, scaleX: this.ps.chainReact/8, scaleY: this.ps.chainReact/8, alpha: 0, duration: 260, onComplete: () => b2.destroy() });
          this.enemies.getChildren().forEach(e2 => {
            if (!e2.active) return;
            if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < this.ps.chainReact + e2.eSize) {
              e2.eHp -= Math.floor(this.ps.dmg * (this.ps.chainReactMult || 0.25));
              if (e2.eHp <= 0) this.killEnemy(e2);
            }
          });
        });
      }

      // Chain lightning
      if (this.ps.chainCount) {
        const nearby = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a, b) => Phaser.Math.Distance.Between(enemy.x, enemy.y, a.x, a.y) - Phaser.Math.Distance.Between(enemy.x, enemy.y, b.x, b.y))
          .slice(0, this.ps.chainCount);
        nearby.forEach(e2 => {
          const bolt = this.add.graphics();
          bolt.lineStyle(2, 0x93c5fd, 0.9);
          bolt.lineBetween(enemy.x, enemy.y, e2.x, e2.y);
          this.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
          const chainDmg = Math.floor(dmg * (this.ps.chainMult || 0.5));
          e2.eHp -= chainDmg;
          if (e2.eHp <= 0) this.killEnemy(e2);
        });
      }

      if (proj.pierceLeft > 0) {
        if (!proj.hitSet) proj.hitSet = new Set();
        proj.hitSet.add(enemy); proj.pierceLeft--;
      } else { proj.destroy(); }

      if (enemy.eHp <= 0) this.killEnemy(enemy);
    }

    spawnFirePuddle(x, y) {
      const puddle = this.add.circle(x, y, 35, 0xff6b00, 0.5);
      let ticks = 0;
      this.time.addEvent({ delay: 500, repeat: 7, callback: () => {
        ticks++;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < 40 + e.eSize) {
            e.eHp -= Math.floor(this.ps.dmg * 0.15);
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
        if (ticks >= 8) { puddle.destroy(); }
      }});
    }

    spawnVoidRift(x, y) {
      const dur = this.ps.voidDur || 4000;
      const radius = 30;
      const rift = this.add.arc(x, y, radius, 0, 360, false, 0x4c1d95, 0.65);
      rift.setStrokeStyle(2, 0x7c3aed, 0.9);
      this.tweens.add({ targets: rift, alpha: 0, duration: dur, onComplete: () => rift.destroy() });
      const dmgPerTick = this.ps.voidDmg || 15;
      this.time.addEvent({ delay: 500, repeat: Math.floor(dur / 500) - 1, callback: () => {
        if (!rift.active) return;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < radius + e.eSize) {
            e.eHp -= dmgPerTick;
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
      }});
    }

    onEnemyProj(player, proj) {
      if (!proj.active) return;
      proj.destroy();
      if (this.shieldActive) { this.breakShield(this.time.now); return; }
      this.takeDamage(proj.dmg);
    }

    killEnemy(enemy) {
      if (!enemy.active) return;
      this.deathBurst(enemy.x, enemy.y, enemy.eColor);
      enemy.hpBar.destroy();
      if (enemy.aimLine)    { enemy.aimLine.destroy();    enemy.aimLine    = null; }
      if (enemy.eliteAura)  { enemy.eliteAura.destroy();  enemy.eliteAura  = null; }
      if (enemy.eliteLabel) { enemy.eliteLabel.destroy(); enemy.eliteLabel = null; }
      if (enemy.shieldArc)  { enemy.shieldArc.destroy();  enemy.shieldArc  = null; }

      /* Necromancer — raise dead (not bosses, not already-minions) */
      if (this.ps.raiseDead && !enemy.isBoss && !enemy.isMinion && !enemy.isMini) {
        const chance = this.ps.raiseChance || 0.35;
        if (Math.random() < chance) this.spawnMinion(enemy.x, enemy.y, enemy.eBaseSpd);
      }

      /* Splitter spawns 2 minis */
      if (enemy.eType === 'splitter' && !enemy.isMini) {
        for (let i = 0; i < 2; i++) {
          const a = (i / 2) * Math.PI * 2 + Math.random();
          this.mkEnemy(enemy.x + Math.cos(a) * 22, enemy.y + Math.sin(a) * 22,
            8, 0xc026d3, enemy.eMaxHp * 0.35, enemy.eBaseSpd * 1.3, enemy.eDmg * 0.7,
            Math.floor(enemy.eXp * 0.5), 'basic', true);
        }
      }

      /* XP orb with pulse tween */
      const orb = this.add.circle(enemy.x, enemy.y, 5, 0xa78bfa, 0.9);
      this.physics.add.existing(orb);
      orb.body.setCircle(5);
      orb.xpVal = enemy.eXp;
      this.xpOrbs.add(orb);
      this.tweens.add({ targets: orb, scaleX: 1.5, scaleY: 1.5, duration: 500, yoyo: true, repeat: -1, ease: 'sine.inOut' });
      /* Pickup drop */
      if (!enemy.isMini && (enemy.isBoss || Math.random() < 0.15)) {
        const is1hp = this.ps.is1hp;
        const types = enemy.isBoss ? ['shield','hp'] : (is1hp ? ['shield'] : ['hp','shield']);
        const pType = types[Math.floor(Math.random()*types.length)];
        const pCol = {shield:0x3b82f6, hp:0x4ade80}[pType];
        const px2 = enemy.x + Phaser.Math.Between(-16,16), py2 = enemy.y + Phaser.Math.Between(-16,16);
        const pu = this.add.circle(px2, py2, 8, pCol, 1);
        const inner = this.add.circle(px2, py2, 4, 0xffffff, 0.75);
        this.physics.add.existing(pu); pu.body.setCircle(8);
        pu.pType = pType; pu._inner = inner;
        this.pickups.add(pu);
        this.tweens.add({ targets:[pu,inner], y: py2-10, duration:500, yoyo:true, repeat:-1, ease:'sine.inOut' });
        this.time.delayedCall(12000, ()=>{ if(pu.active){ pu.destroy(); if(inner.active) inner.destroy(); } });
      }

      if (enemy.isBoss) { this.boss = null; this.events.emit('bossDead'); }
      if (this.ps.lifeSteal > 0) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.lifeSteal);

      // Reaper — death explosion (no chain recursion)
      if (this.ps.reaperDmg && !enemy.isMini && !enemy.fromReaper) {
        const rx = enemy.x, ry = enemy.y, rr = this.ps.reaperRange;
        const expl = this.add.circle(rx, ry, 8, 0x6d28d9, 0.85);
        this.tweens.add({ targets: expl, scaleX: rr/8, scaleY: rr/8, alpha: 0, duration: 280, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(rx, ry, e2.x, e2.y) < rr + e2.eSize) {
            e2.eHp -= this.ps.reaperDmg;
            if (e2.eHp <= 0) { e2.fromReaper = true; this.killEnemy(e2); }
          }
        });
      }

      // Per-run stats
      if (enemy.isElite) { this._eliteKills = (this._eliteKills||0)+1; window._SFX.eliteKill(); } else { window._SFX.kill(); }
      if (enemy.isBoss)  this._bossKills  = (this._bossKills||0)+1;
      /* Kill Heal (Paladin Aura of Healing legendary) */
      if (this.ps.killHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.killHeal);
      /* Warchief stacking */
      if (this.ps.warchiefAtkPer) {
        this._warchiefStacks = Math.min(10, (this._warchiefStacks||0)+1);
        this._warchiefUntil = this.time.now + this.ps.warchiefDur;
      }
      /* Poison spread on kill */
      if (this.ps.poisonSpread && enemy.poisonEnd > this.time.now) {
        const near = this.enemies.getChildren().filter(e=>e.active&&e!==enemy&&Phaser.Math.Distance.Between(enemy.x,enemy.y,e.x,e.y)<80);
        near.forEach(e=>{ e.poisonEnd=this.time.now+(this.ps.poisonDur||4000); e.poisonDmgPerTick=this.ps.poisonDmg*0.5; });
      }
      /* Perfect wave tracking */
      this._waveHitThisTick = false;
      // Haste — speed burst on kill
      if (this.ps.hasteBonus) {
        const wasInactive = this.time.now >= this.hasteUntil;
        this.hasteUntil = this.time.now + this.ps.hasteDur;
        if (wasInactive) {
          window._SFX.haste();
          const ht = this.add.text(this.pg.x, this.pg.y - 32, '⚡ HASTE!', {
            fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#60a5fa', stroke:'#000', strokeThickness:3,
          }).setOrigin(0.5).setDepth(50);
          this.tweens.add({ targets:ht, y:ht.y-36, alpha:0, duration:900, ease:'power2.out', onComplete:()=>ht.destroy() });
        }
      }

      this.ps.kills++;
      this.waveKills++;

      // Soul Eater — permanent damage gain per 10 kills
      if (this.ps.soulEaterDmg && this.ps.kills % 10 === 0) this.ps.dmg += this.ps.soulEaterDmg;

      // Bone Armor — gain stack on kill
      if (this.ps.boneArmor) this.ps.boneStacks = Math.min(this.ps.boneMax, (this.ps.boneStacks || 0) + 1);

      // Blood Pact — kill heal when below 30%
      if (this.ps.bloodPactKillHeal && this.ps.hp < this.ps.maxHp * 0.30)
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.floor(this.ps.maxHp * this.ps.bloodPactKillHeal));

      // Last Rites — boss kill bonus
      if (enemy.isBoss && this.ps.bossHeal) {
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.bossHeal);
        this.bossDmgUntil = this.time.now + this.ps.bossDmgDur;
      }
      this.alive = Math.max(0, this.alive - 1);
      enemy.destroy();
      this.events.emit('kill', this.ps.kills);

      /* ── Kill streak ── */
      const now2 = this.time.now;
      const gap = now2 - (this._lastKillTime || 0);
      this._lastKillTime = now2;
      if (gap < 2200) {
        this._streak = (this._streak || 0) + 1;
      } else {
        this._streak = 1;
      }
      this.events.emit('streak', this._streak);
      /* Milestone announcements */
      const milestones = {
        10:'KILLING SPREE', 25:'RAMPAGE', 50:'UNSTOPPABLE', 75:'DEVASTATING',
        100:'GODLIKE', 150:'LEGENDARY', 200:'BEYOND HUMAN', 250:'APEX PREDATOR',
        300:'EXTINCTION EVENT', 400:'FORCE OF NATURE', 500:'WALKING DEATH',
        600:'WORLD ENDER', 750:'MYTHIC', 1000:'ETERNAL SLAYER',
      };
      if (milestones[this._streak]) {
        this.events.emit('streakMilestone', this._streak, milestones[this._streak]);
        window._SFX.achieve();
      }
      /* Live souls preview */
      const liveSouls = Math.floor((this.waveNum * 3 + this.ps.kills * 0.15) * (this.ps.soulMult || 1));
      this.events.emit('soulsPreview', liveSouls + (this.ps._curseSouls || 0));

      if (this.alive === 0 && this.spawned >= this.total)
        this.time.delayedCall(2000, () => { if (!this.dead) this.startWave(); });
    }

    onPickup(player, pu) {
      if (!pu.active) return;
      const type = pu.pType;
      if (pu._inner && pu._inner.active) pu._inner.destroy();
      pu.destroy();
      const floatTxt = (txt, col) => {
        const t = this.add.text(this.pg.x, this.pg.y - 24, txt, {
          fontSize:'14px', fontFamily:'system-ui', fontStyle:'bold', color:col, stroke:'#000', strokeThickness:3,
        }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:t, y:t.y-44, alpha:0, duration:900, ease:'power2.out', onComplete:()=>t.destroy() });
      };
      if (type === 'speed') {
        if (!this.speedBoostActive) { this._preBoostSpd = this.ps.spd; this.ps.spd *= 1.5; this.speedBoostActive = true; }
        floatTxt('+50% SPEED', '#22d3ee');
        if (this._speedTimer) this._speedTimer.remove();
        this._speedTimer = this.time.delayedCall(5000, () => { this.ps.spd = this._preBoostSpd; this.speedBoostActive = false; });
      } else if (type === 'shield') {
        this.shieldActive = true; this.shieldUntilReady = this.time.now + 4500;
        floatTxt('SHIELD!', '#93c5fd');
        window._SFX.pickup();
      } else if (type === 'hp') {
        if (!this.ps.is1hp) {
          const heal = Math.max(1, Math.floor(this.ps.maxHp * 0.2));
          this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + heal);
          floatTxt(`+${heal} HP`, '#4ade80');
          window._SFX.pickup();
        }
      }
    }

    onXP(player, orb) {
      if (!orb.active) return;
      this.ps.xp += Math.floor(orb.xpVal * (this.ps.xpMult || 1));
      orb.destroy();
      if (this.ps.xp >= this.ps.xpNext) {
        this.ps.xp -= this.ps.xpNext;
        this.ps.level++;
        this.ps.xpNext = Math.floor(this.ps.xpNext * 1.45);
        this.doLevelUp();
      }
    }

    doLevelUp() {
      window._showTouchControls(false);
      this.paused = true; this.physics.pause();
      this.scene.pause('Game');
      this.scene.launch('LevelUp', { ps: this.ps, game: this });
    }

    resume() {
      this.scene.stop('LevelUp');
      this.scene.resume('Game');
      this.physics.resume();
      this.paused = false;
      this.rebuildOrbitals();
      window._showTouchControls(true);
    }

    spawnMinion(x, y, speed) {
      const limit = this.ps.minionLimit || 3;
      if (this.minions.getLength() >= limit) return;

      const spd = Math.min(200, (speed || 80) * 0.7 * (this.ps.minionSpeed || 1));
      const hp  = Math.floor(40 + this.ps.level * 8);
      const g = this.add.graphics();
      g.fillStyle(0x4c1d95, 0.85); g.fillCircle(0, 0, 8);
      g.fillStyle(0xa78bfa, 0.9);  g.fillCircle(-3, -3, 2); g.fillCircle(3, -3, 2);
      g.lineStyle(1, 0x7c3aed, 0.7); g.strokeCircle(0, 0, 10);
      g.x = x; g.y = y;
      g.isMinion = true;
      g.minionHp  = hp;
      g.minionSpd = spd;
      g.minionLifeEnd = this.time.now + (this.ps.minionDur || 18000);
      this.minions.add(g, true); // true = add physics body via the physics group
      g.body.setCircle(8, -8, -8);
      g.body.setCollideWorldBounds(true);
    }

    rebuildOrbitals() {
      this.orbitals.forEach(o => o.destroy());
      this.orbitals = [];
      const count = this.ps.orbitCount || 0;
      for (let i = 0; i < count; i++) {
        const g = this.add.graphics();
        g.fillStyle(0xc4b5fd, 1); g.fillCircle(0, 0, 9);
        g.fillStyle(0xffffff, 0.5); g.fillCircle(-2, -3, 3);
        this.physics.add.existing(g);
        g.body.setCircle(9, -9, -9);
        g.hitTimes = {};
        this.orbitals.push(g);
      }
    }

    doSlam() {
      const px = this.pg.x, py = this.pg.y;
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;

      /* Closest enemy — always hit regardless of distance */
      const closest = all.reduce((a, b) =>
        Phaser.Math.Distance.Between(px, py, a.x, a.y) <=
        Phaser.Math.Distance.Between(px, py, b.x, b.y) ? a : b
      );

      /* White burst rings — use arc() so scaleX/Y expand from player centre */
      for (let i = 0; i < 3; i++) {
        const ring = this.add.arc(px, py, 20 + i * 8, 0, 360, false, 0xffffff, 0);
        ring.setStrokeStyle(3 - i, 0xffffff, 1 - i * 0.25);
        this.tweens.add({
          targets: ring, scaleX: 7, scaleY: 7, alpha: 0,
          duration: 320 + i * 60, delay: i * 50, ease: 'power2.out',
          onComplete: () => ring.destroy(),
        });
      }

      /* Bright flash at player origin */
      const flash = this.add.circle(px, py, 22, 0xffffff, 0.85);
      this.tweens.add({ targets: flash, alpha: 0, scaleX: 0.4, scaleY: 0.4, duration: 160, ease: 'power3.in', onComplete: () => flash.destroy() });

      /* Impact flash at target */
      const hit = this.add.circle(closest.x, closest.y, closest.eSize + 12, 0xffffff, 0.65);
      this.tweens.add({ targets: hit, alpha: 0, scaleX: 2.5, scaleY: 2.5, duration: 280, ease: 'power2.out', onComplete: () => hit.destroy() });

      /* Damage: closest always hit + anyone within 120px */
      all.forEach(e => {
        if (!e.active) return;
        if (e === closest || Phaser.Math.Distance.Between(px, py, e.x, e.y) < 120 + e.eSize) {
          e.eHp -= this.ps.slamDmg;
          if (e.eHp <= 0) { this.killEnemy(e); return; }
          const t = this.add.text(e.x, e.y - e.eSize - 4, this.ps.slamDmg, {
            fontSize: '14px', color: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2, fontFamily: 'system-ui',
          }).setOrigin(0.5);
          this.tweens.add({ targets: t, y: t.y - 30, alpha: 0, duration: 700, onComplete: () => t.destroy() });
        }
      });
    }

    fireAt(target) {
      const angle = Phaser.Math.Angle.Between(this.pg.x, this.pg.y, target.x, target.y);
      const isWizard = this.ps.class === 'wizard';
      const isNecro  = this.ps.class === 'necromancer';
      const r = Math.round((isWizard ? 8 : 6) * this.ps.projSize);
      const p = this.add.graphics();
      if (isWizard) {
        p.fillStyle(0xff4500, 1); p.fillCircle(0, 0, r);
        p.fillStyle(0xfef08a, 0.9); p.fillCircle(-r*0.3, -r*0.35, r*0.4);
        p.fillStyle(0xef4444, 0.7); p.fillCircle(r*0.2, r*0.2, r*0.3);
        p.isFireball = true;
        if (this.ps.surgeEvery) {
          this.ps.surgeCount = (this.ps.surgeCount || 0) + 1;
          if (this.ps.surgeCount >= this.ps.surgeEvery) { this.ps.surgeCount = 0; p.isSurge = true; }
        }
      } else if (isNecro) {
        p.fillStyle(0x4c1d95, 1); p.fillCircle(0, 0, r);
        p.fillStyle(0x7c3aed, 0.85); p.fillCircle(-r*0.25, -r*0.25, r*0.45);
        p.fillStyle(0xa78bfa, 0.6); p.fillCircle(r*0.2, r*0.2, r*0.25);
        p.isNecroOrb = true;
      } else if (this.ps.class === 'rogue') {
        // Rogue thrown dagger — slim blade, teal edge
        const bl = 20 + r * 1.4; // blade length
        const bw = r * 0.55;     // blade width
        // blade body (dark metal)
        p.fillStyle(0x9ca3af, 1);
        p.fillTriangle(bl * 0.5, 0, -bl * 0.5, -bw, -bl * 0.5, bw);
        p.fillStyle(0xe2e8f0, 0.9);
        p.fillTriangle(bl * 0.5, 0, -bl * 0.3, -bw * 0.4, -bl * 0.3, bw * 0.4);
        // teal poison edge gleam
        p.fillStyle(0x2dd4bf, 0.85);
        p.fillTriangle(bl * 0.5, 0, bl * 0.15, -bw * 0.35, bl * 0.15, bw * 0.35);
        // grip/hilt stub at tail
        p.fillStyle(0x44403c, 1);
        p.fillRect(-bl * 0.5 - 5, -bw * 0.7, 6, bw * 1.4);
        p.fillStyle(0x2dd4bf, 0.7);
        p.fillRect(-bl * 0.5, -bw * 1.1, 3, bw * 2.2); // crossguard
        p.isArrow = true; // reuse rotation logic
      } else {
        // Hunter arrow — drawn along the angle of travel
        const ar = r * 1.1;
        const len = 18 + ar * 1.8;
        // shaft
        p.lineStyle(ar * 0.55, 0xd4a373, 1);
        p.lineBetween(-len * 0.55, 0, len * 0.45, 0);
        // arrowhead
        p.fillStyle(0x60a5fa, 1);
        p.fillTriangle(len * 0.45, 0, len * 0.1, -ar * 0.9, len * 0.1, ar * 0.9);
        p.fillStyle(0x93c5fd, 0.7);
        p.fillTriangle(len * 0.45, 0, len * 0.2, -ar * 0.45, len * 0.2, ar * 0.45);
        // fletching (two small feathers at tail)
        p.fillStyle(0xef4444, 0.9);
        p.fillTriangle(-len * 0.55, 0, -len * 0.28, -ar * 1.1, -len * 0.22, 0);
        p.fillStyle(0xfbbf24, 0.9);
        p.fillTriangle(-len * 0.55, 0, -len * 0.28,  ar * 1.1, -len * 0.22, 0);
        p.isArrow = true;
      }
      p.x = this.pg.x; p.y = this.pg.y;
      this.physics.add.existing(p);
      p.body.setCircle(r, -r, -r);
      // rotate arrow graphic to face direction of travel
      if (p.isArrow) p.setRotation(angle);
      p.body.setVelocity(Math.cos(angle) * this.ps.projSpd, Math.sin(angle) * this.ps.projSpd);
      p.pierceLeft = this.ps.pierce;
      this.projectiles.add(p);
      const isRogue = this.ps.class === 'rogue';
      const lifetime = this.ps.projLifetime || (isWizard ? 2400 : isRogue ? 320 : 1800);
      this.time.delayedCall(lifetime, () => { if (p.active) p.destroy(); });
    }

    meleeAttack(time, enemies) {
      const px = this.pg.x, py = this.pg.y;
      const range = this.ps.meleeRange || 90;
      const nearest = enemies.reduce((a, b) =>
        Phaser.Math.Distance.Between(px, py, a.x, a.y) <= Phaser.Math.Distance.Between(px, py, b.x, b.y) ? a : b
      );
      const swingAngle = Phaser.Math.Angle.Between(px, py, nearest.x, nearest.y);
      const arc = this.add.graphics();
      const isBerserker = this.ps.class === 'berserker';
      const isPaladin   = this.ps.class === 'paladin';

      if (isBerserker) {
        // Wide brutal axe chop — deep red, wide arc
        arc.lineStyle(10, 0x9f1239, 0.90);
        arc.beginPath();
        arc.arc(px, py, range * 0.90, swingAngle - Math.PI * 0.65, swingAngle + Math.PI * 0.65, false);
        arc.strokePath();
        arc.lineStyle(5, 0xef4444, 0.65);
        arc.beginPath();
        arc.arc(px, py, range * 0.65, swingAngle - Math.PI * 0.55, swingAngle + Math.PI * 0.55, false);
        arc.strokePath();
        arc.lineStyle(2, 0xfca5a5, 0.40);
        arc.beginPath();
        arc.arc(px, py, range * 0.40, swingAngle - Math.PI * 0.45, swingAngle + Math.PI * 0.45, false);
        arc.strokePath();
        // axe impact flash at tip
        arc.fillStyle(0xfca5a5, 0.35);
        arc.fillCircle(
          px + Math.cos(swingAngle) * range * 0.85,
          py + Math.sin(swingAngle) * range * 0.85, 14
        );
        this.tweens.add({ targets: arc, alpha: 0, duration: 280, ease: 'power2.in', onComplete: () => arc.destroy() });

      } else if (isPaladin) {
        // Holy hammer slam — gold/white, with radiant burst
        arc.lineStyle(7, 0xfef9c3, 0.95);
        arc.beginPath();
        arc.arc(px, py, range * 0.88, swingAngle - Math.PI * 0.50, swingAngle + Math.PI * 0.50, false);
        arc.strokePath();
        arc.lineStyle(3, 0xfbbf24, 0.70);
        arc.beginPath();
        arc.arc(px, py, range * 0.62, swingAngle - Math.PI * 0.42, swingAngle + Math.PI * 0.42, false);
        arc.strokePath();
        // cross rays from impact point
        const hx = px + Math.cos(swingAngle) * range * 0.80;
        const hy = py + Math.sin(swingAngle) * range * 0.80;
        arc.fillStyle(0xfef9c3, 0.60); arc.fillCircle(hx, hy, 12);
        arc.fillStyle(0xffffff, 0.50); arc.fillCircle(hx, hy, 6);
        arc.lineStyle(3, 0xfef9c3, 0.55);
        for (let r2 = 0; r2 < 4; r2++) {
          const ra = swingAngle + (r2 * Math.PI / 2);
          arc.lineBetween(hx, hy, hx + Math.cos(ra) * 18, hy + Math.sin(ra) * 18);
        }
        this.tweens.add({ targets: arc, alpha: 0, duration: 320, ease: 'power2.in', onComplete: () => arc.destroy() });

      } else {
        // Knight — original gold sword swing
        arc.lineStyle(6, 0xfbbf24, 0.85);
        arc.beginPath();
        arc.arc(px, py, range * 0.85, swingAngle - Math.PI * 0.45, swingAngle + Math.PI * 0.45, false);
        arc.strokePath();
        arc.lineStyle(2, 0xfef08a, 0.5);
        arc.beginPath();
        arc.arc(px, py, range * 0.6, swingAngle - Math.PI * 0.45, swingAngle + Math.PI * 0.45, false);
        arc.strokePath();
        this.tweens.add({ targets: arc, alpha: 0, duration: 230, ease: 'power2.in', onComplete: () => arc.destroy() });
      }

      const hitEnemies = [];
      enemies.forEach(e => {
        if (!e.active) return;
        if (Phaser.Math.Distance.Between(px, py, e.x, e.y) > range + e.eSize) return;
        let mult = 0.85 + Math.random() * 0.3, isCrit = false;
        if (this.ps.critChance && Math.random() < this.ps.critChance) { mult *= (this.ps.critMult || 2); isCrit = true; }
        if (this.ps.executeMult && e.eHp < e.eMaxHp * 0.25) mult *= this.ps.executeMult;
        const bsrkMult = this.ps.bsrkPerKill ? 1 + Math.min(this.ps.bsrkMax, (this.waveKills||0) * this.ps.bsrkPerKill) : 1;
        const warcryMult = (this.ps.warcryMult && this.time.now < this.warcryUntil) ? this.ps.warcryMult : 1;
        const ironWillMult = (this.ps.ironWill && this.ps.hp < this.ps.maxHp * 0.30) ? this.ps.ironWill : 1;
        const markMult2 = (this.ps.markMult && e.marked) ? this.ps.markMult : 1;
        if (this.ps.markMult && !e.marked) e.marked = true;
        const curseDmgOutM = this.ps.curseDmgOut || 1;
        /* Blood Rage */
        const bloodRageM = (this.ps.bloodRageMult && this.ps.hp < this.ps.maxHp * (this.ps.bloodRageThresh||0.35)) ? (1+this.ps.bloodRageMult) : 1;
        /* Warchief kill-streak */
        const warchMs = this.ps.warchiefAtkPer ? Math.min(10, this._warchiefStacks) : 0;
        const warchiefDmgM = this.ps.warchiefDmgPer ? (1 + Math.min(10,this._warchiefStacks)*this.ps.warchiefDmgPer) : 1;
        /* Holy Strikes bonus */
        this._holyCounter++;
        const isHolyProc = this.ps.holyEvery && this._holyCounter >= this.ps.holyEvery;
        if (isHolyProc) this._holyCounter = 0;
        const holyM = isHolyProc ? (1 + (this.ps.holyBonusDmg||0)) : 1;
        let dmg = Math.floor(this.ps.dmg * mult * bsrkMult * warcryMult * ironWillMult * markMult2 * curseDmgOutM * bloodRageM * warchiefDmgM * holyM);
        e.eHp -= dmg;
        this.totalDmg = (this.totalDmg || 0) + dmg;
        this.hitFlash(e);
        if (this.ps.vStrike) {
          const leechM = (this.ps.bloodPact && this.ps.hp < this.ps.maxHp * 0.30) ? (this.ps.bloodPact || 1) : 1;
          this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.max(1, Math.floor(dmg * this.ps.vStrike * leechM)));
        }
        if (isHolyProc && this.ps.holyStunMs) {
          e.body.setVelocity(0,0); e.stunUntil = (e.stunUntil||0) + this.ps.holyStunMs;
          const ht2 = this.add.text(e.x, e.y-e.eSize-12,'✦ STUN!',{fontSize:'11px',fontFamily:'system-ui',fontStyle:'bold',color:'#fcd34d',stroke:'#000',strokeThickness:2}).setOrigin(0.5);
          this.tweens.add({targets:ht2,y:ht2.y-24,alpha:0,duration:700,onComplete:()=>ht2.destroy()});
        }
        const t = this.add.text(e.x, e.y - e.eSize - 4, isCrit ? `${dmg}!` : dmg, {
          fontSize: isCrit ? '17px' : '14px', fontFamily:'system-ui',
          color: isCrit ? '#facc15' : (this.ps.class==='berserker'?'#fb7185':'#fbbf24'), fontStyle:'bold', stroke:'#000', strokeThickness:2,
        }).setOrigin(0.5);
        this.tweens.add({ targets:t, y:t.y-32, alpha:0, duration:700, onComplete:()=>t.destroy() });
        // On-hit effects (same as projectile hits)
        if (this.ps.slowOnHit) {
          e.eSpd = e.eBaseSpd * (1 - Math.min(0.85, this.ps.slowOnHit));
          this.time.delayedCall(1500, () => { if (e.active) e.eSpd = e.eBaseSpd; });
        }
        if (this.ps.poisonDmg) {
          e.poisonEnd = time + this.ps.poisonDur;
          e.poisonDmgPerTick = this.ps.poisonDmg * 0.5;
          if (!e.poisonTick) e.poisonTick = time + 500;
        }
        if (e.eHp <= 0) { this.killEnemy(e); return; }
        hitEnemies.push({ e, dmg });
      });
      // Chain Lightning — arcs from each melee-hit enemy to nearby ones
      if (this.ps.chainCount && hitEnemies.length) {
        hitEnemies.forEach(({ e, dmg }) => {
          if (!e.active) return;
          const chainTargets = enemies
            .filter(e2 => e2.active && !hitEnemies.find(h => h.e === e2) && e2 !== e)
            .sort((a, b) => Phaser.Math.Distance.Between(e.x,e.y,a.x,a.y) - Phaser.Math.Distance.Between(e.x,e.y,b.x,b.y))
            .slice(0, this.ps.chainCount);
          chainTargets.forEach(e2 => {
            const bolt = this.add.graphics();
            bolt.lineStyle(2, 0x93c5fd, 0.9);
            bolt.lineBetween(e.x, e.y, e2.x, e2.y);
            this.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
            e2.eHp -= Math.floor(dmg * (this.ps.chainMult || 0.5));
            if (e2.eHp <= 0) this.killEnemy(e2);
          });
        });
      }
    }

    fireEnemyProj(x, y, tx, ty, dmg, speed = 220, color = 0xfbbf24, size = 5) {
      const angle = Phaser.Math.Angle.Between(x, y, tx, ty);
      const p = this.add.graphics();
      p.fillStyle(color, 1); p.fillCircle(0, 0, size);
      p.x = x; p.y = y;
      this.physics.add.existing(p);
