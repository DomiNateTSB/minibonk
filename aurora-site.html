<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Thornrift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06000f; touch-action: none; }
    #aurora-bg { position: fixed; inset: 0; z-index: 0; }
    #aurora-bg canvas { width: 100%; height: 100%; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { touch-action: none; }

    /* ── Touch controls — landscape default ── */
    #tc-wrap { display:none; position:fixed; inset:0; z-index:60; pointer-events:none; }
    #tc-joy-zone { position:absolute; left:0; top:0; width:55%; height:100%; pointer-events:all; }
    #tc-base { position:absolute; display:none; width:112px; height:112px; border-radius:50%;
      border:2px solid rgba(167,139,250,0.38); background:rgba(10,4,26,0.38); pointer-events:none; }
    #tc-stick { position:absolute; display:none; width:50px; height:50px; border-radius:50%;
      background:rgba(167,139,250,0.58); pointer-events:none; }
    #tc-dash { position:absolute; right:28px; bottom:110px; width:74px; height:74px; border-radius:50%;
      border:2px solid rgba(96,165,250,0.65); background:rgba(10,4,26,0.48);
      pointer-events:all; display:flex; align-items:center; justify-content:center;
      font-family:system-ui; font-size:11px; font-weight:bold; color:#93c5fd; letter-spacing:1px;
      user-select:none; -webkit-user-select:none; }
    #tc-dash.active { background:rgba(96,165,250,0.35); border-color:rgba(96,165,250,1); }
    #tc-pause { position:absolute; right:28px; top:24px; width:44px; height:44px; border-radius:10px;
      border:2px solid rgba(167,139,250,0.45); background:rgba(10,4,26,0.48);
      pointer-events:all; display:flex; align-items:center; justify-content:center;
      font-size:18px; user-select:none; -webkit-user-select:none; }

    /* ── Portrait overrides — controls locked to bottom 38% ── */
    @media (orientation: portrait) {
      /* Joy zone: left half of bottom 38% only */
      #tc-joy-zone { top:62%; height:38%; width:55%; }
      /* Dash: bottom-right corner, higher clearance */
      #tc-dash { right:32px; bottom:14%; }
      /* Pause stays top-right */
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

  <!-- Auth overlay — shown before game starts if not logged in -->

    #auth-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(6,0,15,0.97);

    #auth-box { width:340px; background:rgba(15,5,30,0.98); border:1.5px solid rgba(124,58,237,0.5);
      border-radius:16px; padding:36px 32px 28px; box-shadow:0 0 60px rgba(124,58,237,0.2); }
    #auth-title { display:block; width:280px; max-width:90%; margin:0 auto 4px;
      mix-blend-mode:screen; filter:brightness(1.1) drop-shadow(0 0 16px #7c3aed); }
    #auth-game-name { color:#fff; font-size:28px; font-weight:bold; text-align:center;
      margin-bottom:28px; }

    .auth-tab { flex:1; background:none; border:none; color:rgba(255,255,255,0.35); font-size:14px;

  /* ── BorderGlow ── */
  .border-glow-card {
    --edge-proximity:0; --cursor-angle:45deg; --edge-sensitivity:30;
    --color-sensitivity:calc(var(--edge-sensitivity) + 20);
    --border-radius:28px; --glow-padding:30px; --cone-spread:25;
    position:relative; border-radius:var(--border-radius); isolation:isolate;
    transform:translate3d(0,0,0.01px); display:grid;
    border:1px solid rgb(255 255 255 / 15%);
    background:var(--card-bg,#120F17); overflow:visible;
    box-shadow:rgba(0,0,0,.15) 0 2px 4px,rgba(0,0,0,.15) 0 4px 8px,rgba(0,0,0,.15) 0 8px 16px;
  }
  .border-glow-card::before,.border-glow-card::after,.border-glow-card>.edge-light {
    content:""; position:absolute; inset:0; border-radius:inherit;
    transition:opacity .25s ease-out; z-index:-1;
  }
  .border-glow-card:not(:hover)::before,.border-glow-card:not(:hover)::after,
  .border-glow-card:not(:hover)>.edge-light { opacity:0; transition:opacity .75s ease-in-out; }
  .border-glow-card::before {
    border:1px solid transparent;
    background:
      linear-gradient(var(--card-bg,#120F17) 0 100%) padding-box,
      linear-gradient(rgb(255 255 255 / 0%) 0% 100%) border-box,
      var(--gradient-one) border-box, var(--gradient-two) border-box,
      var(--gradient-three) border-box, var(--gradient-four) border-box,
      var(--gradient-five) border-box, var(--gradient-six) border-box,
      var(--gradient-seven) border-box, var(--gradient-base) border-box;
    opacity:calc((var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
    mask-image:conic-gradient(from var(--cursor-angle) at center,
      black calc(var(--cone-spread) * 1%),
      transparent calc((var(--cone-spread) + 15) * 1%),
      transparent calc((100 - var(--cone-spread) - 15) * 1%),
      black calc((100 - var(--cone-spread)) * 1%));
  }
  .border-glow-card::after {
    border:1px solid transparent;
    background:
      var(--gradient-one) padding-box, var(--gradient-two) padding-box,
      var(--gradient-three) padding-box, var(--gradient-four) padding-box,
      var(--gradient-five) padding-box, var(--gradient-six) padding-box,
      var(--gradient-seven) padding-box, var(--gradient-base) padding-box;
    mask-image:
      linear-gradient(to bottom,black,black),
      radial-gradient(ellipse at 50% 50%,black 40%,transparent 65%),
      radial-gradient(ellipse at 66% 66%,black 5%,transparent 40%),
      radial-gradient(ellipse at 33% 33%,black 5%,transparent 40%),
      radial-gradient(ellipse at 66% 33%,black 5%,transparent 40%),
      radial-gradient(ellipse at 33% 66%,black 5%,transparent 40%),
      conic-gradient(from var(--cursor-angle) at center,transparent 5%,black 15%,black 85%,transparent 95%);
    mask-composite:subtract,add,add,add,add,add;
    opacity:calc(var(--fill-opacity,.35) * (var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
    mix-blend-mode:soft-light;
  }
  .border-glow-card>.edge-light {
    inset:calc(var(--glow-padding) * -1); pointer-events:none; z-index:1;
    mask-image:conic-gradient(from var(--cursor-angle) at center,
      black 2.5%,transparent 10%,transparent 90%,black 97.5%);
    opacity:calc((var(--edge-proximity) - var(--edge-sensitivity)) / (100 - var(--edge-sensitivity)));
    mix-blend-mode:plus-lighter;
  }
  .border-glow-card>.edge-light::before {
    content:""; position:absolute; inset:var(--glow-padding); border-radius:inherit;
    box-shadow:
      inset 0 0 0 1px var(--glow-color),
      inset 0 0 3px 0 var(--glow-color-50),
      inset 0 0 10px 0 var(--glow-color-30),
      inset 0 0 25px 2px var(--glow-color-20),
      0 0 3px 0 var(--glow-color-50),
      0 0 10px 0 var(--glow-color-30),
      0 0 25px 2px var(--glow-color-20),
      0 0 50px 2px var(--glow-color-10);
  }
  .border-glow-inner { display:flex; flex-direction:column; position:relative; overflow:visible; z-index:1; }
  .menu-pill-btn { transition:opacity .5s; }
  .menu-pill-btn .border-glow-inner { align-items:center; justify-content:center; white-space:nowrap; }
  .pill-icon { font-size:15px; line-height:1; flex-shrink:0; }
  .pill-label { font-family:'Cinzel',serif; font-weight:700; letter-spacing:1.5px; color:#d4c5f9; font-size:11.5px; line-height:1; }
  .pill-badge { font-family:'Cinzel',serif; font-size:9px; font-weight:600; color:#a78bfa; background:rgba(139,92,246,.25); border:1px solid rgba(139,92,246,.4); border-radius:20px; padding:1px 6px; margin-left:4px; line-height:1.4; flex-shrink:0; }

  <script>
  /* ── TOUCH CONTROLS ── */
  window._isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  window._touch = { vx: 0, vy: 0, dashPressed: false, _dashWas: false };

  window._showTouchControls = function(show) {
    if (!window._isMobile) return;
    document.getElementById('tc-wrap').style.display = show ? 'block' : 'none';
  };

  (function() {
    const wrap    = document.getElementById('tc-wrap');
    const jZone   = document.getElementById('tc-joy-zone');
    const jBase   = document.getElementById('tc-base');
    const jStick  = document.getElementById('tc-stick');
    const dashBtn = document.getElementById('tc-dash');
    const JR = 52; // max joystick radius
    let jOrigin = null, jTouchId = null;

    function updateStick(cx, cy) {
      const dx = cx - jOrigin.x, dy = cy - jOrigin.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const capped = Math.min(dist, JR);
      const nx = dist > 0 ? dx/dist : 0;
      const ny = dist > 0 ? dy/dist : 0;
      jStick.style.left = (jOrigin.x + nx*capped - 25) + 'px';
      jStick.style.top  = (jOrigin.y + ny*capped - 25) + 'px';
      window._touch.vx = nx * Math.min(1, dist / JR);
      window._touch.vy = ny * Math.min(1, dist / JR);
    }

    jZone.addEventListener('touchstart', e => {
      e.preventDefault();
      if (jTouchId !== null) return;
      const t = e.changedTouches[0];
      jTouchId = t.identifier;
      jOrigin = { x: t.clientX, y: t.clientY };
      jBase.style.cssText += ';display:block;left:'+(t.clientX-56)+'px;top:'+(t.clientY-56)+'px;';
      jStick.style.cssText += ';display:block;left:'+(t.clientX-25)+'px;top:'+(t.clientY-25)+'px;';
    }, { passive: false });

    jZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) { updateStick(t.clientX, t.clientY); break; }
      }
    }, { passive: false });

    jZone.addEventListener('touchend', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === jTouchId) {
          jTouchId = null; jOrigin = null;
          jBase.style.display = 'none'; jStick.style.display = 'none';
          window._touch.vx = 0; window._touch.vy = 0;
          break;
        }
      }
    }, { passive: false });
    jZone.addEventListener('touchcancel', () => { jTouchId = null; jOrigin = null; jBase.style.display = 'none'; jStick.style.display = 'none'; window._touch.vx = 0; window._touch.vy = 0; }, { passive: false });

    dashBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      window._touch.dashPressed = true;
      dashBtn.classList.add('active');
    }, { passive: false });
    dashBtn.addEventListener('touchend', e => {
      e.preventDefault();
      window._touch.dashPressed = false;
      dashBtn.classList.remove('active');
    }, { passive: false });

    // Pause button
    document.getElementById('tc-pause').addEventListener('touchstart', e => {
      e.preventDefault();
      if (window._triggerPause) window._triggerPause();
    }, { passive: false });

    // Prevent default touch on canvas to avoid scroll/zoom
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  })();
  </script>

  ">

    </div>
    <!-- Hint -->

  <script>
  (function(){
    const CLASS_EMOJI_DOM = { hunter:'🏹', knight:'⚔️', wizard:'🔮', necromancer:'💀', rogue:'🗡️', paladin:'🛡️', berserker:'🪓' };
    let _open = false, _activeTab = 'normal', _cache = { normal: null, '1hp': null };

    const ACH_DEFS = [
      { id:'firstBlood',  icon:'🩸', name:'First Blood',     hint:'Kill 1 enemy',              cat:'easy' },
      { id:'survivor5',   icon:'⏱️', name:'Survivor',         hint:'Last 5 minutes',            cat:'easy' },
      { id:'wave10',      icon:'🌊', name:'Wave Rider',       hint:'Reach wave 10',             cat:'easy' },
      { id:'level10',     icon:'⭐', name:'Rising Star',      hint:'Get to level 10',           cat:'easy' },
      { id:'century',     icon:'💯', name:'Century',          hint:'100 kills in one run',      cat:'medium' },
      { id:'allClasses',  icon:'🎭', name:'Class Act',        hint:'Try every starter class',   cat:'medium' },
      { id:'elite25',     icon:'👑', name:'Elite Slayer',     hint:'25 elites in one run',      cat:'medium' },
      { id:'souls5k',     icon:'✦',  name:'Soul Hoarder',     hint:'Earn 5000 total souls',     cat:'medium' },
      { id:'speedRunner', icon:'🏃', name:'Speed Runner',     hint:'Last 10 minutes in one run',cat:'hard', unlocks:'Rogue' },

  async function _syncToSupabase() {

        classesPlayed[k.replace('played_', '')] = true;
      });

      const bp = JSON.parse(localStorage.getItem('hoa_bp') || '{}');
      /* F-05: clamp all stat values to reasonable maximums before writing to DB */
      const _clamp = (v, min, max) => Math.min(max, Math.max(min, Math.floor(Number(v) || 0)));
      await Promise.all([
        _sb.from('game_progress').upsert({
          player_id:  uid,
          souls:      _clamp(meta.souls,    0, 10_000_000),
          upgrades:   meta.upgrades || {},
          best_wave:  _clamp(meta.bestWave,  0, 9999),

          bp_data:    { level: Math.max(0, Math.min(100, Math.floor(bp.level || 0))), xp: Math.max(0, Math.floor(bp.xp || 0)), claimed: (bp.claimed || []).filter(n => Number.isInteger(n) && n >= 1 && n <= 100) },

          perfect_wave_ever: stats.perfectWaveEver || false,
          classes_played: classesPlayed,
          updated_at: new Date().toISOString(),
        }),
      ]);
    } catch (e) { /* non-blocking — run still saves locally */ }
  }

      const { data: { session: _sc } } = await _sb.auth.getSession();
      const _authToken = _sc?.access_token || SB_KEY;
      const _hdr = { 'apikey': SB_KEY, 'Authorization': `Bearer ${_authToken}`, 'Content-Type': 'application/json' };

      /* Fetch existing entry for this player */
      const r = await fetch(
        `${SB_URL}/rest/v1/${table}?name=eq.${encodeURIComponent(name)}&select=id,wave,kills`,
        { headers: _hdr }
      );
      const existing = await r.json();
      if (!Array.isArray(existing)) return;
      const payload = { name, wave, kills, level, class_name: cls || 'hunter' };
      if (existing.length === 0) {
        await fetch(`${SB_URL}/rest/v1/${table}`, {
          method: 'POST', headers: _hdr, body: JSON.stringify(payload),
        });
      } else {
        const e = existing[0];
        if (wave > e.wave || (wave === e.wave && kills > e.kills)) {
          await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${e.id}`, {
            method: 'PATCH', headers: _hdr, body: JSON.stringify(payload),
          });
        }
      }
    } catch {}
  }

  async function fetchLeaderboard(is1hp) {
    const table = is1hp ? 'aurora_leaderboard_1hp' : 'aurora_leaderboard';
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/${table}?select=name,wave,kills,level,class_name&order=wave.desc,kills.desc&limit=100`,
        { headers: SB_HDR }
      );
      return res.json();
    } catch { return []; }
  }

  function checkAchievements(runStats) {
    const st = loadStats();
    const granted = loadAch();
    const newlyGranted = [];
    ACHIEVEMENTS.forEach(ach => {
      if (granted.includes(ach.id)) return;
      if (ach.check(st, runStats)) { granted.push(ach.id); newlyGranted.push(ach); }
    });
    if (newlyGranted.length) saveAch(granted);
    return newlyGranted;
  }

  /* ── Run history ── */
  function loadHistory() { try { return JSON.parse(localStorage.getItem('hoa_history')) || []; } catch { return []; } }
  function saveRunHistory(run) {
    const h = loadHistory();
    h.unshift(run);
    if (h.length > 5) h.length = 5;
    try { localStorage.setItem('hoa_history', JSON.stringify(h)); } catch {}
  }

  /* Check achievements against live run state so toasts fire during play */
  function checkAchievementsMidRun(ps, waveNum, kills, timeSec) {
    const st = loadStats();
    const aug = Object.assign({}, st, {
      totalKills:    (st.totalKills || 0) + (kills || 0),
      bestWave:      Math.max(st.bestWave || 0, waveNum || 0),
      bestKillRun:   Math.max(st.bestKillRun || 0, kills || 0),
      lastTimeSec:   timeSec || 0,
      bestLevel:     Math.max(st.bestLevel || 0, ps.level || 0),
      ['played_' + (ps.class || 'hunter')]: true,
    });
    const granted = loadAch();
    const newlyGranted = [];
    ACHIEVEMENTS.forEach(ach => {
      if (granted.includes(ach.id)) return;
      if (ach.check(aug)) { granted.push(ach.id); newlyGranted.push(ach); }
    });
    if (newlyGranted.length) saveAch(granted);
    return newlyGranted;
  }

  function isClassUnlocked(cls) {
    const starters = ['hunter','knight','wizard','necromancer'];
    if (starters.includes(cls)) return true;
    const granted = loadAch();
    const ach = ACHIEVEMENTS.find(a => a.unlocks === cls);
    return ach ? granted.includes(ach.id) : false;
  }

  /* ── SFX ENGINE (Web Audio API, no external files) ── */
  const SFX = (() => {
    let ctx = null, muted = false;
    const vol = () => muted ? 0 : 1;

    function getCtx() {
      if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
      if (ctx && ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function tone(freq, dur, type = 'sine', gain = 0.18, delay = 0, detune = 0) {
      const c = getCtx(); if (!c || muted) return;
      const g = c.createGain();
      const t0 = c.currentTime + delay;
      g.gain.setValueAtTime(0.001, t0);
      g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      const o = c.createOscillator();
      o.type = type; o.frequency.value = freq; o.detune.value = detune;
      o.connect(g); g.connect(c.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    }

    function noise(dur, gain = 0.12, delay = 0, hpFreq = 0) {
      const c = getCtx(); if (!c || muted) return;
      const sr = c.sampleRate;
      const buf = c.createBuffer(1, Math.ceil(sr * dur), sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const g = c.createGain();
      const t0 = c.currentTime + delay;
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      let node = src;
      if (hpFreq) {
        const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = hpFreq;
        src.connect(hp); hp.connect(g);
      } else { src.connect(g); }
      g.connect(c.destination);
      src.start(t0);
    }

    return {
      init() { getCtx(); },
      toggleMute() { muted = !muted; return muted; },
      isMuted() { return muted; },

      shoot(cls) {

  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function waveCfg(n) {
    const boss = n % 5 === 0;
    let waveType = 'normal';
    if (!boss && n >= 4 && n % 3 === 0) waveType = 'horde';
    if (!boss && n >= 7 && n % 7 === 0) waveType = 'elite';
    const late = Math.max(0, n - 15);
    const surge = Math.max(0, n - 30);
    const base = boss ? Math.floor(20+n*8+late*4) : Math.floor(30+n*15+late*10+surge*8);
    const baseInt = Math.max(50, 320 - n * 22);
    return {
      n, boss, waveType,
      count:    waveType === 'horde' ? base * 2 : base,
      interval: waveType === 'horde' ? Math.max(28, baseInt * 0.44) : baseInt,
      hp:       Math.floor((25+n*22+late*late*2+surge*surge*3) * (waveType==='elite' ? 1.2 : 1)),
      speed:    Math.min(280, 58 + n*3.5 + late*2 + surge*1.5),
      dmg:      Math.floor(8 + n*2 + late*0.8 + surge*0.6),
      xpVal:    4 + n * 2,
      eliteAll: waveType === 'elite',
      eliteTier:Math.floor(n / 7),
      bossHp:   Math.floor(500 + n*200 + late*late*12 + surge*surge*8),

    };

  function rollRarity() {
    const r = Math.random();
    return r < 0.01 ? 'legendary' : r < 0.16 ? 'rare' : 'common';
  }

  function pickOffers(playerClass, takenTraits = [], is1hp = false) {
    const cls = playerClass || 'hunter';
    const pool = BLUEPRINTS.filter(bp => {
      if (bp.requires && !bp.requires.every(r => takenTraits.includes(r))) return false;
      if (is1hp && bp.givesHp) return false;
      if (!bp.cls) return true;
      if (Array.isArray(bp.cls)) return bp.cls.includes(cls);
      return bp.cls === cls;
    });
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 3).map(bp => {
      const tier = rollRarity();
      return { bp, tier, desc: bp[tier].desc, fn: bp[tier].fn };
    });
  }

  /* ── MENU ── */
  class MenuScene extends Phaser.Scene {
    constructor() { super('Menu'); }

    preload() {
      if (!this.textures.exists('thornrift_logo')) this.load.image('thornrift_logo', '/logo.png');
    }

    create() {
      const meta = loadMeta();
      const cx = W / 2, cy = H / 2;
      const logoW = Math.min(440, W * 0.65);

      /* ── Battle Pass purchase return handler ── */
      if (window._bpJustPurchased) {
        const _purchasedTier = window._bpJustPurchased;
        window._bpJustPurchased = null;
        /* Show "processing" toast */
        const _toastBg = this.add.graphics().setDepth(30);
        _toastBg.fillStyle(0x0a0518, 0.97); _toastBg.fillRoundedRect(cx - 200, 18, 400, 52, 10);
        _toastBg.lineStyle(1.5, 0xffd700, 0.8); _toastBg.strokeRoundedRect(cx - 200, 18, 400, 52, 10);
        const _toastT = this.add.text(cx, 44, '⚔  Processing your Battle Pass purchase…', {
          fontSize: '13px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#ffd700',
        }).setOrigin(0.5).setDepth(31);
        /* After 3s, reload from Supabase and confirm */
        this.time.delayedCall(3000, async () => {
          if (window._player) await _loadPlayerDataFromSupabase(window._player.id);
          const bp = loadBP();
          _toastBg.clear();
          _toastBg.fillStyle(0x052e16, 0.97); _toastBg.fillRoundedRect(cx - 200, 18, 400, 52, 10);
          _toastBg.lineStyle(1.5, 0x16a34a, 0.9); _toastBg.strokeRoundedRect(cx - 200, 18, 400, 52, 10);
          const msg = bp.owned
            ? (_purchasedTier === 'premium'
                ? '🎉  Battle Pass Premium unlocked! Levels 1–25 claimed.'
                : '🎉  Battle Pass unlocked! Start earning rewards.')
            : '⌛  Purchase confirmed — may take a moment to reflect.';
          _toastT.setText(msg).setColor(bp.owned ? '#4ade80' : '#fbbf24');
          this.time.delayedCall(4000, () => {
            this.tweens.add({ targets: [_toastBg, _toastT], alpha: 0, duration: 600 });
          });
        });
      }
      const title = this.add.image(cx, cy - 160, 'thornrift_logo')
        .setOrigin(0.5)
        .setDisplaySize(logoW, Math.round(logoW * 0.52))
        .setBlendMode(Phaser.BlendModes.SCREEN)
        .setAlpha(0);
      const hint = this.add.text(cx, cy + 20, 'Press ENTER or click to play', {
        fontSize: '15px', fontFamily: 'system-ui', color: '#a78bfa',
      }).setOrigin(0.5).setAlpha(0);

      const scores = [];
      if (meta.bestWave)  scores.push(`Best wave: ${meta.bestWave}`);
      if (meta.bestKills) scores.push(`Most kills: ${meta.bestKills}`);
      if (meta.bestLevel) scores.push(`Highest level: ${meta.bestLevel}`);
      if (scores.length) {

  class SkinPickerScene extends Phaser.Scene {

      const W = this.scale.width, H = this.scale.height;
      const key = this._key;
      const cls = CLASSES[key];
      const cHex = '#' + cls.color.toString(16).padStart(6,'0');

      const panH = Math.floor(panW * 1.22);

      {

      const a=this._ebRnd(i+j*57),b=this._ebRnd(i+1+j*57),c=this._ebRnd(i+(j+1)*57),d=this._ebRnd(i+1+(j+1)*57);

    startWave() {
      if (this.dead) return;
      this.waveNum++;
      this.waveKills = 0;
      this._warchiefStacks = 0;
      this._waveHit = false;
      /* inventory item hooks: wave heal, wave shield */
      if (this.ps._hpPerWave)    this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps._hpPerWave);
      if (this.ps._waveHealPct)  this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.floor(this.ps.maxHp * this.ps._waveHealPct));
      if (this.ps._waveShield)   this.ps._waveShieldCur = (this.ps._waveShieldCur || 0) + this.ps._waveShield;
      const cfg = waveCfg(this.waveNum);
      this.cfg = cfg; this.spawned = 0; this.total = cfg.count; this.alive = 0;
      this.events.emit('wave', this.waveNum, cfg.boss);
      if (cfg.boss) window._SFX.boss(); else if (cfg.waveType === 'elite') window._SFX.waveElite(); else window._SFX.wave();
      if (cfg.boss) {
        this.time.delayedCall(600, () => this.spawnBoss(cfg));
      } else {
        if (cfg.waveType === 'horde') {
          const ann = this.add.text(W/2, H*0.38, '⚡ HORDE WAVE ⚡', {
            fontSize:'38px', fontFamily:'system-ui', fontStyle:'bold',
            color:'#f97316', stroke:'#000', strokeThickness:5,
          }).setOrigin(0.5).setAlpha(0);
          this.tweens.add({ targets:ann, alpha:1, duration:200, onComplete:()=>
            this.time.delayedCall(900,()=>this.tweens.add({ targets:ann, alpha:0, scaleX:1.3, scaleY:1.3, duration:600, onComplete:()=>ann.destroy() }))

        g.fillStyle(0x4c1d95, 0.6);
        g.fillTriangle(-bs*0.65, bs*0.5, -bs*0.45, bs*0.5, -bs*0.55, bs*0.95);

        for (let i = 0; i < 6; i++) {

          g.fillStyle(0xc4b5fd, 0.7); g.fillCircle(Math.cos(a)*(bs*0.78), Math.sin(a)*(bs*0.78), 3);
        }

        g.lineBetween(-bs*0.12, -bs*0.38, bs*0.28, bs*0.1); g.lineBetween(bs*0.28, bs*0.1, -bs*0.18, bs*0.45);

        g.fillStyle(bossEyeCol[bt], 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.09); g.fillCircle(bs*0.26, -bs*0.18, bs*0.09);

        g.fillTriangle( bs*0.5, -bs*0.72,  bs*0.65, -bs*1.22,  bs*0.35, -bs*0.72);

        g.lineBetween(-bs*0.48, -bs*0.18, bs*0.12, bs*0.28);

        g.lineBetween(bs*0.12, bs*0.28, bs*0.38, -bs*0.32);
        g.lineStyle(2, 0xfef08a, 0.55);
        g.lineBetween(-bs*0.2, bs*0.05, -bs*0.45, bs*0.4);
        // chest rivets
        g.fillStyle(0xfbbf24, 0.8);
        g.fillCircle(-bs*0.32, bs*0.28, 4); g.fillCircle(bs*0.32, bs*0.28, 4);
        g.fillCircle(0, bs*0.38, 4);
        // multi eye cluster
        g.fillStyle(0xffffff, 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.14); g.fillCircle(bs*0.26, -bs*0.18, bs*0.14);
        g.fillStyle(bossEyeCol[bt], 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.09); g.fillCircle(bs*0.26, -bs*0.18, bs*0.09);
        g.fillStyle(0x000000, 1); g.fillCircle(-bs*0.26, -bs*0.18, bs*0.04); g.fillCircle(bs*0.26, -bs*0.18, bs*0.04);
        g.fillStyle(0xfef08a, 0.9); g.fillCircle(0, -bs*0.08, bs*0.08); // third glowing eye
      }
      g.x = x; g.y = -80;
      this.physics.add.existing(g);
      g.body.setCircle(size, -size, -size);
      g._id = ++this._eid;
      g.eHp = cfg.bossHp; g.eMaxHp = cfg.bossHp;
      g.eSpd = 50 + this.waveNum * 1.5; g.eBaseSpd = g.eSpd;
      g.eDmg = cfg.dmg * 2.5; g.eXp = 60 + this.waveNum * 15;
      g.eSize = size; g.eColor = bossColors[bt]; g.eType = 'boss';
      g.isBoss = true; g.bossType = bt;
      g.lastDmgT = 0; g.lastShot = 0; g.lastSpecial = 0;
      g.chargeState = 'patrol'; g.chargeTimer = this.time.now + 2500;
      g.phase2 = false;
      g.hpBar = this.add.graphics();
      this.enemies.add(g);
      this.alive++;
      this.boss = g;
      this.events.emit('bossSpawn', g, this.waveNum);
      // Announce boss type
      const names = ['THE COLOSSUS', 'THE TEMPEST', 'THE VOIDWALKER', 'THE DREADNOUGHT'];
      const nameColors = ['#fb7185', '#22d3ee', '#a78bfa', '#fbbf24'];
      const label = this.add.text(W/2, H*0.18, names[bt], {
        fontSize: '26px', fontFamily: 'system-ui', fontStyle: 'bold',
        color: nameColors[bt], stroke: '#000', strokeThickness: 4, alpha: 0,
      }).setOrigin(0.5);
      this.tweens.add({ targets: label, alpha: 1, duration: 400,
        onComplete: () => this.time.delayedCall(1800, () => this.tweens.add({ targets: label, alpha: 0, duration: 500, onComplete: () => label.destroy() }))
      });
    }

    flashPlayer() {
      this.drawPlayer(true);
      this.time.delayedCall(160, () => { if (!this.dead) this.drawPlayer(); });
    }

    takeDamage(raw) {
      if (this.shieldActive) return 0;
      /* Rogue Evasion */
      if (this.ps.dodgeChance && Math.random() < this.ps.dodgeChance) {
        const ft = this.add.text(this.pg.x, this.pg.y - 28, 'DODGE!', { fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#2dd4bf', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:ft, y:ft.y-32, alpha:0, duration:750, onComplete:()=>ft.destroy() });
        if (this.ps.dodgeHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.dodgeHeal);
        if (this.ps.dodgeSpeed) this.hasteUntil = Math.max(this.hasteUntil, this.time.now + 900);
        window._SFX.dodge();
        this._waveHitThisTick = false;
        return 0;
      }
      /* Paladin Divine Shield */
      if (this.ps.divineBlock && Math.random() < this.ps.divineBlock) {
        const ft2 = this.add.text(this.pg.x, this.pg.y - 28, '🛡 BLOCKED!', { fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#fcd34d', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:ft2, y:ft2.y-30, alpha:0, duration:750, onComplete:()=>ft2.destroy() });
        if (this.ps.divineCounter) {
          const near = this.enemies.getChildren().filter(e=>e.active && Phaser.Math.Distance.Between(this.pg.x,this.pg.y,e.x,e.y)<80);
          near.forEach(e=>{ e.eHp -= Math.floor(raw * this.ps.divineCounter); this.hitFlash(e); });
        }
        if (this.ps.divineHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.divineHeal);
        window._SFX.block();
        this._waveHitThisTick = false;
        return 0;
      }
      this._waveHitThisTick = true;
      let dmg = this.ps.dmgReduce ? Math.max(1, Math.floor(raw * (1 - Math.min(0.85, this.ps.dmgReduce)))) : raw;
      dmg = Math.floor(dmg * (this.ps.curseDmgIn || 1));
      /* Wave Shield (echo_dom1) absorbs damage at wave start */
      if (this.ps._waveShieldCur > 0) {
        const abs = Math.min(dmg, this.ps._waveShieldCur);
        this.ps._waveShieldCur -= abs;
        dmg = Math.max(0, dmg - abs);
        if (dmg <= 0) return 0;
      }
      /* Bone Armor absorbs hits */
      if (this.ps.boneArmor && this.ps.boneStacks > 0) {
        const absorbed = Math.min(dmg, this.ps.boneStacks * this.ps.bonePerStack);
        dmg = Math.max(0, dmg - absorbed);
        const stacksUsed = Math.ceil(absorbed / this.ps.bonePerStack);
        this.ps.boneStacks = Math.max(0, this.ps.boneStacks - stacksUsed);
      }
      if (dmg <= 0) return 0;
      this.ps.hp -= dmg;
      /* Vengeance (echo_venge1): counter-damage nearby enemies when hit */
      if (dmg > 0 && this.ps._vengeanceDmg) {
        const vengDmg = Math.floor(raw * this.ps._vengeanceDmg);
        this.enemies.getChildren().filter(e => e.active && Phaser.Math.Distance.Between(this.pg.x, this.pg.y, e.x, e.y) < 120)
          .forEach(e => { e.eHp -= vengDmg; this.hitFlash(e); });
      }
      window._SFX.hurt();
      /* Break streak on damage */
      if (this._streak > 4) this.events.emit('streakBroken', this._streak);
      this._streak = 0;
      this.events.emit('streak', 0);
      this.flashPlayer();
      this.cameras.main.shake(130, 0.007);
      this._vignette.setAlpha(0.7);
      this.tweens.killTweensOf(this._vignette);
      this.tweens.add({ targets:this._vignette, alpha:0, duration:520, ease:'power2.in' });
      if (this.ps.hp <= 0) {
        if ((this.ps.extraLives || 0) > 0 && !this._usedExtraLife) {
          this._usedExtraLife = true;
          this.ps.hp = 1;
          this.ps.extraLives--;
          /* Flash a golden "LIFELINE!" popup */
          const lft = this.add.text(this.pg.x, this.pg.y - 48, '✦ LIFELINE!', {
            fontSize:'20px', fontFamily:'system-ui', fontStyle:'bold',
            color:'#fbbf24', stroke:'#000', strokeThickness:4,
          }).setOrigin(0.5).setDepth(60);
          this.tweens.add({ targets:lft, y:lft.y-54, alpha:0, duration:1400, onComplete:()=>lft.destroy() });
          window._SFX && window._SFX.levelUp && window._SFX.levelUp();
        } else {
          this.ps.hp = 0; this.onDeath();
        }
      }
      return dmg;
    }

    hitFlash(enemy) {
      if (!enemy || !enemy.active) return;
      const flash = this.add.circle(enemy.x, enemy.y, enemy.eSize || 14, 0xffffff, 0.55);
      this.tweens.add({ targets: flash, alpha: 0, duration: 90, ease: 'power2.in', onComplete: () => flash.destroy() });
    }

    deathBurst(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const p = this.add.circle(x, y, Phaser.Math.Between(2, 5), color);
        this.tweens.add({
          targets: p,
          x: x + Math.cos(angle) * (30 + Math.random() * 40),
          y: y + Math.sin(angle) * (30 + Math.random() * 40),
          alpha: 0, scaleX: 0, scaleY: 0,
          duration: 350 + Math.random() * 200,
          ease: 'power2.out',
          onComplete: () => p.destroy(),
        });
      }
    }

    onHit(proj, enemy) {
      if (!proj.active || !enemy.active) return;
      if (proj.hitSet && proj.hitSet.has(enemy)) return;

      /* Shielder — absorb hit with shield */
      if (enemy.eType === 'shielder' && enemy.shieldHp > 0) {
        enemy.shieldHp--;
        this.hitFlash(enemy);
        const blk = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, '⛨', {
          fontSize: '16px', fontFamily: 'system-ui', color: '#93c5fd', stroke:'#000', strokeThickness:2,
        }).setOrigin(0.5);
        this.tweens.add({ targets: blk, y: blk.y - 22, alpha: 0, duration: 500, onComplete: () => blk.destroy() });
        if (enemy.shieldHp <= 0 && enemy.shieldArc) {
          const sa = enemy.shieldArc; enemy.shieldArc = null;
          this.tweens.add({ targets: sa, alpha: 0, duration: 200, onComplete: () => sa.destroy() });
          const crack = this.add.text(enemy.x, enemy.y - enemy.eSize - 6, 'SHIELD BROKEN', {
            fontSize: '11px', fontFamily: 'system-ui', fontStyle: 'bold', color: '#fbbf24', stroke:'#000', strokeThickness:2,
          }).setOrigin(0.5);
          this.tweens.add({ targets: crack, y: crack.y - 28, alpha: 0, duration: 800, onComplete: () => crack.destroy() });
        }
        if (proj.pierceLeft > 0) { if (!proj.hitSet) proj.hitSet = new Set(); proj.hitSet.add(enemy); proj.pierceLeft--; }
        else { proj.destroy(); }
        return;
      }

      let mult = 0.8 + Math.random() * 0.4, isCrit = false;
      if (this.ps.critChance && Math.random() < this.ps.critChance) {
        mult *= (this.ps.critMult || 2); isCrit = true;
      }
      // Arcane Surge bonus
      if (proj.isSurge) mult *= (this.ps.surgeMult || 2);
      // Hunter Trueshot: crits get extra pierce
      if (isCrit && this.ps.critPierce && proj.pierceLeft < this.ps.critPierce) proj.pierceLeft = this.ps.critPierce;
      // Berserker stacking bonus
      const bsrkMult = this.ps.bsrkPerKill ? 1 + Math.min(this.ps.bsrkMax, (this.waveKills||0) * this.ps.bsrkPerKill) : 1;
      const backstabM = (this.ps.backstabMult && this._justDashed) ? this.ps.backstabMult : 1;
      if (this._justDashed) { this._justDashed = false; if (backstabM>1) { const bst=this.add.text(enemy.x,enemy.y-24,'BACKSTAB!',{fontSize:'14px',fontFamily:'system-ui',fontStyle:'bold',color:'#2dd4bf',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(50); this.tweens.add({targets:bst,y:bst.y-36,alpha:0,duration:850,onComplete:()=>bst.destroy()}); } }
      // Iron Will — bonus damage when low HP
      const ironWillMult = (this.ps.ironWill && this.ps.hp < this.ps.maxHp * 0.30) ? this.ps.ironWill : 1;
      // Marked for Death — mark on first hit, bonus on subsequent hits
      const markMult = (this.ps.markMult && enemy.marked) ? this.ps.markMult : 1;
      if (this.ps.markMult && !enemy.marked) enemy.marked = true;
      // Phantom Shot counter
      if (this.ps.phantomEvery) {
        this.phantomCount++;
        if (this.phantomCount >= this.ps.phantomEvery) {
          this.phantomCount = 0;
          proj.pierceLeft = 9999; proj.isPhantom = true;
          if (!this.ps.phantomDmgMult) {
            proj.slowAll = true; // slow on phantom pierce
          } else {
            mult *= this.ps.phantomDmgMult;
          }
        }
      }
      // Ricochet base dmg tag
      if (proj.ricochetMult) mult *= proj.ricochetMult;

      const bossBonusMult = (this.ps.bossDmgBonus && this.time.now < this.bossDmgUntil) ? (1 + this.ps.bossDmgBonus) : 1;
      const curseDmgOut = this.ps.curseDmgOut || 1;
      const bloodRageMProj = (this.ps.bloodRageMult && this.ps.hp < this.ps.maxHp*(this.ps.bloodRageThresh||0.35)) ? (1+this.ps.bloodRageMult) : 1;
      const warchiefDmgMProj = this.ps.warchiefDmgPer ? (1+Math.min(10,this._warchiefStacks)*this.ps.warchiefDmgPer) : 1;
      const dmg = Math.floor(this.ps.dmg * mult * bsrkMult * ironWillMult * markMult * bossBonusMult * curseDmgOut * backstabM * bloodRageMProj * warchiefDmgMProj);
      enemy.eHp -= dmg;
      this.totalDmg = (this.totalDmg || 0) + dmg;
      this.hitFlash(enemy);
      // Vampiric Strike — leech
      if (this.ps.vStrike) {
        const leechMult = (this.ps.bloodPact && this.ps.hp < this.ps.maxHp * 0.30) ? (this.ps.bloodPact || 1) : 1;
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.max(1, Math.floor(dmg * this.ps.vStrike * leechMult)));
      }
      // Necromancer slow on hit
      if (proj.isNecroOrb && !enemy._necroSlow) {
        enemy._necroSlow = true;
        enemy.eSpd = enemy.eBaseSpd * 0.55;
        this.time.delayedCall(2000, () => { if (enemy.active) { enemy.eSpd = enemy.eBaseSpd; enemy._necroSlow = false; } });
      }

      if (this.ps.slowOnHit) {
        enemy.eSpd = enemy.eBaseSpd * (1 - Math.min(0.85, this.ps.slowOnHit));
        this.time.delayedCall(1500, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      const t = this.add.text(enemy.x, enemy.y - enemy.eSize - 4, isCrit ? `${dmg}!` : dmg, {
        fontSize: isCrit ? '17px' : '13px', fontFamily: 'system-ui',
        color: isCrit ? '#facc15' : (enemy.isBoss ? '#fbbf24' : '#ffffff'),
        fontStyle: 'bold', stroke: '#000', strokeThickness: 2,
      }).setOrigin(0.5);
      this.tweens.add({ targets: t, y: t.y - 32, alpha: 0, duration: 700, onComplete: () => t.destroy() });

      // Fireball explosion
      if (proj.isFireball) {
        const expl = this.add.circle(enemy.x, enemy.y, 22, 0xff4500, 0.75);
        this.tweens.add({ targets: expl, scaleX: 2.8, scaleY: 2.8, alpha: 0, duration: 280, onComplete: () => expl.destroy() });
        const splR = this.ps.splashR || 35;
        const splMult = this.ps.splashMult || 0.25;
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(enemy.x, enemy.y, e2.x, e2.y) < splR + e2.eSize) {
            e2.eHp -= Math.floor(this.ps.dmg * splMult);
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
        if (this.ps.leaveFire) this.spawnFirePuddle(enemy.x, enemy.y);
      }

      // Venomous — apply poison DOT
      if (this.ps.poisonDmg && !proj.isRicochet) {
        const now = this.time.now;
        enemy.poisonEnd = now + this.ps.poisonDur;
        enemy.poisonDmgPerTick = this.ps.poisonDmg * 0.5;
        if (!enemy.poisonTick) enemy.poisonTick = now + 500;
      }

      // Phantom Shot slow-on-pierce
      if (proj.slowAll) {
        enemy.eSpd = enemy.eBaseSpd * 0.35;
        this.time.delayedCall(2000, () => { if (enemy.active) enemy.eSpd = enemy.eBaseSpd; });
      }

      // Explosive Rounds — splash AOE (hunter, no recursion on ricochet/phantom)
      if (this.ps.explodeRange && !proj.isRicochet && !proj.isExplosion) {
        const ex = enemy.x, ey = enemy.y, er = this.ps.explodeRange;
        const expl = this.add.circle(ex, ey, 6, 0xff8c00, 0.9);
        this.tweens.add({ targets: expl, scaleX: er/6, scaleY: er/6, alpha: 0, duration: 200, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < er + e2.eSize) {
            e2.eHp -= Math.floor(dmg * (this.ps.explodeMult || 0.4));
            if (e2.eHp <= 0) this.killEnemy(e2);
          }
        });
      }

      // Overload — every Nth fireball triggers Frost Nova
      if (proj.isFireball && this.ps.overloadEvery) {
        this.overloadCount++;
        if (this.overloadCount >= this.ps.overloadEvery) {
          this.overloadCount = 0;
          this.doFrostNova();
          if (this.ps.overloadAoe) {
            const blast = this.add.circle(this.pg.x, this.pg.y, 10, 0x7c3aed, 0.8);
            this.tweens.add({ targets: blast, scaleX: 15, scaleY: 15, alpha: 0, duration: 400, onComplete: () => blast.destroy() });
          }
        }
      }

      // Void Rift — leave damaging zone where fireball lands
      if (proj.isFireball && this.ps.voidRift) {
        this.spawnVoidRift(enemy.x, enemy.y);
      }

      // Ricochet — spawn bouncing fragments
      if (this.ps.ricochetCount && !proj.isRicochet) {
        const targets = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a,b) => Phaser.Math.Distance.Between(enemy.x,enemy.y,a.x,a.y)-Phaser.Math.Distance.Between(enemy.x,enemy.y,b.x,b.y))
          .slice(0, this.ps.ricochetCount);
        targets.forEach(t => {
          const rf = this.add.graphics();
          rf.fillStyle(0x93c5fd, 1); rf.fillCircle(0,0,4);
          rf.x = enemy.x; rf.y = enemy.y;
          this.physics.add.existing(rf);
          rf.body.setCircle(4,-4,-4);
          const ra = Phaser.Math.Angle.Between(enemy.x, enemy.y, t.x, t.y);
          rf.body.setVelocity(Math.cos(ra)*480, Math.sin(ra)*480);
          rf.pierceLeft = 0; rf.isRicochet = true; rf.ricochetMult = this.ps.ricochetMult;
          this.projectiles.add(rf);
          this.time.delayedCall(600, () => { if (rf.active) rf.destroy(); });
        });
      }

      // Chain Reaction — delayed secondary explosion
      if (proj.isFireball && this.ps.chainReact) {
        const ex = enemy.x, ey = enemy.y;
        this.time.delayedCall(280, () => {
          if (this.dead) return;
          const b2 = this.add.circle(ex, ey, 8, 0xff6b00, 0.85);
          this.tweens.add({ targets: b2, scaleX: this.ps.chainReact/8, scaleY: this.ps.chainReact/8, alpha: 0, duration: 260, onComplete: () => b2.destroy() });
          this.enemies.getChildren().forEach(e2 => {
            if (!e2.active) return;
            if (Phaser.Math.Distance.Between(ex, ey, e2.x, e2.y) < this.ps.chainReact + e2.eSize) {
              e2.eHp -= Math.floor(this.ps.dmg * (this.ps.chainReactMult || 0.25));
              if (e2.eHp <= 0) this.killEnemy(e2);
            }
          });
        });
      }

      // Chain lightning
      if (this.ps.chainCount) {
        const nearby = this.enemies.getChildren()
          .filter(e => e.active && e !== enemy)
          .sort((a, b) => Phaser.Math.Distance.Between(enemy.x, enemy.y, a.x, a.y) - Phaser.Math.Distance.Between(enemy.x, enemy.y, b.x, b.y))
          .slice(0, this.ps.chainCount);
        nearby.forEach(e2 => {
          const bolt = this.add.graphics();
          bolt.lineStyle(2, 0x93c5fd, 0.9);
          bolt.lineBetween(enemy.x, enemy.y, e2.x, e2.y);
          this.tweens.add({ targets: bolt, alpha: 0, duration: 200, onComplete: () => bolt.destroy() });
          const chainDmg = Math.floor(dmg * (this.ps.chainMult || 0.5));
          e2.eHp -= chainDmg;
          if (e2.eHp <= 0) this.killEnemy(e2);
        });
      }

      if (proj.pierceLeft > 0) {
        if (!proj.hitSet) proj.hitSet = new Set();
        proj.hitSet.add(enemy); proj.pierceLeft--;
      } else { proj.destroy(); }

      if (enemy.eHp <= 0) this.killEnemy(enemy);
    }

    spawnFirePuddle(x, y) {
      const puddle = this.add.circle(x, y, 35, 0xff6b00, 0.5);
      let ticks = 0;
      this.time.addEvent({ delay: 500, repeat: 7, callback: () => {
        ticks++;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < 40 + e.eSize) {
            e.eHp -= Math.floor(this.ps.dmg * 0.15);
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
        if (ticks >= 8) { puddle.destroy(); }
      }});
    }

    spawnVoidRift(x, y) {
      const dur = this.ps.voidDur || 4000;
      const radius = 30;
      const rift = this.add.arc(x, y, radius, 0, 360, false, 0x4c1d95, 0.65);
      rift.setStrokeStyle(2, 0x7c3aed, 0.9);
      this.tweens.add({ targets: rift, alpha: 0, duration: dur, onComplete: () => rift.destroy() });
      const dmgPerTick = this.ps.voidDmg || 15;
      this.time.addEvent({ delay: 500, repeat: Math.floor(dur / 500) - 1, callback: () => {
        if (!rift.active) return;
        this.enemies.getChildren().forEach(e => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(x, y, e.x, e.y) < radius + e.eSize) {
            e.eHp -= dmgPerTick;
            if (e.eHp <= 0) this.killEnemy(e);
          }
        });
      }});
    }

    onEnemyProj(player, proj) {
      if (!proj.active) return;
      proj.destroy();
      if (this.shieldActive) { this.breakShield(this.time.now); return; }
      this.takeDamage(proj.dmg);
    }

    killEnemy(enemy) {
      if (!enemy.active) return;
      this.deathBurst(enemy.x, enemy.y, enemy.eColor);
      enemy.hpBar.destroy();
      if (enemy.aimLine)    { enemy.aimLine.destroy();    enemy.aimLine    = null; }
      if (enemy.eliteAura)  { enemy.eliteAura.destroy();  enemy.eliteAura  = null; }
      if (enemy.eliteLabel) { enemy.eliteLabel.destroy(); enemy.eliteLabel = null; }
      if (enemy.shieldArc)  { enemy.shieldArc.destroy();  enemy.shieldArc  = null; }

      /* Necromancer — raise dead (not bosses, not already-minions) */
      if (this.ps.raiseDead && !enemy.isBoss && !enemy.isMinion && !enemy.isMini) {
        const chance = this.ps.raiseChance || 0.35;
        if (Math.random() < chance) this.spawnMinion(enemy.x, enemy.y, enemy.eBaseSpd);
      }

      /* Splitter spawns 2 minis */
      if (enemy.eType === 'splitter' && !enemy.isMini) {
        for (let i = 0; i < 2; i++) {
          const a = (i / 2) * Math.PI * 2 + Math.random();
          this.mkEnemy(enemy.x + Math.cos(a) * 22, enemy.y + Math.sin(a) * 22,
            8, 0xc026d3, enemy.eMaxHp * 0.35, enemy.eBaseSpd * 1.3, enemy.eDmg * 0.7,
            Math.floor(enemy.eXp * 0.5), 'basic', true);
        }
      }

      /* XP orb with pulse tween */
      const orb = this.add.circle(enemy.x, enemy.y, 5, 0xa78bfa, 0.9);
      this.physics.add.existing(orb);
      orb.body.setCircle(5);
      orb.xpVal = enemy.eXp;
      this.xpOrbs.add(orb);
      this.tweens.add({ targets: orb, scaleX: 1.5, scaleY: 1.5, duration: 500, yoyo: true, repeat: -1, ease: 'sine.inOut' });
      /* Pickup drop */
      if (!enemy.isMini && (enemy.isBoss || Math.random() < 0.15)) {
        const is1hp = this.ps.is1hp;
        const types = enemy.isBoss ? ['shield','hp'] : (is1hp ? ['shield'] : ['hp','shield']);
        const pType = types[Math.floor(Math.random()*types.length)];
        const pCol = {shield:0x3b82f6, hp:0x4ade80}[pType];
        const px2 = enemy.x + Phaser.Math.Between(-16,16), py2 = enemy.y + Phaser.Math.Between(-16,16);
        const pu = this.add.circle(px2, py2, 8, pCol, 1);
        const inner = this.add.circle(px2, py2, 4, 0xffffff, 0.75);
        this.physics.add.existing(pu); pu.body.setCircle(8);
        pu.pType = pType; pu._inner = inner;
        this.pickups.add(pu);
        this.tweens.add({ targets:[pu,inner], y: py2-10, duration:500, yoyo:true, repeat:-1, ease:'sine.inOut' });
        this.time.delayedCall(12000, ()=>{ if(pu.active){ pu.destroy(); if(inner.active) inner.destroy(); } });
      }

      if (enemy.isBoss) { this.boss = null; this.events.emit('bossDead'); }
      if (this.ps.lifeSteal > 0) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.lifeSteal);

      // Reaper — death explosion (no chain recursion)
      if (this.ps.reaperDmg && !enemy.isMini && !enemy.fromReaper) {
        const rx = enemy.x, ry = enemy.y, rr = this.ps.reaperRange;
        const expl = this.add.circle(rx, ry, 8, 0x6d28d9, 0.85);
        this.tweens.add({ targets: expl, scaleX: rr/8, scaleY: rr/8, alpha: 0, duration: 280, ease: 'power2.out', onComplete: () => expl.destroy() });
        this.enemies.getChildren().forEach(e2 => {
          if (!e2.active || e2 === enemy) return;
          if (Phaser.Math.Distance.Between(rx, ry, e2.x, e2.y) < rr + e2.eSize) {
            e2.eHp -= this.ps.reaperDmg;
            if (e2.eHp <= 0) { e2.fromReaper = true; this.killEnemy(e2); }
          }
        });
      }

      // Per-run stats
      if (enemy.isElite) { this._eliteKills = (this._eliteKills||0)+1; window._SFX.eliteKill(); } else { window._SFX.kill(); }
      if (enemy.isBoss)  this._bossKills  = (this._bossKills||0)+1;
      /* Kill Heal (Paladin Aura of Healing legendary) */
      if (this.ps.killHeal) this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.killHeal);
      /* Warchief stacking */
      if (this.ps.warchiefAtkPer) {
        this._warchiefStacks = Math.min(10, (this._warchiefStacks||0)+1);
        this._warchiefUntil = this.time.now + this.ps.warchiefDur;
      }
      /* Poison spread on kill */
      if (this.ps.poisonSpread && enemy.poisonEnd > this.time.now) {
        const near = this.enemies.getChildren().filter(e=>e.active&&e!==enemy&&Phaser.Math.Distance.Between(enemy.x,enemy.y,e.x,e.y)<80);
        near.forEach(e=>{ e.poisonEnd=this.time.now+(this.ps.poisonDur||4000); e.poisonDmgPerTick=this.ps.poisonDmg*0.5; });
      }
      /* Perfect wave tracking */
      this._waveHitThisTick = false;
      // Haste — speed burst on kill
      if (this.ps.hasteBonus) {
        const wasInactive = this.time.now >= this.hasteUntil;
        this.hasteUntil = this.time.now + this.ps.hasteDur;
        if (wasInactive) {
          window._SFX.haste();
          const ht = this.add.text(this.pg.x, this.pg.y - 32, '⚡ HASTE!', {
            fontSize:'13px', fontFamily:'system-ui', fontStyle:'bold', color:'#60a5fa', stroke:'#000', strokeThickness:3,
          }).setOrigin(0.5).setDepth(50);
          this.tweens.add({ targets:ht, y:ht.y-36, alpha:0, duration:900, ease:'power2.out', onComplete:()=>ht.destroy() });
        }
      }

      this.ps.kills++;
      this.waveKills++;

      // Soul Eater — permanent damage gain per 10 kills
      if (this.ps.soulEaterDmg && this.ps.kills % 10 === 0) this.ps.dmg += this.ps.soulEaterDmg;

      // Bone Armor — gain stack on kill
      if (this.ps.boneArmor) this.ps.boneStacks = Math.min(this.ps.boneMax, (this.ps.boneStacks || 0) + 1);

      // Blood Pact — kill heal when below 30%
      if (this.ps.bloodPactKillHeal && this.ps.hp < this.ps.maxHp * 0.30)
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + Math.floor(this.ps.maxHp * this.ps.bloodPactKillHeal));

      // Last Rites — boss kill bonus
      if (enemy.isBoss && this.ps.bossHeal) {
        this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + this.ps.bossHeal);
        this.bossDmgUntil = this.time.now + this.ps.bossDmgDur;
      }
      this.alive = Math.max(0, this.alive - 1);
      enemy.destroy();
      this.events.emit('kill', this.ps.kills);

      /* ── Kill streak — only damage resets it, not wave gaps ── */
      this._streak = (this._streak || 0) + 1;
      this.events.emit('streak', this._streak);
      /* Milestone announcements */
      const milestones = {
        10:'KILLING SPREE', 25:'RAMPAGE', 50:'UNSTOPPABLE', 75:'DEVASTATING',
        100:'GODLIKE', 150:'LEGENDARY', 200:'BEYOND HUMAN', 250:'APEX PREDATOR',
        300:'EXTINCTION EVENT', 400:'FORCE OF NATURE', 500:'WALKING DEATH',
        600:'WORLD ENDER', 750:'MYTHIC', 1000:'ETERNAL SLAYER',
      };
      if (milestones[this._streak]) {
        this.events.emit('streakMilestone', this._streak, milestones[this._streak]);
        window._SFX.achieve();
      }
      /* Live souls preview */
      const liveSouls = Math.floor((this.waveNum * 3 + this.ps.kills * 0.15) * (this.ps.soulMult || 1));
      this.events.emit('soulsPreview', liveSouls + (this.ps._curseSouls || 0));

      if (this.alive === 0 && this.spawned >= this.total)
        this.time.delayedCall(2000, () => { if (!this.dead) this.startWave(); });
    }

    onPickup(player, pu) {
      if (!pu.active) return;
      const type = pu.pType;
      if (pu._inner && pu._inner.active) pu._inner.destroy();
      pu.destroy();
      const floatTxt = (txt, col) => {
        const t = this.add.text(this.pg.x, this.pg.y - 24, txt, {
          fontSize:'14px', fontFamily:'system-ui', fontStyle:'bold', color:col, stroke:'#000', strokeThickness:3,
        }).setOrigin(0.5).setDepth(50);
        this.tweens.add({ targets:t, y:t.y-44, alpha:0, duration:900, ease:'power2.out', onComplete:()=>t.destroy() });
      };
      if (type === 'speed') {
        if (!this.speedBoostActive) { this._preBoostSpd = this.ps.spd; this.ps.spd *= 1.5; this.speedBoostActive = true; }
        floatTxt('+50% SPEED', '#22d3ee');
        if (this._speedTimer) this._speedTimer.remove();
        this._speedTimer = this.time.delayedCall(5000, () => { this.ps.spd = this._preBoostSpd; this.speedBoostActive = false; });
      } else if (type === 'shield') {
        this.shieldActive = true; this.shieldUntilReady = this.time.now + 4500;
        floatTxt('SHIELD!', '#93c5fd');
        window._SFX.pickup();
      } else if (type === 'hp') {
        if (!this.ps.is1hp) {
          const heal = Math.max(1, Math.floor(this.ps.maxHp * 0.2));
          this.ps.hp = Math.min(this.ps.maxHp, this.ps.hp + heal);
          floatTxt(`+${heal} HP`, '#4ade80');
          window._SFX.pickup();
        }
      }
    }

    onXP(player, orb) {
      if (!orb.active) return;
      this.ps.xp += Math.floor(orb.xpVal * (this.ps.xpMult || 1) * (1 + (this.ps._runXpBoost || 0)));
      orb.destroy();
      if (this.ps.xp >= this.ps.xpNext) {
        this.ps.xp -= this.ps.xpNext;
        this.ps.level++;
        this.ps.xpNext = Math.floor(this.ps.xpNext * 1.45);
        this.doLevelUp();
      }
    }

    doLevelUp() {
      window._showTouchControls(false);
      this.paused = true; this.physics.pause();
      this.scene.pause('Game');
      this.scene.launch('LevelUp', { ps: this.ps, game: this });
    }

    resume() {
      this.scene.stop('LevelUp');
      this.scene.resume('Game');
      this.physics.resume();
      this.paused = false;
      this.rebuildOrbitals();
      window._showTouchControls(true);
    }

    spawnMinion(x, y, speed) {
      const limit = this.ps.minionLimit || 3;
      if (this.minions.getLength() >= limit) return;

      const spd = Math.min(200, (speed || 80) * 0.7 * (this.ps.minionSpeed || 1));
      const hp  = Math.floor(40 + this.ps.level * 8);
      const g = this.add.graphics();
      g.fillStyle(0x4c1d95, 0.85); g.fillCircle(0, 0, 8);
      g.fillStyle(0xa78bfa, 0.9);  g.fillCircle(-3, -3, 2); g.fillCircle(3, -3, 2);
      g.lineStyle(1, 0x7c3aed, 0.7); g.strokeCircle(0, 0, 10);
      g.x = x; g.y = y;
      g.isMinion = true;
      g.minionHp  = hp;
      g.minionSpd = spd;
      g.minionLifeEnd = this.time.now + (this.ps.minionDur || 18000);
      this.minions.add(g, true); // true = add physics body via the physics group
      g.body.setCircle(8, -8, -8);
      g.body.setCollideWorldBounds(true);
    }

    rebuildOrbitals() {
      this.orbitals.forEach(o => o.destroy());
      this.orbitals = [];
      const count = this.ps.orbitCount || 0;
      for (let i = 0; i < count; i++) {
        const g = this.add.graphics();
        g.fillStyle(0xc4b5fd, 1); g.fillCircle(0, 0, 9);
        g.fillStyle(0xffffff, 0.5); g.fillCircle(-2, -3, 3);
        this.physics.add.existing(g);
        g.body.setCircle(9, -9, -9);
        g.hitTimes = {};
        this.orbitals.push(g);
      }
    }

    doSlam() {
      const px = this.pg.x, py = this.pg.y;
      const all = this.enemies.getChildren().filter(e => e.active);
      if (!all.length) return;

      /* Closest enemy — always hit regardless of distance */
      const closest = all.reduce((a, b) =>
        Phaser.Math.Distance.Between(px, py, a.x, a.y) <=
        Phaser.Math.Distance.Between(px, py, b.x, b.y) ? a : b
      );

      /* White burst rings — use arc() so scaleX/Y expand from player centre */
      for (let i = 0; i < 3; i++) {
        const ring = this.add.arc(px, py, 20 + i * 8, 0, 360, false, 0xffffff, 0);
        ring.setStrokeStyle(3 - i, 0xffffff, 1 - i * 0.25);
        this.tweens.add({
          targets: ring, scaleX: 7, scaleY: 7, alpha: 0,
          duration: 320 + i * 60, delay: i * 50, ease: 'power2.out',
          onComplete: () => ring.destroy(),
        });
      }

      /* Bright flash at player origin */
      const flash = this.add.circle(px, py, 22, 0xffffff, 0.85);
      this.tweens.add({ targets: flash, alpha: 0, scaleX: 0.4, scaleY: 0.4, duration: 160, ease: 'power3.in', onComplete: () => flash.destroy() });

      /* Impact flash at target */
      const hit = this.add.circle(closest.x, closest.y, closest.eSize + 12, 0xffffff, 0.65);
      this.tweens.add({ targets: hit, alpha: 0, scaleX: 2.5, scaleY: 2.5, duration: 280, ease: 'power2.out', onComplete: () => hit.destroy() });

      /* Damage: closest always hit + anyone within 120px */
      all.forEach(e => {
        if (!e.active) return;
        if (e === closest || Phaser.Math.Distance.Between(px, py, e.x, e.y) < 120 + e.eSize) {
          e.eHp -= this.ps.slamDmg;
          if (e.eHp <= 0) { this.killEnemy(e); return; }
          const t = this.add.text(e.x, e.y - e.eSize - 4, this.ps.slamDmg, {
            fontSize: '14px', color: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2, fontFamily: 'system-ui',
          }).setOrigin(0.5);
          this.tweens.add({ targets: t, y: t.y - 30, alpha: 0, duration: 700, onComplete: () => t.destroy() });
        }
      });
    }

    /* ── ELITE MODELS (not yet active — swap drawPlayer() call to use) ── */
    drawPlayerElite(flash = false) {
      const g = this.pg; g.clear();
      const cls  = this.ps.class;
      const t    = this.time.now / 1000;
      const p    = Math.sin(t * 2.5) * 0.5 + 0.5;  // 0-1 pulse
      const sp   = Math.sin(t * 5)   * 0.5 + 0.5;  // fast pulse

      /* Glow helpers using layered alpha rings */
      const gc = (col, a, x, y, r, layers = 5) => {
        for (let i = layers; i >= 1; i--) {
          g.fillStyle(col, a * (layers - i + 1) / layers * 0.18);
          g.fillCircle(x, y, r + i * 6);
        }
        g.fillStyle(col, a * (flash ? 1.3 : 1));
        g.fillCircle(x, y, r);
      };
      const gl = (col, a, th, x1, y1, x2, y2, glw = 4) => {
        for (let i = glw; i >= 1; i--) {
          g.lineStyle(th + i * 3, col, a * (glw - i + 1) / glw * 0.15);
          g.lineBetween(x1, y1, x2, y2);
        }
        g.lineStyle(th, col, a);
        g.lineBetween(x1, y1, x2, y2);
      };

      /* ── HUNTER ELITE "Phantom Archer" ─────────────────────────── */
      if (cls === 'hunter') {
        /* Ground ghost pool */
        g.fillStyle(0x06b6d4, 0.05 + p * 0.05);
        g.fillEllipse(0, 18, 54, 13);

        /* Orbiting spirit particles */
        for (let i = 0; i < 6; i++) {
          const a = t * 1.6 + i * Math.PI / 3;
          const pr = 30 + Math.sin(t * 3 + i) * 5;
          gc(0x22d3ee, 0.35 + Math.sin(t * 2 + i) * 0.15, Math.cos(a) * pr, Math.sin(a) * pr * 0.35 - 10, 2, 3);
        }

        /* Ghostly cloak */
        g.fillStyle(0x0e7490, 0.45);
        g.fillTriangle(-14, -8, -20 + Math.sin(t) * 3, 20, 0, 14);
        g.fillTriangle(14, -8, 20 + Math.sin(t + 1) * 3, 20, 0, 14);

        /* Body — translucent spectral */
        g.fillStyle(0x0ea5e9, 0.5); g.fillEllipse(0, -5, 26, 34);
        g.fillStyle(0x7dd3fc, 0.25); g.fillEllipse(0, -5, 22, 28);

        /* Head with deep hood */
        g.fillStyle(0x075985, 0.92); g.fillCircle(0, -24, 11);
        g.fillStyle(0x0c4a6e, 0.98);
        g.fillTriangle(-11, -28, 0, -40, 11, -28);

        /* Glowing eyes */
        gc(0x00e5ff, 1.0,  -4, -24, 2.5, 4);
        gc(0x00e5ff, 1.0,   4, -24, 2.5, 4);

        /* Energy bow */
        g.lineStyle(10, 0x0ea5e9, 0.12); g.strokeCircle(18, -10, 16);
        g.lineStyle(6,  0x0ea5e9, 0.25); g.strokeCircle(18, -10, 16);
